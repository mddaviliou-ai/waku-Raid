                                                                }
                                                                if (draftAccounts.some(a => a.id !== acc.id && a.playerName.toLowerCase() === cleanName.toLowerCase())) {
                                                                    setAlertMessage("⚠️ 此名稱已被其他玩家註冊使用！");
                                                                    return;
                                                                }
                                                                updateDraft(acc.id, 'playerName', cleanName);
                                                            }
                                                        }}
                                                        className="text-gray-400 hover:text-blue-500 opacity-50 group-hover:opacity-100 transition-opacity px-1"
                                                        title="修改玩家名稱"
                                                    >
                                                        ✏️
                                                    </button>
                                                </div>
                                            </td>
                                            <td className="p-3 border dark:border-gray-700">
                                                <div className="relative flex items-center">
                                                    <input 
                                                        type={visiblePasswords[acc.id] ? "text" : "password"} 
                                                        className="border dark:border-gray-600 bg-white dark:bg-gray-700 p-1 pr-8 rounded w-full text-center font-medium text-gray-700 dark:text-gray-200 focus:ring-2 focus:ring-blue-500 outline-none transition-colors" 
                                                        value={acc.passcode !== undefined ? acc.passcode : ''} 
                                                        onChange={(e) => {
                                                            const val = e.target.value;
                                                            if (val === '' || /^[a-zA-Z0-9]{0,8}$/.test(val)) {
                                                                updateDraft(acc.id, 'passcode', val);
                                                            }
                                                        }}
                                                        placeholder="4~8碼英數字"
                                                    />
                                                    <button 
                                                        onClick={() => setVisiblePasswords(prev => ({...prev, [acc.id]: !prev[acc.id]}))}
                                                        className="absolute right-2 text-gray-400 hover:text-gray-600 dark:text-gray-500 dark:hover:text-gray-300 focus:outline-none"
                                                        title={visiblePasswords[acc.id] ? "隱藏密碼" : "顯示密碼"}
                                                    >
                                                        {visiblePasswords[acc.id] ? '🙈' : '👁️'}
                                                    </button>
                                                </div>
                                            </td>
                                            <td className="p-3 border dark:border-gray-700">
                                                <select 
                                                    className="border dark:border-gray-600 bg-white dark:bg-gray-700 p-1 rounded w-full transition-colors"
                                                    value={acc.role}
                                                    onChange={(e) => updateDraft(acc.id, 'role', e.target.value)}
                                                >
                                                    <option value="guest">未開通 (Guest)</option>
                                                    <option value="member">一般會員</option>
                                                    <option value="subadmin">副管理員</option>
                                                    <option value="admin">管理員</option>
                                                </select>
                                            </td>
                                            <td className="p-3 border dark:border-gray-700 text-gray-500 dark:text-gray-400 text-sm whitespace-nowrap">
                                                {(() => {
                                                    const jd = getJoinDate(acc);
                                                    if (!jd) return '舊版帳號';
                                                    const d = new Date(jd);
                                                    return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2, '0')}/${String(d.getDate()).padStart(2, '0')} ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
                                                })()}
                                            </td>
                                            <td className="p-3 border dark:border-gray-700 text-center">
                                                 <button 
                                                    className="text-red-500 dark:text-red-400 hover:text-red-700 dark:hover:text-red-300 font-bold px-2 py-1 text-xs rounded hover:bg-red-50 dark:hover:bg-red-900/30 transition-colors whitespace-nowrap"
                                                    onClick={() => {
                                                        if (acc.id === currentAccount.id) {
                                                            setAlertMessage('⚠️ 您不能移除自己的帳號！');
                                                            return;
                                                        }
                                                        setAccountToDelete(acc.id);
                                                    }}
                                                 >移除</button>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                            <p className="text-xs text-orange-500 mt-3 font-bold">※ 所有變更 (修改密碼、調整權限、變更名稱、移除帳號) 必須點擊右上角的「💾 儲存帳號變更」按鈕才會真正生效！</p>
                        </div>
                    </div>
                );
            };

            const navItems = [
                { id: 'my-schedule', label: 'BOSS報名' } 
            ];
            
            if (currentAccount.role === 'member') {
                navItems.push({ id: 'planner', label: '查看成團名單' });
            } else if (currentAccount.role === 'subadmin') {
                navItems.push({ id: 'matrix', label: '成員報名表' });
                navItems.push({ id: 'planner', label: '編輯突襲團' });
            } else if (currentAccount.role === 'admin') {
                navItems.push({ id: 'matrix', label: '成員報名表' });
                navItems.push({ id: 'planner', label: '編輯突襲團' });
                navItems.push({ id: 'system', label: '系統與權限管理' });
            }

            return (
                <div className="min-h-screen flex flex-col transition-colors">
                    <header className="bg-white dark:bg-gray-800 shadow-sm border-b dark:border-gray-700 transition-colors">
                        <div className="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
                            <h1 className="text-xl font-black text-gray-800 dark:text-gray-100 flex items-center">
                                <span className="text-2xl mr-2">⚔️</span> Waku突襲排團系統
                            </h1>
                            <div className="flex items-center space-x-3">
                                {/* 🔔 小鈴鐺通知 */}
                                {(() => {
                                    const myCharIds = (characters || []).filter(c => c.accountId === currentAccount.id).map(c => c.id);
                                    const myAssignedGroups = (groups || []).filter(g => 
                                        (g.members || []).some(m => myCharIds.includes(m)) || 
                                        (g.reserves || []).some(m => myCharIds.includes(m))
                                    );
                                    const count = myAssignedGroups.length;
                                    const tooltipText = count > 0 
                                        ? `您已被排入 ${count} 個王團：\n` + myAssignedGroups.map(g => `- ${g.name}`).join('\n')
                                        : '您目前尚未被排入任何王團';

                                    return (
                                        <div className="relative mr-2 cursor-help" title={tooltipText}>
                                            <span className="text-2xl drop-shadow-sm">🔔</span>
                                            {count > 0 && (
                                                <span className="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full border border-white dark:border-gray-800 shadow-sm z-10">
                                                    {count}
                                                </span>
                                            )}
                                        </div>
                                    );
                                })()}

                                {/* 切換深色模式按鈕 */}
                                <button 
                                    onClick={() => setDarkMode(!darkMode)}
                                    className="mr-2 p-2 rounded-full bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-yellow-400 hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors focus:outline-none"
                                    title="切換深色/淺色模式"
                                >
                                    {darkMode ? '🌙' : '☀️'}
                                </button>
                                
                                <div className="text-right">
                                    <div className="font-bold text-gray-800 dark:text-gray-100">{currentAccount.playerName}</div>
                                    <div className="text-xs text-gray-500 dark:text-gray-400">
                                        {currentAccount.role === 'admin' ? '管理員' : currentAccount.role === 'subadmin' ? '副管理員' : (currentAccount.role === 'guest' ? '未開通' : '一般會員')}
                                        <button onClick={() => setIsChangePwdOpen(true)} className="ml-3 text-blue-500 dark:text-blue-400 hover:text-blue-700 dark:hover:text-blue-300 underline font-bold cursor-pointer">更改密碼</button>
                                        <button onClick={handleLogout} className="ml-3 text-red-500 dark:text-red-400 hover:text-red-700 dark:hover:text-red-300 underline font-bold cursor-pointer">登出</button>
                                    </div>
                                </div>
                                <div className="w-10 h-10 rounded-full bg-blue-100 dark:bg-blue-900/30 flex items-center justify-center font-bold text-blue-600 dark:text-blue-400 border-2 border-blue-300 dark:border-blue-700">
                                    {(currentAccount?.playerName || 'U').charAt(0)}
                                </div>
                            </div>
                        </div>
                    </header>

                    <div className="bg-white dark:bg-gray-800 shadow-sm mb-6 transition-colors">
                        <div className="max-w-7xl mx-auto px-4 flex space-x-6 overflow-x-auto">
                            {navItems.map(item => (
                                <button
                                    key={item.id}
                                    className={`py-3 px-1 border-b-2 font-medium text-sm transition-colors whitespace-nowrap ${
                                        activeTab === item.id 
                                        ? 'border-blue-500 text-blue-600 dark:text-blue-400 dark:border-blue-400' 
                                        : 'border-transparent text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200 hover:border-gray-300 dark:hover:border-gray-600'
                                    }`}
                                    onClick={() => setActiveTab(item.id)}
                                >
                                    {item.label}
                                </button>
                            ))}
                        </div>
                    </div>

                    <main className="flex-grow max-w-7xl mx-auto px-4 w-full pb-10">
                        {activeTab === 'my-schedule' && renderMemberSchedule()}
                        {activeTab === 'matrix' && renderAvailabilityMatrix()}
                        {activeTab === 'planner' && renderRaidPlanner()}
                        {activeTab === 'system' && renderSystemManagement()}
                    </main>

                    {/* 所有 Modal 都移到最外層統一管理，徹底解決層級問題 */}
                    
                    {/* 新增/編輯角色 Modal */}
                    {isAddCharModalOpen && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center px-4" style={{ zIndex: 9999 }}>
                            <div className="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-2xl w-full max-w-md border-t-8 border-blue-500 transition-colors">
                                <h2 className="text-2xl font-black mb-4 flex items-center text-gray-800 dark:text-gray-100">
                                    <span className="text-blue-500 mr-2">{editCharId ? '✏️' : '➕'}</span> 
                                    {editCharId ? '編輯遊戲角色' : '新增遊戲角色'}
                                </h2>
                                <div className="space-y-4">
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">角色名稱 (與帳號綁定)</label>
                                        <input type="text" className="w-full p-2 border border-gray-300 dark:border-gray-600 rounded bg-gray-100 dark:bg-gray-700/50 font-bold text-gray-500 dark:text-gray-400 cursor-not-allowed" value={currentAccount.playerName} disabled title="角色名稱與帳號名稱連動" />
                                    </div>
                                    <div className="flex gap-4">
                                        <div className="flex-1">
                                            <label className="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">職業 (三轉/四轉)</label>
                                            <select 
                                                className="w-full p-2 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-100 rounded focus:ring-2 focus:ring-blue-500 font-medium" 
                                                value={newChar.jobTypeId} 
                                                onChange={e => {
                                                    const selected = jobCategories.find(jc => jc.id === e.target.value);
                                                    setNewChar({...newChar, jobTypeId: e.target.value, job: selected ? selected.name : ''})
                                                }}
                                            >
                                                <option value="" disabled>-- 選擇職業 --</option>
                                                {groupedJobsArray.map(({ groupName, jobs }) => (
                                                    <optgroup key={groupName} label={groupName}>
                                                        {jobs.map(jc => <option key={jc.id} value={jc.id}>{jc.name}</option>)}
                                                    </optgroup>
                                                ))}
                                            </select>
                                        </div>
                                        <div className="w-24">
                                            <label className="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">等級</label>
                                            <input type="number" min="0" max="200" className="w-full p-2 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-100 rounded focus:ring-2 focus:ring-blue-500" value={newChar.level} onChange={e => {
                                                let val = parseInt(e.target.value) || 0;
                                                if (val > 200) val = 200;
                                                if (val < 0) val = 0;
                                                setNewChar({...newChar, level: val});
                                            }} />
                                        </div>
                                    </div>
                                </div>
                                <div className="mt-6 flex justify-end space-x-3">
                                    <button onClick={() => setIsAddCharModalOpen(false)} className="px-5 py-2 text-gray-600 dark:text-gray-300 bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 rounded font-bold transition-colors">取消</button>
                                    <button onClick={handleAddCharacter} className="px-5 py-2 bg-blue-600 text-white rounded font-bold hover:bg-blue-700 shadow transition-colors">
                                        {editCharId ? '儲存修改' : '確認新增'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 新增王團 Modal */}
                    {isCreateModalOpen && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center px-4" style={{ zIndex: 9999 }}>
                            <div className="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-2xl w-full max-w-md border-t-8 border-indigo-500 transition-colors">
                                <h2 className="text-2xl font-black mb-4 flex items-center text-gray-800 dark:text-gray-100"><span className="text-indigo-500 mr-2">✚</span> 新增王團隊伍</h2>
                                <div className="space-y-4">
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">選擇王團</label>
                                        <select 
                                            className="w-full p-2 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-100 rounded focus:ring-2 focus:ring-indigo-500" 
                                            value={newGroup.bossId} 
                                            onChange={e => {
                                                const newBossId = e.target.value;
                                                const newBoss = bosses.find(b => b.id === newBossId);
                                                // 切換王團時，動態更新預設隊伍名稱
                                                const bossGroupsCount = (groups || []).filter(g => g.bossId === newBossId).length;
                                                const defaultGroupName = newBoss ? `${bossGroupsCount + 1}.${newBoss.name}` : '';
                                                setNewGroup({...newGroup, bossId: newBossId, name: defaultGroupName});
                                            }}
                                        >
                                            {(bosses || []).map(b => <option key={b.id} value={b.id}>{b.icon} {b.name}</option>)}
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">隊伍名稱 (可自訂修改)</label>
                                        <input type="text" className="w-full p-2 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-100 rounded focus:ring-2 focus:ring-indigo-500" placeholder="例: 1.殘暴炎魔" value={newGroup.name} onChange={e => setNewGroup({...newGroup, name: e.target.value})} />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">出團日期</label>
                                        <select className="w-full p-2 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 rounded focus:ring-2 focus:ring-indigo-500 font-medium text-indigo-700 dark:text-indigo-400" value={newGroup.dayIndex} onChange={e => setNewGroup({...newGroup, dayIndex: e.target.value})}>
                                            {days.map((d, i) => <option key={i} value={i}>{d}</option>)}
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">詳細時間說明 (可自訂修改)</label>
                                        <input type="text" className="w-full p-2 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-100 rounded focus:ring-2 focus:ring-indigo-500" placeholder="例: 21:30~22:00集合" value={newGroup.time} onChange={e => setNewGroup({...newGroup, time: e.target.value})} />
                                    </div>
                                </div>
                                <div className="mt-6 flex justify-end space-x-3">
                                    <button onClick={() => setIsCreateModalOpen(false)} className="px-5 py-2 text-gray-600 dark:text-gray-300 bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 rounded font-bold transition-colors">取消</button>
                                    <button onClick={handleAddGroup} className="px-5 py-2 bg-indigo-600 text-white rounded font-bold hover:bg-indigo-700 shadow transition-colors">確認建立</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 自訂 Alert Modal (系統提示) */}
                    {alertMessage && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center px-4" style={{ zIndex: 10000 }}>
                            <div className="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-2xl w-full max-w-sm border-t-8 border-yellow-500 transition-colors">
                                <h2 className="text-xl font-black mb-4 flex items-center text-yellow-600 dark:text-yellow-400">⚠️ 系統提示</h2>
                                <p className="mb-6 text-gray-700 dark:text-gray-300 whitespace-pre-line">{alertMessage}</p>
                                <div className="flex justify-end">
                                    <button onClick={() => setAlertMessage('')} className="px-5 py-2 bg-yellow-500 text-white rounded font-bold hover:bg-yellow-600 transition-colors">確認</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 自訂 Confirm Modal (隊伍狀態變更確認) */}
                    {groupStatusToToggle && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center px-4" style={{ zIndex: 9999 }}>
                            <div className="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-2xl w-full max-w-sm border-t-8 border-blue-500 transition-colors">
                                <h2 className="text-xl font-black mb-4 flex items-center text-blue-600 dark:text-blue-400">
                                    {groupStatusToToggle.newStatus === 'completed' ? '🔒 鎖定隊伍確認' : '🔓 解除鎖定確認'}
                                </h2>
                                <p className="mb-6 text-gray-700 dark:text-gray-300 whitespace-pre-line">
                                    {groupStatusToToggle.newStatus === 'completed' 
                                        ? '確定要將此隊伍設為「已完成出團」嗎？\n設定後隊伍名單將會被鎖定無法更改，且隊員的出勤額度將被強制扣除確保防呆！' 
                                        : '確定要解除鎖定，將狀態改回「未出團」嗎？\n隊伍名單將會重新開放編輯。'}
                                </p>
                                <div className="flex justify-end space-x-3">
                                    <button onClick={() => setGroupStatusToToggle(null)} className="px-5 py-2 text-gray-600 dark:text-gray-300 bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 rounded font-bold transition-colors">取消</button>
                                    <button onClick={() => {
                                        const newGroups = (groups || []).map(g => g.id === groupStatusToToggle.id ? { ...g, status: groupStatusToToggle.newStatus } : g);
                                        setGroups(newGroups);
                                        setGroupStatusToToggle(null);
                                        setAlertMessage(groupStatusToToggle.newStatus === 'completed' ? '✅ 隊伍已鎖定並設為完成！' : '✅ 隊伍已解除鎖定！');
                                    }} className="px-5 py-2 bg-blue-600 text-white rounded font-bold hover:bg-blue-700 shadow transition-colors">確認變更</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 自訂 Confirm Modal (隊伍刪除確認) */}
                    {groupToDelete && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center px-4" style={{ zIndex: 9999 }}>
                            <div className="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-2xl w-full max-w-sm border-t-8 border-red-500 transition-colors">
                                <h2 className="text-xl font-black mb-4 flex items-center text-red-600 dark:text-red-400">🚨 刪除確認</h2>
                                <p className="mb-6 text-gray-700 dark:text-gray-300">確定要刪除這個隊伍嗎？<br/><span className="text-red-500 dark:text-red-400 font-bold">此操作無法復原。</span></p>
                                <div className="flex justify-end space-x-3">
                                    <button onClick={() => setGroupToDelete(null)} className="px-5 py-2 text-gray-600 dark:text-gray-300 bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 rounded font-bold transition-colors">取消</button>
                                    <button onClick={() => {
                                        setGroups((groups || []).filter(g => g.id !== groupToDelete));
                                        setGroupToDelete(null);
                                    }} className="px-5 py-2 bg-red-600 text-white rounded font-bold hover:bg-red-700 shadow transition-colors">確認刪除</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 自訂 Confirm Modal (角色刪除確認) */}
                    {charToDelete && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center px-4" style={{ zIndex: 9999 }}>
                            <div className="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-2xl w-full max-w-sm border-t-8 border-red-500 transition-colors">
                                <h2 className="text-xl font-black mb-4 flex items-center text-red-600 dark:text-red-400">🚨 刪除角色確認</h2>
                                <p className="mb-6 text-gray-700 dark:text-gray-300">確定要刪除該角色嗎？<br/><span className="text-red-500 dark:text-red-400 font-bold">這將會同時將其從已排入的王團中移除。</span></p>
                                <div className="flex justify-end space-x-3">
                                    <button onClick={() => setCharToDelete(null)} className="px-5 py-2 text-gray-600 dark:text-gray-300 bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 rounded font-bold transition-colors">取消</button>
                                    <button onClick={confirmDeleteChar} className="px-5 py-2 bg-red-600 text-white rounded font-bold hover:bg-red-700 shadow transition-colors">確認刪除</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 自訂 Confirm Modal (帳號刪除確認) */}
                    {accountToDelete && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center px-4" style={{ zIndex: 9999 }}>
                            <div className="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-2xl w-full max-w-sm border-t-8 border-red-500 transition-colors">
                                <h2 className="text-xl font-black mb-4 flex items-center text-red-600 dark:text-red-400">🚨 移除帳號確認</h2>
                                <p className="mb-6 text-gray-700 dark:text-gray-300">確定要在本次變更中移除該玩家帳號嗎？<br/><span className="text-red-500 dark:text-red-400 font-bold">此操作需點擊「儲存帳號變更」才會生效。</span></p>
                                <div className="flex justify-end space-x-3">
                                    <button onClick={() => setAccountToDelete(null)} className="px-5 py-2 text-gray-600 dark:text-gray-300 bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 rounded font-bold transition-colors">取消</button>
                                    <button onClick={() => {
                                        setDraftAccounts((draftAccounts || []).filter(a => a.id !== accountToDelete));
                                        setAccountToDelete(null);
                                    }} className="px-5 py-2 bg-red-600 text-white rounded font-bold hover:bg-red-700 shadow transition-colors">確認移除</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 自訂 Confirm Modal (刪除單一報名) */}
                    {registrationToDelete && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center px-4" style={{ zIndex: 9999 }}>
                            <div className="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-2xl w-full max-w-sm border-t-8 border-red-500 transition-colors">
                                <h2 className="text-xl font-black mb-4 flex items-center text-red-600 dark:text-red-400">🚨 刪除報名確認</h2>
                                <p className="mb-4 text-gray-700 dark:text-gray-300">確定要刪除該角色的報名嗎？<br/>要的話請輸入 <strong className="text-red-500">YES</strong>：</p>
                                <input 
                                    type="text" 
                                    className="w-full p-2 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-100 rounded focus:ring-2 focus:ring-red-500 mb-6 font-bold uppercase" 
                                    value={deletePromptInput} 
                                    onChange={e => setDeletePromptInput(e.target.value.toUpperCase())}
                                    onKeyDown={e => {
                                        if (e.key === 'Enter') {
                                            if (deletePromptInput === 'YES') {
                                                const charId = registrationToDelete;
                                                const newGroups = (groups || []).map(g => ({
                                                    ...g,
                                                    members: (g.members || []).map(m => m === charId ? '' : m),
                                                    reserves: (g.reserves || []).map(m => m === charId ? '' : m)
                                                }));
                                                setGroups(newGroups);
                                                setAvailability({
                                                    ...availability,
                                                    [charId]: { days: Array(7).fill(false), bosses: [], bossCounts: {}, note: '', maxWeeklyRuns: 2 }
                                                });
                                                setRegistrationToDelete(null);
                                                setAlertMessage('✅ 已成功刪除該角色的報名！');
                                            } else {
                                                setAlertMessage('❌ 刪除取消：輸入不正確');
                                                setRegistrationToDelete(null);
                                            }
                                        }
                                    }}
                                    placeholder="請輸入 YES"
                                />
                                <div className="flex justify-end space-x-3">
                                    <button onClick={() => setRegistrationToDelete(null)} className="px-5 py-2 text-gray-600 dark:text-gray-300 bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 rounded font-bold transition-colors">取消</button>
                                    <button onClick={() => {
                                        if (deletePromptInput === 'YES') {
                                            const charId = registrationToDelete;
                                            const newGroups = (groups || []).map(g => ({
                                                ...g,
                                                members: (g.members || []).map(m => m === charId ? '' : m),
                                                reserves: (g.reserves || []).map(m => m === charId ? '' : m)
                                            }));
                                            setGroups(newGroups);
                                            setAvailability({
                                                ...availability,
                                                [charId]: { days: Array(7).fill(false), bosses: [], bossCounts: {}, note: '', maxWeeklyRuns: 2 }
                                            });
                                            setRegistrationToDelete(null);
                                            setAlertMessage('✅ 已成功刪除該角色的報名！');
                                        } else {
                                            setAlertMessage('❌ 刪除取消：輸入不正確');
                                            setRegistrationToDelete(null);
                                        }
                                    }} className="px-5 py-2 bg-red-600 text-white rounded font-bold hover:bg-red-700 shadow transition-colors">確認刪除</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 自訂 Confirm Modal (換週清空確認) */}
                    {isConfirmResetOpen && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center px-4" style={{ zIndex: 9999 }}>
                            <div className="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-2xl w-full max-w-sm border-t-8 border-yellow-500 transition-colors">
                                <h2 className="text-xl font-black mb-4 flex items-center text-yellow-600 dark:text-yellow-400">⚠️ 換週清空確認</h2>
                                <p className="mb-6 text-gray-700 dark:text-gray-300">確定要清空所有人的報名資料與王團名單嗎？<br/><span className="text-red-500 dark:text-red-400 font-bold">此操作將重置全部表單，無法復原！</span></p>
                                <div className="flex justify-end space-x-3">
                                    <button onClick={() => setIsConfirmResetOpen(false)} className="px-5 py-2 text-gray-600 dark:text-gray-300 bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 rounded font-bold transition-colors">取消</button>
                                    <button onClick={() => {
                                        const newAvail = {};
                                        (characters || []).forEach(c => {
                                            newAvail[c.id] = { days: Array(7).fill(false), bosses: [], bossCounts: {}, note: '', maxWeeklyRuns: 2 };
                                        });
                                        setAvailability(newAvail); 
                                        setGroups([]);             
                                        setIsConfirmResetOpen(false);
                                        setAlertMessage('已成功清空所有報名資料與排班名單！大家可以開始填寫新的一週了！');
                                    }} className="px-5 py-2 bg-yellow-600 text-white rounded font-bold hover:bg-yellow-700 shadow transition-colors">確認清空</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 更改密碼 Modal */}
                    {isChangePwdOpen && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center px-4" style={{ zIndex: 9999 }}>
                            <div className="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-2xl w-full max-w-sm border-t-8 border-blue-500 transition-colors">
                                <h2 className="text-2xl font-black mb-4 flex items-center text-gray-800 dark:text-gray-100">
                                    <span className="text-blue-500 mr-2">🔐</span> 更改登入密碼
                                </h2>
                                {pwdMsg && <div className={`p-2 mb-4 text-sm font-bold rounded border ${pwdMsg.includes('✅') ? 'bg-green-100 text-green-700 border-green-200 dark:bg-green-900/30 dark:text-green-400 dark:border-green-800' : 'bg-red-100 text-red-600 border-red-200 dark:bg-red-900/30 dark:text-red-400 dark:border-red-800'}`}>{pwdMsg}</div>}
                                <div className="space-y-4">
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">舊密碼</label>
                                        <input type="password" placeholder="請輸入目前的密碼" className="w-full p-2 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-100 rounded focus:ring-2 focus:ring-blue-500" value={pwdForm.old} onChange={e => setPwdForm({...pwdForm, old: e.target.value})} />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">新密碼 (限英數字4~8碼)</label>
                                        <input type="password" placeholder="請輸入新密碼" className="w-full p-2 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-100 rounded focus:ring-2 focus:ring-blue-500" value={pwdForm.new} onChange={e => setPwdForm({...pwdForm, new: e.target.value})} />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">確認新密碼</label>
                                        <input type="password" placeholder="再次輸入新密碼" className="w-full p-2 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-100 rounded focus:ring-2 focus:ring-blue-500" value={pwdForm.confirm} onChange={e => setPwdForm({...pwdForm, confirm: e.target.value})} />
                                    </div>
                                </div>
                                <div className="mt-6 flex justify-end space-x-3">
                                    <button onClick={() => { setIsChangePwdOpen(false); setPwdMsg(''); setPwdForm({old:'', new:'', confirm:''}); }} className="px-5 py-2 text-gray-600 dark:text-gray-300 bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 rounded font-bold transition-colors">取消</button>
                                    <button onClick={() => {
                                        const correctPasscode = (currentAccount.passcode !== undefined && currentAccount.passcode !== null) ? String(currentAccount.passcode) : (currentAccount.role === 'member' ? '1234' : 'admin');
                                        if (pwdForm.old !== correctPasscode) {
                                            setPwdMsg('❌ 舊密碼輸入錯誤！'); return;
                                        }
                                        if (!/^[a-zA-Z0-9]{4,8}$/.test(pwdForm.new)) {
                                            setPwdMsg('❌ 新密碼格式錯誤！只能使用英文與數字，長度需為 4~8 碼。'); return;
                                        }
                                        if (pwdForm.new !== pwdForm.confirm) {
                                            setPwdMsg('❌ 兩次輸入的新密碼不一致！'); return;
                                        }
                                        
                                        const newAccounts = (accounts || []).map(a => a.id === currentAccount.id ? { ...a, passcode: pwdForm.new } : a);
                                        setAccounts(newAccounts);
                                        
                                        if (getLocal('waku-raid-remember') === 'true' && getLocal('waku-raid-saved-name') === currentAccount.playerName) {
                                            setLocal('waku-raid-saved-pwd', pwdForm.new);
                                        }
                                        
                                        setPwdMsg('✅ 密碼修改成功！');
                                        setTimeout(() => {
                                            setIsChangePwdOpen(false);
                                            setPwdMsg('');
                                            setPwdForm({old:'', new:'', confirm:''});
                                        }, 1500);
                                    }} className="px-5 py-2 bg-blue-600 text-white rounded font-bold hover:bg-blue-700 shadow transition-colors">確認修改</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
