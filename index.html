                                        return sum + inMembers + inReserves;
                                    }, 0);

                                    return (
                                        <tr key={char.id} className="hover:bg-gray-50 dark:hover:bg-gray-700/50 border-b dark:border-gray-700 transition-colors">
                                            <td className="p-2 border dark:border-gray-700 font-bold text-gray-800 dark:text-gray-200">
                                                <div className="flex justify-between items-start">
                                                    <div>
                                                        {char.name}<br/>
                                                        <span className="text-xs text-gray-400 dark:text-gray-500 font-normal">{(accounts || []).find(a => a.id === char.accountId)?.playerName}</span>
                                                    </div>
                                                    {(currentAccount.role === 'admin' || currentAccount.role === 'subadmin') && (
                                                        <button 
                                                            onClick={() => {
                                                                setRegistrationToDelete(char.id);
                                                                setDeletePromptInput('');
                                                            }}
                                                            className="text-red-400 hover:text-red-600 dark:text-red-500 dark:hover:text-red-400 opacity-50 hover:opacity-100 transition-opacity ml-1 px-1 text-sm"
                                                            title="刪除此報名"
                                                        >
                                                            ✕
                                                        </button>
                                                    )}
                                                </div>
                                            </td>
                                            <td className="p-2 border dark:border-gray-700">
                                                <span style={getJobStyle(char.jobTypeId)} className="px-2.5 py-1 rounded text-sm font-bold shadow-sm">{char.job}</span>
                                                <div className="text-[11px] text-gray-500 dark:text-gray-400 font-bold mt-1 pl-1">Lv.{char.level}</div>
                                            </td>
                                            <td className="p-2 border dark:border-gray-700">
                                                <div className="flex flex-wrap gap-1">
                                                    {safeBosses.map(bId => {
                                                        const b = (bosses || []).find(x => x.id === bId);
                                                        const count = parseInt(safeBossCounts[bId]) || 1;
                                                        return b ? (
                                                            <span key={bId} style={{ borderColor: b.color, color: b.color }} className="bg-white dark:bg-gray-800 px-1.5 py-0.5 rounded border text-xs font-bold shadow-sm whitespace-nowrap">
                                                                {b.icon} {b.name} {count > 1 && `x${count}`}
                                                            </span>
                                                        ) : null;
                                                    })}
                                                </div>
                                            </td>
                                            <td className="p-2 border dark:border-gray-700 text-gray-600 dark:text-gray-400 text-xs whitespace-normal min-w-[120px]">
                                                <div className="mb-1 flex flex-wrap items-center gap-1">
                                                    {(() => {
                                                        const maxRuns = getEffectiveMaxRuns(avail);
                                                        let statusColorClass = "bg-green-50 text-green-700 border-green-300 dark:bg-green-900/30 dark:text-green-400 dark:border-green-800";
                                                        if (totalWeeklyAssigned === 0) {
                                                            statusColorClass = "bg-red-50 text-red-600 border-red-200 dark:bg-red-900/30 dark:text-red-400 dark:border-red-800";
                                                        } else if (totalWeeklyAssigned < maxRuns) {
                                                            statusColorClass = "bg-yellow-50 text-yellow-700 border-yellow-300 dark:bg-yellow-900/30 dark:text-yellow-400 dark:border-yellow-700";
                                                        }
                                                        return (
                                                            <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded border inline-block shadow-sm whitespace-nowrap ${statusColorClass}`}>
                                                                已排 {totalWeeklyAssigned} / {maxRuns} 團
                                                            </span>
                                                        );
                                                    })()}
                                                    {showRegistrationTime && avail.lastUpdated && (
                                                        <span className="text-[10px] text-gray-500 bg-gray-100 dark:bg-gray-700 px-1.5 py-0.5 rounded border border-gray-200 dark:border-gray-600 inline-block whitespace-nowrap" title="最後更新時間">
                                                            {formatUpdateTime(avail.lastUpdated)}
                                                        </span>
                                                    )}
                                                </div>
                                                <div className="break-words">{avail.note || ''}</div>
                                            </td>
                                            {safeDays.map((isAvail, dayIndex) => {
                                                const charGroupsOnDay = (groups || []).filter(g => g.dayIndex === dayIndex && ((g.members || []).includes(char.id) || (g.reserves || []).includes(char.id)));
                                                
                                                const accountGroupsOnDay = (groups || []).filter(g => 
                                                    g.dayIndex === dayIndex && 
                                                    ((g.members || []).some(m => sameAccountCharIds.includes(m)) || (g.reserves || []).some(m => sameAccountCharIds.includes(m)))
                                                );
                                                
                                                const availableGroupsOnDay = (groups || []).filter(g => {
                                                    if (g.dayIndex !== dayIndex) return false;
                                                    if (g.status === 'completed') return false; // 排除已完成的隊伍
                                                    if ((g.members || []).includes(char.id) || (g.reserves || []).includes(char.id)) return false;
                                                    
                                                    const bId = g.bossId;
                                                    if (!safeBosses.includes(bId)) return false;
                                                    if (matrixBossTab !== 'all' && bId !== matrixBossTab) return false;
                                                    
                                                    const totalCount = parseInt(safeBossCounts[bId]) || 1;
                                                    const assignedCount = (groups || []).filter(grp => grp.bossId === bId && ((grp.members || []).includes(char.id) || (grp.reserves || []).includes(char.id))).length;
                                                    const remainingCount = Math.max(0, totalCount - assignedCount);
                                                    return remainingCount > 0;
                                                });

                                                return (
                                                    <td key={dayIndex} className="p-2 border dark:border-gray-700 text-center align-top relative min-w-[90px]">
                                                        {isAvail ? (
                                                            <div className="flex flex-col items-center gap-1">
                                                                {charGroupsOnDay.map(g => {
                                                                    const b = (bosses || []).find(x => x.id === g.bossId);
                                                                    const tagColor = b ? b.color : '#3b82f6';
                                                                    
                                                                    const conflictGroups = accountGroupsOnDay.filter(ag => {
                                                                        if (ag.id === g.id) {
                                                                            return (ag.members || []).some(m => m !== char.id && sameAccountCharIds.includes(m)) || 
                                                                                   (ag.reserves || []).some(m => m !== char.id && sameAccountCharIds.includes(m));
                                                                        }
                                                                        return true; 
                                                                    });
                                                                    
                                                                    const showWarn = conflictGroups.length > 0;
                                                                    const warnTitle = showWarn ? `⚠️ 與 ${conflictGroups.map(ag => ag.name).join(', ')} 衝堂` : g.name;

                                                                    return (
                                                                        <div key={g.id} style={{ borderColor: tagColor, color: tagColor }} className={`bg-white dark:bg-gray-800 text-[11px] px-1 py-0.5 rounded flex items-center justify-between w-full shadow-sm border font-bold mb-1 ${g.status === 'completed' ? 'opacity-70 grayscale' : ''}`}>

                                                                                {g.status === 'completed' && <span className="mr-0.5" title="已完成出團">🔒</span>}
                                                                                {g.name}
                                                                            </span>
                                                                            {(currentAccount.role === 'admin' || currentAccount.role === 'subadmin') && g.status !== 'completed' && (
                                                                                <button onClick={() => removeCharFromGroup(char.id, g.id)} className="hover:opacity-70 ml-1 font-black px-1" style={{ color: tagColor }}>×</button>
                                                                            )}
                                                                        </div>
                                                                    )
                                                                })}

                                                                {/* 修正：圖示完美回歸，加入 2 團反灰保護 */}
                                                                {charGroupsOnDay.length === 0 && (
                                                                    <div className="text-lg drop-shadow-sm select-none my-1 flex flex-wrap justify-center gap-2">
                                                                        {safeBosses.map(bId => {
                                                                            const b = (bosses || []).find(x => x.id === bId);
                                                                            if (!b) return null;
                                                                            if (matrixBossTab !== 'all' && b.id !== matrixBossTab) return null;
                                                                            
                                                                            const totalCount = parseInt(safeBossCounts[bId]) || 1;
                                                                            const assignedCount = (groups || []).filter(g => g.bossId === bId && ((g.members || []).includes(char.id) || (g.reserves || []).includes(char.id))).length;
                                                                            const remainingCount = Math.max(0, totalCount - assignedCount);
                                                                            
                                                                            const maxRuns = getEffectiveMaxRuns(avail);
                                                                            const isGray = remainingCount <= 0 || totalWeeklyAssigned >= maxRuns;

                                                                            if (isGray) {
                                                                                return (
                                                                                    <span key={b.id} className="relative inline-flex items-center grayscale opacity-40" title={totalWeeklyAssigned >= maxRuns ? "已達本週出勤上限" : "排班次數已滿"}>
                                                                                        <span>{b.icon}</span>
                                                                                    </span>
                                                                                );
                                                                            } else {
                                                                                return (
                                                                                    <span key={b.id} className="relative inline-flex items-center" title={`剩餘可排: ${remainingCount} 場`}>
                                                                                        <span>{b.icon}</span>
                                                                                        {(totalCount > 1 && remainingCount > 0) && (
                                                                                            <span className="absolute -bottom-2 -right-2 text-[10px] font-black z-10" style={{color: b.color, textShadow: '1px 1px 0px #fff, -1px -1px 0px #fff, -1px 1px 0px #fff, 1px -1px 0px #fff'}}>
                                                                                                x{remainingCount}
                                                                                            </span>
                                                                                        )}
                                                                                    </span>
                                                                                );
                                                                            }
                                                                        })}
                                                                        {!(safeBosses && safeBosses.length > 0) && <span className="font-bold text-red-500 text-sm tracking-normal">V</span>}
                                                                    </div>
                                                                )}

                                                                {(currentAccount.role === 'admin' || currentAccount.role === 'subadmin') && (
                                                                    totalWeeklyAssigned >= getEffectiveMaxRuns(avail) ? (
                                                                        <div className="w-full text-[10px] text-red-500 text-center mt-1 bg-red-50 dark:bg-red-900/30 border border-red-200 dark:border-red-800 rounded py-0.5 font-bold" title="此角色已達本週出勤上限">
                                                                            已達上限
                                                                        </div>
                                                                    ) : availableGroupsOnDay.length > 0 ? (
                                                                        <select
                                                                            className="w-full text-[11px] p-1 border border-blue-300 dark:border-blue-700 rounded mt-1 bg-blue-50 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300 cursor-pointer font-bold focus:outline-none focus:ring-1 focus:ring-blue-500"
                                                                            value=""
                                                                            onChange={(e) => assignCharToGroup(char.id, e.target.value)}
                                                                            title="直接指派到王團"
                                                                        >
                                                                            <option value="" disabled>+ 快速指派</option>
                                                                            {availableGroupsOnDay.map(g => {
                                                                                const conflictNames = accountGroupsOnDay.map(ag => ag.name);
                                                                                const warnText = conflictNames.length > 0 ? ` (⚠️已排: ${conflictNames.join(', ')})` : '';
                                                                                return (
                                                                                    <option key={g.id} value={g.id} className="dark:bg-gray-800 dark:text-gray-200">
                                                                                        {g.name}{warnText}
                                                                                    </option>
                                                                                )
                                                                            })}
                                                                        </select>
                                                                    ) : (
                                                                        charGroupsOnDay.length === 0 && !(groups || []).some(g => g.dayIndex === dayIndex) && (
                                                                            <div className="w-full text-[10px] text-gray-400 text-center mt-1 bg-gray-50 dark:bg-gray-700/50 border border-gray-200 dark:border-gray-600 rounded py-0.5" title="請先至排班頁面新增該日期的王團">
                                                                                本日未開團
                                                                            </div>
                                                                        )
                                                                    )
                                                                )}
                                                            </div>
                                                        ) : (
                                                            <span className="text-gray-300 dark:text-gray-600">-</span>
                                                        )}
                                                    </td>
                                                );
                                            })}
                                        </tr>
                                    );
                                })}
                            </tbody>
                        </table>
                    </div>
                );
            };

            const renderRaidPlanner = () => {
                const myCharIds = (characters || []).filter(c => c.accountId === currentAccount.id).map(c => c.id);

                const getConflictGroupNames = (charId, currentGroupId, dayIndex) => {
                    if (!charId) return [];
                    const targetChar = (characters || []).find(c => c.id === charId);
                    if (!targetChar) return [];
                    const sameAccountCharIds = (characters || []).filter(c => c.accountId === targetChar.accountId).map(c => c.id);

                    const conflicts = (groups || []).filter(g => {
                        if (g.dayIndex !== parseInt(dayIndex)) return false;
                        if (g.id === currentGroupId) {
                            return (g.members || []).some(m => m !== charId && sameAccountCharIds.includes(m)) || 
                                   (g.reserves || []).some(m => m !== charId && sameAccountCharIds.includes(m));
                        } else {
                            return (g.members || []).some(m => sameAccountCharIds.includes(m)) || 
                                   (g.reserves || []).some(m => sameAccountCharIds.includes(m));
                        }
                    });
                    return conflicts.map(c => c.name);
                };

                const handleAssign = (groupId, slotType, slotIndex, charId) => {
                    const currentGroup = (groups || []).find(g => g.id === groupId);
                    if (currentGroup && currentGroup.status === 'completed') {
                        setAlertMessage('⚠️ 此隊伍已鎖定 (已完成出團)，無法更改名單！');
                        return;
                    }

                    if (charId) {
                        const totalWeeklyAssigned = (groups || []).reduce((sum, g) => {
                            const inMembers = (g.members || []).includes(charId) ? 1 : 0;
                            const inReserves = (g.reserves || []).includes(charId) ? 1 : 0;
                            return sum + inMembers + inReserves;
                        }, 0);
                        const isCurrentlyInSlot = currentGroup && currentGroup[slotType] && currentGroup[slotType][slotIndex] === charId;
                        
                        const avail = (availability || {})[charId] || {};
                        const maxRuns = getEffectiveMaxRuns(avail);
                        
                        if (!isCurrentlyInSlot && totalWeeklyAssigned >= maxRuns) {
                            setAlertMessage(`⚠️ 指派失敗！此角色本週已達 ${maxRuns} 團出勤上限。`);
                            return;
                        }
                    }

                    const newGroups = (groups || []).map(g => {
                        if (g.id === groupId) {
                            const updatedList = [...(g[slotType] || [])];
                            updatedList[slotIndex] = charId;
                            return { ...g, [slotType] : updatedList };
                        }
                        return g;
                    });
                    setGroups(newGroups);
                };

                return (
                    <div className="space-y-8">
                        <div className="flex justify-between items-center bg-white dark:bg-gray-800 p-4 rounded-lg shadow border-l-4 border-indigo-500 transition-colors">

                                <h2 className="text-2xl font-bold text-gray-800 dark:text-gray-100">突襲成團表</h2>
                                <div className="bg-gray-100 dark:bg-gray-700 p-1 rounded-lg flex space-x-1 border border-gray-200 dark:border-gray-600 shadow-inner">
                                    <button 
                                        onClick={() => setRaidFilterMode('all')} 
                                        className={`px-3 py-1 text-sm font-bold rounded-md transition-colors ${raidFilterMode === 'all' ? 'bg-white dark:bg-gray-800 text-indigo-700 dark:text-indigo-400 shadow-sm' : 'text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200'}`}
                                    >顯示全部隊伍</button>
                                    <button 
                                        onClick={() => setRaidFilterMode('mine')} 
                                        className={`px-3 py-1 text-sm font-bold rounded-md transition-colors ${raidFilterMode === 'mine' ? 'bg-white dark:bg-gray-800 text-indigo-700 dark:text-indigo-400 shadow-sm' : 'text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200'}`}
                                    >顯示自己隊伍</button>
                                </div>
                            </div>
                            {(currentAccount.role === 'admin' || currentAccount.role === 'subadmin') && (
                                <button onClick={() => handleOpenCreateModal(0)} className="bg-indigo-600 text-white px-4 py-2 rounded font-bold hover:bg-indigo-700 shadow transition-colors">
                                    + 新增隊伍
                                </button>
                            )}
                        </div>

                        {(bosses || []).map(boss => {
                            const bossGroups = (groups || []).filter(g => {
                                if (g.bossId !== boss.id) return false;
                                if (raidFilterMode === 'mine') {
                                    return (g.members || []).some(mId => myCharIds.includes(mId)) || (g.reserves || []).some(mId => myCharIds.includes(mId));
                                }
                                return true;
                            });
                            
                            if(bossGroups.length === 0) return null;

                            return (
                                <div key={boss.id} className="bg-white dark:bg-gray-800 p-5 rounded-lg shadow-md border border-gray-200 dark:border-gray-700 transition-colors">
                                    <h3 className="text-xl font-black mb-4 border-b dark:border-gray-700 pb-2 flex items-center">
                                        <span className="mr-2 text-2xl drop-shadow-sm">{boss.icon}</span> 
                                        <span style={{ color: boss.color }}>{boss.name}</span>
                                    </h3>
                                    
                                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                        {bossGroups.map(group => {
                                            const safeMembers = group.members || ['', '', '', '', '', ''];
                                            const isCompleted = group.status === 'completed';
                                            return (
                                            <div key={group.id} className={`rounded-lg border overflow-hidden ${isCompleted ? 'bg-gray-100 border-gray-300 dark:bg-gray-800/80 dark:border-gray-600' : 'bg-gray-50 dark:bg-gray-700/30 border-gray-300 dark:border-gray-700'}`}>
                                                <div className={`border-b p-3 flex flex-wrap justify-between items-center gap-y-2 ${isCompleted ? 'bg-gray-300 border-gray-400 dark:bg-gray-700 dark:border-gray-600' : 'bg-gray-200 border-gray-300 dark:bg-gray-700 dark:border-gray-600'}`}>
                                                    <div className="flex items-center space-x-2">
                                                        {(currentAccount.role === 'admin' || currentAccount.role === 'subadmin') ? (
                                                            <button 
                                                                onClick={() => setGroupStatusToToggle({ id: group.id, newStatus: (isCompleted ? 'pending' : 'completed') })}
                                                                className={`px-2 py-1 rounded text-xs font-bold transition-colors border shadow-sm ${isCompleted ? 'bg-green-100 text-green-700 border-green-300 hover:bg-green-200 dark:bg-green-900/40 dark:text-green-400 dark:border-green-700' : 'bg-gray-100 text-gray-600 border-gray-300 hover:bg-gray-200 dark:bg-gray-600 dark:text-gray-300 dark:border-gray-500 dark:hover:bg-gray-500'}`}
                                                            >
                                                                {isCompleted ? '🔒 已完成出團' : '未出團'}
                                                            </button>
                                                        ) : (
                                                            isCompleted && (
                                                                <span className="px-2 py-1 rounded text-xs font-bold bg-green-100 text-green-700 border border-green-300 dark:bg-green-900/40 dark:text-green-400 dark:border-green-700 shadow-sm">
                                                                    🔒 已完成出團
                                                                </span>
                                                            )
                                                        )}
                                                        <h4 className={`font-bold ${isCompleted ? 'text-gray-600 dark:text-gray-400' : 'text-gray-800 dark:text-gray-100'}`}>{group.name}</h4>
                                                    </div>
                                                    <div className="flex items-center space-x-2">
                                                        <div className={`text-sm font-bold px-2 py-1 rounded border ${isCompleted ? 'text-gray-500 bg-gray-50 border-gray-300 dark:bg-gray-800 dark:border-gray-600 dark:text-gray-400' : 'text-indigo-700 dark:text-indigo-300 bg-white dark:bg-gray-800 border-indigo-200 dark:border-indigo-700'}`}>
                                                            {days[group.dayIndex].split(' ')[0]} ({days[group.dayIndex].split(' ')[1]}) | {group.time}
                                                        </div>
                                                        {(currentAccount.role === 'admin' || currentAccount.role === 'subadmin') && !isCompleted && (
                                                            <button 
                                                                onClick={() => setGroupToDelete(group.id)} 
                                                                className="text-red-600 dark:text-red-400 hover:text-white dark:hover:text-white hover:bg-red-600 dark:hover:bg-red-500 border border-red-300 dark:border-red-800 px-2 rounded text-xs py-1 transition-colors"
                                                                title="刪除隊伍"
                                                            >
                                                                刪除
                                                            </button>
                                                        )}
                                                    </div>
                                                </div>
                                                <div className="p-3">
                                                    <table className="w-full text-sm mb-2">
                                                        <thead>
                                                            <tr className={`${isCompleted ? 'bg-gray-200/50 dark:bg-gray-700/30' : 'bg-gray-100 dark:bg-gray-700/50'}`}>
                                                                <th className="p-2 text-center w-10 border dark:border-gray-600 text-gray-600 dark:text-gray-400">#</th>
                                                                <th className="p-2 text-left border dark:border-gray-600 w-2/5 text-gray-800 dark:text-gray-200">角色名稱</th>
                                                                <th className="p-2 text-center border dark:border-gray-600 w-1/4 text-gray-800 dark:text-gray-200">職業Lv.</th>
                                                                <th className="p-2 text-left border dark:border-gray-600 text-gray-800 dark:text-gray-200">報名備註</th>
                                                            </tr>
                                                        </thead>
                                                        <tbody>
                                                            {safeMembers.map((memberId, idx) => {
                                                                const char = (characters || []).find(c => c.id === memberId);
                                                                const avail = char ? (availability || {})[char.id] : null;
                                                                
                                                                const conflictNames = getConflictGroupNames(memberId, group.id, group.dayIndex);
                                                                
                                                                let isOverQuota = false;
                                                                let isOverWeeklyQuota = false;
                                                                let isDuplicateInGroup = false;
                                                                
                                                                if (memberId && char) {
                                                                    const cAvail = (availability || {})[memberId] || {};
                                                                    const isBossChecked = cAvail.bosses && cAvail.bosses.includes(group.bossId);
                                                                    const totalCount = isBossChecked ? (parseInt(cAvail.bossCounts?.[group.bossId]) || 1) : 0;
                                                                    const assignedCount = (groups || []).filter(grp => grp.bossId === group.bossId && ((grp.members || []).includes(memberId) || (grp.reserves || []).includes(memberId))).length;
                                                                    
                                                                    if (assignedCount > totalCount) isOverQuota = true;
                                                                    if (safeMembers.filter(m => m === memberId).length > 1) isDuplicateInGroup = true;

                                                                    const totalWeeklyAssigned = (groups || []).reduce((sum, g) => {
                                                                        const inMembers = (g.members || []).includes(memberId) ? 1 : 0;
                                                                        const inReserves = (g.reserves || []).includes(memberId) ? 1 : 0;
                                                                        return sum + inMembers + inReserves;
                                                                    }, 0);
                                                                    const maxRuns = getEffectiveMaxRuns(cAvail);
                                                                    if (totalWeeklyAssigned > maxRuns) isOverWeeklyQuota = true;
                                                                }
                                                                
                                                                let warnArr = [];
                                                                if (conflictNames.length > 0) warnArr.push(`衝堂: ${conflictNames.join(', ')}`);
                                                                if (isOverWeeklyQuota) warnArr.push(`逾上限`);
                                                                else if (isOverQuota) warnArr.push(`單王滿/未報`);
                                                                if (isDuplicateInGroup) warnArr.push(`重複`);
                                                                
                                                                const warningText = warnArr.length > 0 ? `(⚠️ ${warnArr.join(', ')})` : '';

                                                                const isMyChar = myCharIds.includes(memberId);
                                                                const highlightClasses = isMyChar ? 'bg-yellow-100 dark:bg-yellow-900/30 text-yellow-900 dark:text-yellow-200 border-yellow-400 dark:border-yellow-600 ring-2 ring-yellow-400' : 'bg-blue-50 dark:bg-blue-900/20 text-blue-800 dark:text-blue-300 border-blue-300 dark:border-blue-700';
                                                                const highlightClassesReadOnly = isMyChar ? 'bg-yellow-100 dark:bg-yellow-900/30 text-yellow-900 dark:text-yellow-200 border-yellow-400 dark:border-yellow-600 ring-1 ring-yellow-400' : 'bg-gray-50 dark:bg-gray-700 text-gray-800 dark:text-gray-200 border-transparent';
                                                                const lockedClasses = isCompleted ? 'opacity-70 bg-gray-200 dark:bg-gray-800 cursor-not-allowed' : '';

                                                                return (
                                                                    <tr key={idx} className={`border-b dark:border-gray-700 transition-colors ${isCompleted ? 'bg-gray-50 dark:bg-gray-800' : 'bg-white dark:bg-gray-800 hover:bg-gray-50 dark:hover:bg-gray-700/50'}`}>
                                                                        <td className="p-2 border dark:border-gray-600 text-center font-bold text-gray-400 dark:text-gray-500">{idx + 1}</td>
                                                                        <td className="p-1 border dark:border-gray-600">
                                                                            {(currentAccount.role === 'admin' || currentAccount.role === 'subadmin') ? (
                                                                                <div className="relative focus-within:ring-2 focus-within:ring-blue-400 rounded">
                                                                                    <div className={`w-full p-1.5 border rounded font-bold text-sm flex justify-between items-center ${memberId ? highlightClasses : 'bg-gray-50 dark:bg-gray-700 text-gray-500 dark:text-gray-400 border-gray-200 dark:border-gray-600'} transition-all ${lockedClasses}`}>
                                                                                        <span className="truncate">
                                                                                            {memberId ? (
                                                                                                <React.Fragment>
                                                                                                    {char ? char.name : '未知角色'}
                                                                                                    {warningText && <span className="text-orange-500 text-[10px] ml-1 font-normal">{warningText}</span>}
                                                                                                </React.Fragment>
                                                                                            ) : '- 選擇隊員 -'}
                                                                                        </span>
                                                                                        {isCompleted ? (
                                                                                            <span title="已鎖定" className="ml-1 text-[10px]">🔒</span>
                                                                                        ) : (
                                                                                            <svg className="w-4 h-4 ml-1 flex-shrink-0 text-gray-400 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 9l-7 7-7-7"></path></svg>
                                                                                        )}
                                                                                    </div>
                                                                                    <select 
                                                                                        className="absolute inset-0 w-full h-full opacity-0 cursor-pointer disabled:cursor-not-allowed"
                                                                                        value={memberId}
                                                                                        disabled={isCompleted}
                                                                                        onChange={(e) => handleAssign(group.id, 'members', idx, e.target.value)}
                                                                                    >
                                                                                        <option value="">- 選擇隊員 -</option>
                                                                                        {(() => {
                                                                                            // 修改: 讓下拉選單內的職業排序依照自訂順序
                                                                                            const sortedPlannerChars = [...(characters || [])].sort((a, b) => {
                                                                                                const idxA = (jobCategories || []).findIndex(j => j.id === a.jobTypeId);
                                                                                                const idxB = (jobCategories || []).findIndex(j => j.id === b.jobTypeId);
                                                                                                const posA = idxA !== -1 ? idxA : 9999;
                                                                                                const posB = idxB !== -1 ? idxB : 9999;
                                                                                                if (posA !== posB) return posA - posB;
                                                                                                return b.level - a.level;
                                                                                            });

                                                                                            const eligible = [];
                                                                                            const quotaFull = [];
                                                                                            const weeklyFullList = [];
                                                                                            const others = [];
                                                                                            
                                                                                            sortedPlannerChars.forEach(c => {
                                                                                                if (safeMembers.includes(c.id) && c.id !== memberId) return;

                                                                                                const cAvail = (availability || {})[c.id] || {};
                                                                                                const safeCDays = cAvail.days || [];
                                                                                                const isDayChecked = safeCDays[group.dayIndex];
                                                                                                const safeCBosses = cAvail.bosses || [];
                                                                                                const isBossChecked = safeCBosses.includes(group.bossId);
                                                                                                
                                                                                                const totalWeeklyAssigned = (groups || []).reduce((sum, g) => {
                                                                                                    const inMembers = (g.members || []).includes(c.id) ? 1 : 0;
                                                                                                    const inReserves = (g.reserves || []).includes(c.id) ? 1 : 0;
                                                                                                    return sum + inMembers + inReserves;
                                                                                                }, 0);
                                                                                                let adjustedWeeklyAssigned = totalWeeklyAssigned;
                                                                                                if (memberId === c.id) adjustedWeeklyAssigned -= 1;
                                                                                                
                                                                                                const maxRuns = getEffectiveMaxRuns(cAvail);
                                                                                                const remainingWeeklyQuota = Math.max(0, maxRuns - adjustedWeeklyAssigned);

                                                                                                let remainingBossQuota = 0;
                                                                                                if (isBossChecked) {
                                                                                                    const safeCBossCounts = cAvail.bossCounts || {};
                                                                                                    const totalBossCount = parseInt(safeCBossCounts[group.bossId]) || 1;
                                                                                                    const assignedBossCount = (groups || []).filter(grp => grp.bossId === group.bossId && ((grp.members || []).includes(c.id) || (grp.reserves || []).includes(c.id))).length;
                                                                                                    let adjustedAssignedBoss = assignedBossCount;
                                                                                                    if (memberId === c.id) adjustedAssignedBoss -= 1;
                                                                                                    remainingBossQuota = Math.max(0, totalBossCount - adjustedAssignedBoss);
                                                                                                }

                                                                                                const charData = { char: c, assigned: Math.max(0, adjustedWeeklyAssigned), maxRuns };

                                                                                                if (remainingWeeklyQuota <= 0) {
                                                                                                    weeklyFullList.push(charData);
                                                                                                } else if (isDayChecked && isBossChecked) {
                                                                                                    if (remainingBossQuota <= 0) {
                                                                                                        quotaFull.push(charData);
                                                                                                    } else {
                                                                                                        eligible.push(charData);
                                                                                                    }
                                                                                                } else {
                                                                                                    others.push(charData);
                                                                                                }
                                                                                            });

                                                                                            const renderOpt = (data, type) => {
                                                                                                const { char: c, assigned, maxRuns } = data;
                                                                                                const cConflicts = getConflictGroupNames(c.id, group.id, group.dayIndex);
                                                                                                let tags = [];
                                                                                                if (cConflicts.length > 0) tags.push(`衝堂: ${cConflicts.join(', ')}`);
                                                                                                if (type === 'weeklyFull') tags.push('已達上限');
                                                                                                else if (type === 'quotaFull') tags.push('單王滿');
                                                                                                
                                                                                                const cWarn = tags.length > 0 ? ` (⚠️ ${tags.join(', ')})` : '';
                                                                                                return (
                                                                                                    <option key={c.id} value={c.id} className="dark:bg-gray-800 dark:text-gray-200" disabled={type === 'weeklyFull'}>
                                                                                                        [{c.job}] {c.name} ({assigned}/{maxRuns}團){cWarn}
                                                                                                    </option>
                                                                                                );
                                                                                            };

                                                                                            return (
                                                                                                <React.Fragment>
                                                                                                    {eligible.length > 0 && (
                                                                                                        <optgroup label="✅ 符合條件 (有報名)">
                                                                                                            {eligible.map(data => renderOpt(data, 'eligible'))}
                                                                                                        </optgroup>
                                                                                                    )}
                                                                                                    {quotaFull.length > 0 && (
                                                                                                        <optgroup label="⚠️ 次數用盡 (已排滿)">
                                                                                                            {quotaFull.map(data => renderOpt(data, 'quotaFull'))}
                                                                                                        </optgroup>
                                                                                                    )}
                                                                                                    {weeklyFullList.length > 0 && (
                                                                                                        <optgroup label="⛔ 本週已達上限 (強制無法指派)">
                                                                                                            {weeklyFullList.map(data => renderOpt(data, 'weeklyFull'))}
                                                                                                        </optgroup>
                                                                                                    )}
                                                                                                    {others.length > 0 && (
                                                                                                        <optgroup label="❌ 未報名 (強制指派)">
                                                                                                            {others.map(data => renderOpt(data, 'others'))}
                                                                                                        </optgroup>
                                                                                                    )}
                                                                                                </React.Fragment>
                                                                                            );
                                                                                        })()}
                                                                                    </select>
                                                                                </div>
                                                                            ) : (
                                                                                <div className={`p-1 flex items-center space-x-2 rounded ${isMyChar ? highlightClassesReadOnly : ''} ${isCompleted ? 'opacity-70' : ''}`}>
                                                                                    {char ? (
                                                                                        <span className="font-bold text-gray-800 dark:text-gray-200">{char.name} {warningText && <span className="text-orange-500 text-xs ml-1">{warningText}</span>}</span>
                                                                                    ) : <span className="text-gray-400 dark:text-gray-500">-</span>}
                                                                                </div>
                                                                            )}
                                                                        </td>
                                                                        <td className={`p-1 border dark:border-gray-600 text-center ${isCompleted ? 'opacity-70 grayscale' : ''}`}>
                                                                            {char ? (
                                                                                <span style={getJobStyle(char.jobTypeId, true)} className="px-2.5 py-1 rounded text-sm font-bold inline-block shadow-sm whitespace-nowrap">
                                                                                    {char.job} {char.level}
                                                                                </span>
                                                                            ) : (
                                                                                <span className="text-gray-300 dark:text-gray-600">-</span>
                                                                            )}
                                                                        </td>
                                                                        <td className={`p-2 border dark:border-gray-600 text-xs text-gray-600 dark:text-gray-400 truncate max-w-[120px] ${isCompleted ? 'opacity-70' : ''}`}>{avail ? avail.note : ''}</td>
                                                                    </tr>
                                                                )
                                                            })}
                                                        </tbody>
                                                    </table>
                                                </div>
                                            </div>
                                        )})}
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                );
            };

             const renderSystemManagement = () => {
