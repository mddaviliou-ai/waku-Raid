                                   (g.reserves || []).some(m => sameAccountCharIds.includes(m));
                        }
                    });
                    return conflicts.map(c => c.name);
                };

                const handleAssign = (groupId, slotType, slotIndex, charId) => {
                    const newGroups = (groups || []).map(g => {
                        if (g.id === groupId) {
                            const updatedList = [...(g[slotType] || [])];
                            updatedList[slotIndex] = charId;
                            return { ...g, [slotType]: updatedList };
                        }
                        return g;
                    });
                    setGroups(newGroups);
                };

                return (
                    <div className="space-y-8">
                        <div className="flex justify-between items-center bg-white dark:bg-gray-800 p-4 rounded-lg shadow border-l-4 border-indigo-500 transition-colors">
                            <div className="flex items-center space-x-4">
                                <h2 className="text-2xl font-bold text-gray-800 dark:text-gray-100">突襲成團表</h2>
                                <div className="bg-gray-100 dark:bg-gray-700 p-1 rounded-lg flex space-x-1 border border-gray-200 dark:border-gray-600 shadow-inner">
                                    <button 
                                        onClick={() => setRaidFilterMode('all')} 
                                        className={`px-3 py-1 text-sm font-bold rounded-md transition-colors ${raidFilterMode === 'all' ? 'bg-white dark:bg-gray-800 text-indigo-700 dark:text-indigo-400 shadow-sm' : 'text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200'}`}
                                    >顯示全部隊伍</button>
                                    <button 
                                        onClick={() => setRaidFilterMode('mine')} 
                                        className={`px-3 py-1 text-sm font-bold rounded-md transition-colors ${raidFilterMode === 'mine' ? 'bg-white dark:bg-gray-800 text-indigo-700 dark:text-indigo-400 shadow-sm' : 'text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200'}`}
                                    >顯示自己隊伍</button>
                                </div>
                            </div>
                            {(currentAccount.role === 'admin' || currentAccount.role === 'subadmin') && (
                                <button onClick={() => onOpenCreateModal(0)} className="bg-indigo-600 text-white px-4 py-2 rounded font-bold hover:bg-indigo-700 shadow transition-colors">
                                    + 新增隊伍
                                </button>
                            )}
                        </div>

                        {(bosses || []).map(boss => {
                            const bossGroups = (groups || []).filter(g => {
                                if (g.bossId !== boss.id) return false;
                                if (raidFilterMode === 'mine') {
                                    // 只顯示有包含自己角色的隊伍
                                    return (g.members || []).some(mId => myCharIds.includes(mId)) || (g.reserves || []).some(mId => myCharIds.includes(mId));
                                }
                                return true;
                            });
                            
                            if(bossGroups.length === 0) return null;

                            return (
                                <div key={boss.id} className="bg-white dark:bg-gray-800 p-5 rounded-lg shadow-md border border-gray-200 dark:border-gray-700 transition-colors">
                                    <h3 className="text-xl font-black mb-4 border-b dark:border-gray-700 pb-2 flex items-center">
                                        <span className="mr-2 text-2xl drop-shadow-sm">{boss.icon}</span> 
                                        <span style={{ color: boss.color }}>{boss.name}</span>
                                    </h3>
                                    
                                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                        {bossGroups.map(group => {
                                            const safeMembers = group.members || ['', '', '', '', '', ''];
                                            return (
                                            <div key={group.id} className="bg-gray-50 dark:bg-gray-700/30 rounded-lg border border-gray-300 dark:border-gray-700 overflow-hidden">
                                                <div className="bg-gray-200 dark:bg-gray-700 border-b border-gray-300 dark:border-gray-600 p-3 flex justify-between items-center">
                                                    <h4 className="font-bold text-gray-800 dark:text-gray-100">{group.name}</h4>
                                                    <div className="flex items-center space-x-2">
                                                        <div className="text-sm font-bold text-indigo-700 dark:text-indigo-300 bg-white dark:bg-gray-800 px-2 py-1 rounded border border-indigo-200 dark:border-indigo-700">
                                                            {days[group.dayIndex].split(' ')[0]} ({days[group.dayIndex].split(' ')[1]}) | {group.time}
                                                        </div>
                                                        {(currentAccount.role === 'admin' || currentAccount.role === 'subadmin') && (
                                                            <button 
                                                                onClick={() => handleDeleteGroup(group.id)} 
                                                                className="text-red-600 dark:text-red-400 hover:text-white dark:hover:text-white hover:bg-red-600 dark:hover:bg-red-500 border border-red-300 dark:border-red-800 px-2 rounded text-xs py-1 transition-colors"
                                                                title="刪除隊伍"
                                                            >
                                                                刪除
                                                            </button>
                                                        )}
                                                    </div>
                                                </div>
                                                <div className="p-3">
                                                    <table className="w-full text-sm mb-2">
                                                        <thead>
                                                            <tr className="bg-gray-100 dark:bg-gray-700/50">
                                                                <th className="p-2 text-center w-10 border dark:border-gray-600 text-gray-600 dark:text-gray-400">#</th>
                                                                <th className="p-2 text-left border dark:border-gray-600 w-2/5 text-gray-800 dark:text-gray-200">角色名稱</th>
                                                                <th className="p-2 text-center border dark:border-gray-600 w-1/4 text-gray-800 dark:text-gray-200">職業Lv.</th>
                                                                <th className="p-2 text-left border dark:border-gray-600 text-gray-800 dark:text-gray-200">報名備註</th>
                                                            </tr>
                                                        </thead>
                                                        <tbody>
                                                            {safeMembers.map((memberId, idx) => {
                                                                const char = (characters || []).find(c => c.id === memberId);
                                                                const avail = char ? (availability || {})[char.id] : null;
                                                                
                                                                // 取得目前格子的衝突資訊
                                                                const conflictNames = getConflictGroupNames(memberId, group.id, group.dayIndex);
                                                                
                                                                let isOverQuota = false;
                                                                let isDuplicateInGroup = false;
                                                                
                                                                // 【防呆】檢查已經選進來的人，有沒有超過次數或是在同一團出現兩次
                                                                if (memberId && char) {
                                                                    const cAvail = (availability || {})[memberId] || {};
                                                                    const isBossChecked = cAvail.bosses && cAvail.bosses.includes(group.bossId);
                                                                    const totalCount = isBossChecked ? (parseInt(cAvail.bossCounts?.[group.bossId]) || 1) : 0;
                                                                    const assignedCount = (groups || []).filter(grp => grp.bossId === group.bossId && ((grp.members || []).includes(memberId) || (grp.reserves || []).includes(memberId))).length;
                                                                    
                                                                    if (assignedCount > totalCount) isOverQuota = true;
                                                                    if (safeMembers.filter(m => m === memberId).length > 1) isDuplicateInGroup = true;
                                                                }
                                                                
                                                                let warnArr = [];
                                                                if (conflictNames.length > 0) warnArr.push(`衝堂: ${conflictNames.join(', ')}`);
                                                                if (isOverQuota) warnArr.push(`超排/未報名`);
                                                                if (isDuplicateInGroup) warnArr.push(`重複入隊`);
                                                                
                                                                const warningText = warnArr.length > 0 ? `(⚠️ ${warnArr.join(', ')})` : '';

                                                                // 高亮判斷
                                                                const isMyChar = myCharIds.includes(memberId);
                                                                const highlightClasses = isMyChar ? 'bg-yellow-100 dark:bg-yellow-900/30 text-yellow-900 dark:text-yellow-200 border-yellow-400 dark:border-yellow-600 ring-2 ring-yellow-400' : 'bg-blue-50 dark:bg-blue-900/20 text-blue-800 dark:text-blue-300 border-blue-300 dark:border-blue-700';
                                                                const highlightClassesReadOnly = isMyChar ? 'bg-yellow-100 dark:bg-yellow-900/30 text-yellow-900 dark:text-yellow-200 border-yellow-400 dark:border-yellow-600 ring-1 ring-yellow-400' : 'bg-gray-50 dark:bg-gray-700 text-gray-800 dark:text-gray-200 border-transparent';

                                                                return (
                                                                    <tr key={idx} className="border-b dark:border-gray-700 bg-white dark:bg-gray-800 hover:bg-gray-50 dark:hover:bg-gray-700/50 transition-colors">
                                                                        <td className="p-2 border dark:border-gray-600 text-center font-bold text-gray-400 dark:text-gray-500">{idx + 1}</td>
                                                                        <td className="p-1 border dark:border-gray-600">
                                                                            {(currentAccount.role === 'admin' || currentAccount.role === 'subadmin') ? (
                                                                                <div className="relative focus-within:ring-2 focus-within:ring-blue-400 rounded">
                                                                                    {/* 表面顯示的 UI (只顯示名稱與動態防呆警告) */}
                                                                                    <div className={`w-full p-1.5 border rounded font-bold text-sm flex justify-between items-center ${memberId ? highlightClasses : 'bg-gray-50 dark:bg-gray-700 text-gray-500 dark:text-gray-400 border-gray-200 dark:border-gray-600'} transition-all`}>
                                                                                        <span className="truncate">
                                                                                            {memberId ? (
                                                                                                <>
                                                                                                    {char ? char.name : '未知角色'}
                                                                                                    {warningText && <span className="text-orange-500 text-[10px] ml-1 font-normal">{warningText}</span>}
                                                                                                </>
                                                                                            ) : '- 選擇隊員 -'}
                                                                                        </span>
                                                                                        <svg className="w-4 h-4 ml-1 flex-shrink-0 text-gray-400 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 9l-7 7-7-7"></path></svg>
                                                                                    </div>
                                                                                    {/* 隱藏但可點選的原生 Select (下拉會顯示完整資訊與精確的防呆分類) */}
                                                                                    <select 
                                                                                        className="absolute inset-0 w-full h-full opacity-0 cursor-pointer"
                                                                                        value={memberId}
                                                                                        onChange={(e) => handleAssign(group.id, 'members', idx, e.target.value)}
                                                                                    >
                                                                                        <option value="">- 選擇隊員 -</option>
                                                                                        {(() => {
                                                                                            const eligible = [];
                                                                                            const quotaFull = [];
                                                                                            const others = [];
                                                                                            
                                                                                            (characters || []).forEach(c => {
                                                                                                // 【防呆】如果這個角色已經在這個隊伍的其他格子裡，就直接隱藏不讓他重複選
                                                                                                if (safeMembers.includes(c.id) && c.id !== memberId) return;

                                                                                                const cAvail = (availability || {})[c.id] || {};
                                                                                                const safeCDays = cAvail.days || [];
                                                                                                const isDayChecked = safeCDays[group.dayIndex];
                                                                                                const safeCBosses = cAvail.bosses || [];
                                                                                                const isBossChecked = safeCBosses.includes(group.bossId);
                                                                                                
                                                                                                let remainingCount = 0;
                                                                                                if (isBossChecked) {
                                                                                                    const safeCBossCounts = cAvail.bossCounts || {};
                                                                                                    const totalCount = parseInt(safeCBossCounts[group.bossId]) || 1;
                                                                                                    const assignedCount = (groups || []).filter(grp => grp.bossId === group.bossId && ((grp.members || []).includes(c.id) || (grp.reserves || []).includes(c.id))).length;
                                                                                                    let adjustedAssigned = assignedCount;
                                                                                                    // 【校正回歸】如果我們正在評估的這個選單格子本來就是選這個人，要把他自己的這個名額吐回去，才能正確計算如果維持不變是否還有資格
                                                                                                    if (memberId === c.id) {
                                                                                                       adjustedAssigned -= 1;
                                                                                                    }
                                                                                                    remainingCount = Math.max(0, totalCount - adjustedAssigned);
                                                                                                }

                                                                                                if (isDayChecked && isBossChecked) {
                                                                                                    if (remainingCount > 0) {
                                                                                                        eligible.push(c);
                                                                                                    } else {
                                                                                                        quotaFull.push(c);
                                                                                                    }
                                                                                                } else {
                                                                                                    others.push(c);
                                                                                                }
                                                                                            });

                                                                                            const renderOpt = (c, type) => {
                                                                                                const cConflicts = getConflictGroupNames(c.id, group.id, group.dayIndex);
                                                                                                let tags = [];
                                                                                                if (cConflicts.length > 0) tags.push(`衝堂: ${cConflicts.join(', ')}`);
                                                                                                if (type === 'quotaFull') tags.push('次數滿');
                                                                                                
                                                                                                const cWarn = tags.length > 0 ? ` (⚠️ ${tags.join(', ')})` : '';
                                                                                                return (
                                                                                                    <option key={c.id} value={c.id} className="dark:bg-gray-800 dark:text-gray-200">
                                                                                                        [{c.job}] {c.name} (Lv.{c.level}){cWarn}
                                                                                                    </option>
                                                                                                );
                                                                                            };

                                                                                            return (
                                                                                                <React.Fragment>
                                                                                                    {eligible.length > 0 && (
                                                                                                        <optgroup label="✅ 符合條件 (有報名)">
                                                                                                            {eligible.map(c => renderOpt(c, 'eligible'))}
                                                                                                        </optgroup>
                                                                                                    )}
                                                                                                    {quotaFull.length > 0 && (
                                                                                                        <optgroup label="⚠️ 次數用盡 (已排滿)">
                                                                                                            {quotaFull.map(c => renderOpt(c, 'quotaFull'))}
                                                                                                        </optgroup>
                                                                                                    )}
                                                                                                    {others.length > 0 && (
                                                                                                        <optgroup label="❌ 未報名 (強制指派)">
                                                                                                            {others.map(c => renderOpt(c, 'others'))}
                                                                                                        </optgroup>
                                                                                                    )}
                                                                                                </React.Fragment>
                                                                                            );
                                                                                        })()}
                                                                                    </select>
                                                                                </div>
                                                                            ) : (
                                                                                <div className={`p-1 flex items-center space-x-2 rounded ${isMyChar ? highlightClassesReadOnly : ''}`}>
                                                                                    {char ? (
                                                                                        <span className="font-bold text-gray-800 dark:text-gray-200">{char.name} {warningText && <span className="text-orange-500 text-xs ml-1">{warningText}</span>}</span>
                                                                                    ) : <span className="text-gray-400 dark:text-gray-500">-</span>}
                                                                                </div>
                                                                            )}
                                                                        </td>
                                                                        <td className="p-1 border dark:border-gray-600 text-center">
                                                                            {char ? (
                                                                                <span style={getJobStyle(char.jobTypeId, true)} className="px-2 py-1 rounded text-sm font-bold inline-block shadow-sm whitespace-nowrap">
                                                                                    {char.job} {char.level}
                                                                                </span>
                                                                            ) : (
                                                                                <span className="text-gray-300 dark:text-gray-600">-</span>
                                                                            )}
                                                                        </td>
                                                                        <td className="p-2 border dark:border-gray-600 text-xs text-gray-600 dark:text-gray-400 truncate max-w-[120px]">{avail ? avail.note : ''}</td>
                                                                    </tr>
                                                                )
                                                            })}
                                                        </tbody>
                                                    </table>
                                                </div>
                                            </div>
                                        )})}
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                );
            };

             // --- 元件：系統與權限管理 (僅管理員) ---
             const SystemManagement = () => {
                const [newBossName, setNewBossName] = useState('');
                const [newBossIcon, setNewBossIcon] = useState('🔥');
                const [newBossColor, setNewBossColor] = useState('#ef4444');

                const [newJobCatName, setNewJobCatName] = useState('');
                const [newJobCatBg, setNewJobCatBg] = useState('#dbeafe');
                const [newJobCatText, setNewJobCatText] = useState('#1e3a8a');
                
                const [newAccName, setNewAccName] = useState('');
                
                // 帳號編輯的暫存狀態
                const [draftAccounts, setDraftAccounts] = useState(accounts || []);

                // 當雲端帳號有變動時，同步到暫存（首次載入或其他人修改時）
                useEffect(() => {
                    setDraftAccounts(accounts || []);
                }, [accounts]);

                const updateDraft = (id, field, value) => {
                    setDraftAccounts((draftAccounts || []).map(a => a.id === id ? { ...a, [field]: value } : a));
                };

                const handleAddBoss = () => {
                    if(!newBossName || !newBossIcon) return;
                    setBosses([...(bosses || []), { id: 'b_' + Date.now(), name: newBossName, icon: newBossIcon, color: newBossColor }]);
                    setNewBossName('');
                };

                const handleAddJobCat = () => {
                    if(!newJobCatName) return;
                    setJobCategories([...(jobCategories || []), { 
                        id: 'jc_' + Date.now(), 
                        group: '自訂/其他', 
                        name: newJobCatName, 
                        bgColor: newJobCatBg, 
                        textColor: newJobCatText, 
                        borderColor: newJobCatText 
                    }]);
                    setNewJobCatName('');
                };

                const handleAddAccountDraft = () => {
                    if(!newAccName) return;
                    setDraftAccounts([...(draftAccounts || []), { id: 'a_' + Date.now(), playerName: newAccName, role: 'member', passcode: '1234' }]);
                    setNewAccName('');
                };
                
                const handleSaveAccounts = () => {
                    const myAcc = (draftAccounts || []).find(a => a.id === currentAccount.id);
                    if (!myAcc || myAcc.role !== 'admin') {
                        setAlertMessage('⚠️ 錯誤：您不能移除自己的帳號或取消自己的管理員權限！這樣會導致您無法管理系統。');
                        return;
                    }
                    
                    // 檢查密碼長度防呆
                    const invalidAcc = (draftAccounts || []).find(a => !a.passcode || a.passcode.length < 4);
                    if (invalidAcc) {
                        setAlertMessage(`⚠️ 錯誤：玩家「${invalidAcc.playerName}」的密碼不能為空或少於 4 碼！\n請設定 4~8 碼的英數字。`);
                        return;
                    }

                    setAccounts(draftAccounts);
                    setAlertMessage('帳號與權限變更已成功儲存！');
                };

                return (
                    <div className="space-y-6">
                        {/* 系統設定 (王團管理) */}
                        <div className="bg-white dark:bg-gray-800 p-6 rounded-lg shadow border-t-4 border-red-500 transition-colors">
                            <h2 className="text-xl font-bold text-gray-800 dark:text-gray-100 mb-4">系統設定 - Boss突襲管理</h2>
                            <div className="flex flex-wrap gap-4 mb-4 items-end bg-gray-50 dark:bg-gray-700/50 p-4 rounded border dark:border-gray-700">
                                <div>
                                    <label className="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">圖案 (Emoji)</label>
                                    <input type="text" className="border dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-white p-2 rounded w-20 text-center text-xl" value={newBossIcon} onChange={(e) => setNewBossIcon(e.target.value)} />
                                </div>
                                <div>
                                    <label className="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">Boss名稱</label>
                                    <input type="text" className="border dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-white p-2 rounded w-48" placeholder="例: 混沌黑龍" value={newBossName} onChange={(e) => setNewBossName(e.target.value)} />
                                </div>
                                <div>
                                    <label className="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">名稱顏色</label>
                                    <input type="color" className="border dark:border-gray-600 bg-white dark:bg-gray-700 p-1 rounded w-16 h-[42px] cursor-pointer" value={newBossColor} onChange={(e) => setNewBossColor(e.target.value)} />
                                </div>
                                <button onClick={handleAddBoss} className="bg-red-600 text-white px-5 py-2 rounded font-bold hover:bg-red-700 h-[42px] shadow transition-colors">新增王團</button>
                            </div>
                            <div className="flex flex-wrap gap-3 mt-6">
                                {(bosses || []).map((boss, idx) => (
                                    <div key={boss.id} style={{ borderColor: boss.color, backgroundColor: darkMode ? '#374151' : boss.color + '10' }} className="border-2 px-3 py-2 rounded flex items-center space-x-2 shadow-sm">
                                        <span className="text-xl drop-shadow-sm">{boss.icon}</span>
                                        <span className="font-bold" style={{ color: boss.color }}>{boss.name}</span>
                                        
                                        {/* 新增：調整王團順序的按鈕 */}
                                        <div className="flex flex-col ml-2 border-l pl-2 border-gray-300/50 dark:border-gray-600">
                                            <div className="flex space-x-1">
                                                <button onClick={() => {
                                                    if (idx === 0) return;
                                                    const newB = [...bosses];
                                                    [newB[idx - 1], newB[idx]] = [newB[idx], newB[idx - 1]];
                                                    setBosses(newB);
                                                }} className="text-gray-400 hover:text-blue-600 dark:hover:text-blue-400 font-black text-xs" title="往上移">▲</button>
                                                <button onClick={() => {
                                                    if (idx === bosses.length - 1) return;
                                                    const newB = [...bosses];
                                                    [newB[idx + 1], newB[idx]] = [newB[idx], newB[idx + 1]];
                                                    setBosses(newB);
                                                }} className="text-gray-400 hover:text-blue-600 dark:hover:text-blue-400 font-black text-xs" title="往下移">▼</button>
                                            </div>
                                        </div>

                                        <button 
                                            className="text-red-500 hover:text-red-700 font-black ml-1 opacity-50 hover:opacity-100 transition-opacity"
                                            onClick={() => setBosses((bosses || []).filter(b => b.id !== boss.id))}
                                            title="刪除"
                                        >✕</button>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* 系統設定 (職業分類管理) */}
                        <div className="bg-white dark:bg-gray-800 p-6 rounded-lg shadow border-t-4 border-green-500 transition-colors">
                            <h2 className="text-xl font-bold text-gray-800 dark:text-gray-100 mb-4">系統設定 - 職業分類標籤管理</h2>
                            <div className="flex flex-wrap gap-4 mb-4 items-end bg-gray-50 dark:bg-gray-700/50 p-4 rounded border dark:border-gray-700">
                                <div>
                                    <label className="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">自訂職業名稱</label>
                                    <input type="text" className="border dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-white p-2 rounded w-40" placeholder="例: 神之子" value={newJobCatName} onChange={(e) => setNewJobCatName(e.target.value)} />
                                </div>
                                <div>
                                    <label className="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">背景顏色</label>
                                    <input type="color" className="border dark:border-gray-600 bg-white dark:bg-gray-700 p-1 rounded w-16 h-[42px] cursor-pointer" value={newJobCatBg} onChange={(e) => setNewJobCatBg(e.target.value)} />
                                </div>
                                <div>
                                    <label className="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">文字外框顏色</label>
                                    <input type="color" className="border dark:border-gray-600 bg-white dark:bg-gray-700 p-1 rounded w-16 h-[42px] cursor-pointer" value={newJobCatText} onChange={(e) => setNewJobCatText(e.target.value)} />
                                </div>
                                <button onClick={handleAddJobCat} className="bg-green-600 text-white px-5 py-2 rounded font-bold hover:bg-green-700 h-[42px] shadow transition-colors">新增職業分類</button>
                            </div>
                            
                            {/* 按組別呈現職業標籤 */}
                            <div className="space-y-4 mt-6">
                                {Object.entries(groupedJobs).map(([groupName, jobs]) => (
                                    <div key={groupName} className="border border-gray-200 dark:border-gray-700 p-4 rounded bg-white dark:bg-gray-800 shadow-sm transition-colors">
                                        <h3 className="text-sm font-bold text-gray-500 dark:text-gray-400 mb-3 border-b dark:border-gray-700 pb-1">{groupName}</h3>
                                        <div className="flex flex-wrap gap-2">
                                            {jobs.map(jc => (
                                                <div key={jc.id} className="px-2 py-1 rounded flex items-center space-x-1 shadow-sm text-sm transition-all hover:scale-105" style={getJobStyle(jc.id)}>
                                                    <span className="font-bold">{jc.name}</span>
                                                    <button 
                                                        className="text-gray-500 dark:text-gray-400 hover:text-red-600 dark:hover:text-red-400 font-black ml-1 opacity-60 hover:opacity-100 transition-opacity"
                                                        onClick={() => setJobCategories((jobCategories || []).filter(j => j.id !== jc.id))}
                                                        title="刪除"
                                                    >✕</button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* 新增：系統設定 (排班日期與換週設定) */}
                        <div className="bg-white dark:bg-gray-800 p-6 rounded-lg shadow border-t-4 border-yellow-500 transition-colors">
                            <h2 className="text-xl font-bold text-gray-800 dark:text-gray-100 mb-4">系統設定 - 排班日期與換週</h2>
                            <div className="flex flex-wrap gap-4 items-end bg-gray-50 dark:bg-gray-700/50 p-4 rounded border dark:border-gray-700">
                                <div>
                                    <label className="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">本週起始日期 (通常設為週四)</label>
                                    <input type="date" className="border dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-white p-2 rounded h-[42px] cursor-pointer" value={weekStartDate} onChange={(e) => setWeekStartDate(e.target.value)} />
                                </div>
                            </div>
                            <p className="text-sm text-gray-500 dark:text-gray-400 mt-2">💡 提示：更改起始日期後，所有頁面的日期將會自動順延 7 天。準備開新團前，如果您想清空報名資料重新開始，請至登入畫面連點左上方劍圖示以進行重置。</p>
                        </div>

                        {/* 帳號權限管理 */}
                        <div className="bg-white dark:bg-gray-800 p-6 rounded-lg shadow border-t-4 border-blue-500 transition-colors">
                            <div className="flex justify-between items-center mb-4">
                                <h2 className="text-xl font-bold text-gray-800 dark:text-gray-100">公會帳號權限與密碼管理</h2>
                                <button onClick={handleSaveAccounts} className="bg-blue-600 text-white px-5 py-2 rounded font-bold hover:bg-blue-700 shadow transition-colors flex items-center">
                                    💾 儲存帳號變更
                                </button>
                            </div>
                            
                            <div className="flex flex-wrap gap-4 mb-4 items-end bg-gray-50 dark:bg-gray-700/50 p-4 rounded border dark:border-gray-700">
                                <div>
                                    <label className="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">新玩家名稱</label>
                                    <input type="text" className="border dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-white p-2 rounded w-48" placeholder="例: (玩家)" value={newAccName} onChange={(e) => setNewAccName(e.target.value)} />
                                </div>
                                <button onClick={handleAddAccountDraft} className="bg-gray-200 dark:bg-gray-600 text-gray-800 dark:text-white px-5 py-2 rounded font-bold hover:bg-gray-300 dark:hover:bg-gray-500 h-[42px] shadow transition-colors border dark:border-gray-500">➕ 新增玩家</button>
                            </div>

                            <table className="w-full border-collapse text-sm text-left mt-4">
                                <thead>
                                    <tr className="bg-gray-100 dark:bg-gray-700/50 border-b dark:border-gray-700 text-gray-800 dark:text-gray-200">
                                        <th className="p-3 border dark:border-gray-700">玩家(帳號)名稱</th>
                                        <th className="p-3 border dark:border-gray-700">登入密碼</th>
                                        <th className="p-3 border dark:border-gray-700">系統權限</th>
                                        <th className="p-3 border dark:border-gray-700 text-center">操作</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {(draftAccounts || []).map(acc => (
                                        <tr key={acc.id} className="hover:bg-gray-50 dark:hover:bg-gray-700/50 border-b dark:border-gray-700 transition-colors text-gray-800 dark:text-gray-200">
                                            <td className="p-3 border dark:border-gray-700 font-medium">{acc.playerName}</td>
                                            <td className="p-3 border dark:border-gray-700">
                                                <input 
                                                    type="text" 
                                                    className="border dark:border-gray-600 bg-white dark:bg-gray-700 p-1 rounded w-32 text-center font-medium text-gray-700 dark:text-gray-200 focus:ring-2 focus:ring-blue-500 outline-none transition-colors" 
                                                    value={acc.passcode !== undefined ? acc.passcode : ''} 
                                                    onChange={(e) => {
                                                        const val = e.target.value;
                                                        // 限制只能輸入英文字母和數字，最多 8 碼
                                                        if (val === '' || /^[a-zA-Z0-9]{0,8}$/.test(val)) {
                                                            updateDraft(acc.id, 'passcode', val);
                                                        }
                                                    }}
                                                    placeholder="4~8碼英數字"
                                                />
                                            </td>
                                            <td className="p-3 border dark:border-gray-700">
                                                <select 
                                                    className="border dark:border-gray-600 bg-white dark:bg-gray-700 p-1 rounded transition-colors"
                                                    value={acc.role}
                                                    onChange={(e) => updateDraft(acc.id, 'role', e.target.value)}
                                                >
                                                    <option value="member">一般會員</option>
                                                    <option value="subadmin">副管理員</option>
                                                    <option value="admin">管理員</option>
                                                </select>
                                            </td>
                                            <td className="p-3 border dark:border-gray-700 text-center">
                                                 <button 
                                                    className="text-red-500 dark:text-red-400 hover:text-red-700 dark:hover:text-red-300 font-bold px-2 py-1 rounded hover:bg-red-50 dark:hover:bg-red-900/30 transition-colors"
                                                    onClick={() => {
                                                        if (acc.id === currentAccount.id) {
                                                            setAlertMessage('⚠️ 您不能移除自己的帳號！');
                                                            return;
                                                        }
                                                        setDraftAccounts((draftAccounts || []).filter(a => a.id !== acc.id));
                                                    }}
                                                 >移除(未儲存)</button>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                            <p className="text-xs text-orange-500 mt-3 font-bold">※ 所有變更 (修改密碼、調整權限、移除帳號) 必須點擊右上角的「💾 儲存帳號變更」按鈕才會真正生效！</p>
                        </div>
                    </div>
                );
            };

            // 導覽列
            const navItems = [
                { id: 'my-schedule', label: 'BOSS報名' } 
            ];
            
            if (currentAccount.role === 'member') {
                navItems.push({ id: 'planner', label: '查看成團名單' });
            } else if (currentAccount.role === 'subadmin') {
                navItems.push({ id: 'matrix', label: '成員報名表' });
                navItems.push({ id: 'planner', label: '編輯突襲團' });
            } else if (currentAccount.role === 'admin') {
                navItems.push({ id: 'matrix', label: '成員報名表' });
                navItems.push({ id: 'planner', label: '編輯突襲團' });
                navItems.push({ id: 'system', label: '系統與權限管理' });
            }

            return (
                <div className="min-h-screen flex flex-col transition-colors">
                    <header className="bg-white dark:bg-gray-800 shadow-sm border-b dark:border-gray-700 transition-colors">
                        <div className="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
                            <h1 className="text-xl font-black text-gray-800 dark:text-gray-100 flex items-center">
                                <span className="text-2xl mr-2">⚔️</span> Waku突襲排團系統
                            </h1>
                            <div className="flex items-center space-x-3">
                                {/* 切換深色模式按鈕 */}
                                <button 
                                    onClick={() => setDarkMode(!darkMode)}
                                    className="mr-2 p-2 rounded-full bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-yellow-400 hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors focus:outline-none"
                                    title="切換深色/淺色模式"
                                >
                                    {darkMode ? '🌙' : '☀️'}
                                </button>
                                
                                <div className="text-right">
                                    <div className="font-bold text-gray-800 dark:text-gray-100">{currentAccount.playerName}</div>
                                    <div className="text-xs text-gray-500 dark:text-gray-400">
                                        {currentAccount.role === 'admin' ? '管理員' : currentAccount.role === 'subadmin' ? '副管理員' : '一般會員'}
                                        <button onClick={handleLogout} className="ml-3 text-red-500 dark:text-red-400 hover:text-red-700 dark:hover:text-red-300 underline font-bold cursor-pointer">登出</button>
                                    </div>
                                </div>
                                <div className="w-10 h-10 rounded-full bg-blue-100 dark:bg-blue-900/30 flex items-center justify-center font-bold text-blue-600 dark:text-blue-400 border-2 border-blue-300 dark:border-blue-700">
                                    {(currentAccount?.playerName || 'U').charAt(0)}
                                </div>
                            </div>
                        </div>
                    </header>

                    <div className="bg-white dark:bg-gray-800 shadow-sm mb-6 transition-colors">
                        <div className="max-w-7xl mx-auto px-4 flex space-x-6 overflow-x-auto">
                            {navItems.map(item => (
                                <button
                                    key={item.id}
                                    className={`py-3 px-1 border-b-2 font-medium text-sm transition-colors whitespace-nowrap ${
                                        activeTab === item.id 
                                        ? 'border-blue-500 text-blue-600 dark:text-blue-400 dark:border-blue-400' 
                                        : 'border-transparent text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200 hover:border-gray-300 dark:hover:border-gray-600'
                                    }`}
                                    onClick={() => setActiveTab(item.id)}
                                >
                                    {item.label}
                                </button>
                            ))}
                        </div>
                    </div>

                    <main className="flex-grow max-w-7xl mx-auto px-4 w-full pb-10">
                        {activeTab === 'my-schedule' && <MemberSchedule />}
                        {activeTab === 'matrix' && <AvailabilityMatrix onOpenCreateModal={handleOpenCreateModal} />}
                        {activeTab === 'planner' && <RaidPlanner onOpenCreateModal={handleOpenCreateModal} />}
                        {activeTab === 'system' && <SystemManagement />}
                    </main>

                    {/* 新增/編輯角色 Modal */}
                    {isAddCharModalOpen && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 px-4">
                            <div className="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-2xl w-full max-w-md border-t-8 border-blue-50 transition-colors">
                                <h2 className="text-2xl font-black mb-4 flex items-center text-gray-800 dark:text-gray-100">
                                    <span className="text-blue-500 mr-2">{editCharId ? '✏️' : '➕'}</span> 
                                    {editCharId ? '編輯遊戲角色' : '新增遊戲角色'}
                                </h2>
                                <div className="space-y-4">
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">角色名稱 (與帳號綁定)</label>
                                        <input type="text" className="w-full p-2 border border-gray-300 dark:border-gray-600 rounded bg-gray-100 dark:bg-gray-700/50 font-bold text-gray-500 dark:text-gray-400 cursor-not-allowed" value={currentAccount.playerName} disabled title="角色名稱與帳號名稱連動" />
                                    </div>
                                    <div className="flex gap-4">
                                        <div className="flex-1">
                                            <label className="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">職業 (三轉/四轉)</label>
                                            <select 
                                                className="w-full p-2 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-100 rounded focus:ring-2 focus:ring-blue-500 font-medium" 
                                                value={newChar.jobTypeId} 
                                                onChange={e => {
                                                    const selected = jobCategories.find(jc => jc.id === e.target.value);
                                                    setNewChar({...newChar, jobTypeId: e.target.value, job: selected ? selected.name : ''})
                                                }}
                                            >
                                                <option value="" disabled>-- 選擇職業 --</option>
                                                {Object.entries(groupedJobs).map(([groupName, jobs]) => (
                                                    <optgroup key={groupName} label={groupName}>
                                                        {jobs.map(jc => <option key={jc.id} value={jc.id}>{jc.name}</option>)}
                                                    </optgroup>
                                                ))}
                                            </select>
                                        </div>
                                        <div className="w-24">
                                            <label className="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">等級</label>
                                            <input type="number" className="w-full p-2 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-100 rounded focus:ring-2 focus:ring-blue-500" value={newChar.level} onChange={e => setNewChar({...newChar, level: e.target.value})} />
                                        </div>
                                    </div>
                                </div>
                                <div className="mt-6 flex justify-end space-x-3">
                                    <button onClick={() => setIsAddCharModalOpen(false)} className="px-5 py-2 text-gray-600 dark:text-gray-300 bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 rounded font-bold transition-colors">取消</button>
                                    <button onClick={handleAddCharacter} className="px-5 py-2 bg-blue-600 text-white rounded font-bold hover:bg-blue-700 shadow transition-colors">
                                        {editCharId ? '儲存修改' : '確認新增'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 新增王團 Modal */}
                    {isCreateModalOpen && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 px-4">
                            <div className="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-2xl w-full max-w-md border-t-8 border-indigo-500 transition-colors">
                                <h2 className="text-2xl font-black mb-4 flex items-center text-gray-800 dark:text-gray-100"><span className="text-indigo-500 mr-2">✚</span> 新增王團隊伍</h2>
                                <div className="space-y-4">
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">選擇王團</label>
                                        <select 
                                            className="w-full p-2 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-100 rounded focus:ring-2 focus:ring-indigo-500" 
                                            value={newGroup.bossId} 
                                            onChange={e => {
                                                const newBossId = e.target.value;
                                                const newBoss = bosses.find(b => b.id === newBossId);
                                                // 切換王團時，動態更新預設隊伍名稱
                                                const bossGroupsCount = (groups || []).filter(g => g.bossId === newBossId).length;
                                                const defaultGroupName = newBoss ? `${bossGroupsCount + 1}.${newBoss.name}` : '';
                                                setNewGroup({...newGroup, bossId: newBossId, name: defaultGroupName});
                                            }}
                                        >
                                            {(bosses || []).map(b => <option key={b.id} value={b.id}>{b.icon} {b.name}</option>)}
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">隊伍名稱 (可自訂修改)</label>
                                        <input type="text" className="w-full p-2 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-100 rounded focus:ring-2 focus:ring-indigo-500" placeholder="例: 1.殘暴炎魔" value={newGroup.name} onChange={e => setNewGroup({...newGroup, name: e.target.value})} />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">出團日期</label>
                                        <select className="w-full p-2 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 rounded focus:ring-2 focus:ring-indigo-500 font-medium text-indigo-700 dark:text-indigo-400" value={newGroup.dayIndex} onChange={e => setNewGroup({...newGroup, dayIndex: e.target.value})}>
                                            {days.map((d, i) => <option key={i} value={i}>{d}</option>)}
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">詳細時間說明 (可自訂修改)</label>
                                        <input type="text" className="w-full p-2 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-100 rounded focus:ring-2 focus:ring-indigo-500" placeholder="例: 21:30~22:00集合" value={newGroup.time} onChange={e => setNewGroup({...newGroup, time: e.target.value})} />
                                    </div>
                                </div>
                                <div className="mt-6 flex justify-end space-x-3">
                                    <button onClick={() => setIsCreateModalOpen(false)} className="px-5 py-2 text-gray-600 dark:text-gray-300 bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 rounded font-bold transition-colors">取消</button>
                                    <button onClick={handleAddGroup} className="px-5 py-2 bg-indigo-600 text-white rounded font-bold hover:bg-indigo-700 shadow transition-colors">確認建立</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 自訂 Alert Modal (系統提示) */}
                    {alertMessage && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-[60] px-4">
                            <div className="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-2xl w-full max-w-sm border-t-8 border-yellow-500 transition-colors">
                                <h2 className="text-xl font-black mb-4 flex items-center text-yellow-600 dark:text-yellow-400">⚠️ 系統提示</h2>
                                <p className="mb-6 text-gray-700 dark:text-gray-300 whitespace-pre-line">{alertMessage}</p>
                                <div className="flex justify-end">
                                    <button onClick={() => setAlertMessage('')} className="px-5 py-2 bg-yellow-500 text-white rounded font-bold hover:bg-yellow-600 transition-colors">確認</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 自訂 Confirm Modal (隊伍刪除確認) */}
                    {groupToDelete && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-[60] px-4">
                            <div className="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-2xl w-full max-w-sm border-t-8 border-red-500 transition-colors">
                                <h2 className="text-xl font-black mb-4 flex items-center text-red-600 dark:text-red-400">🚨 刪除確認</h2>
                                <p className="mb-6 text-gray-700 dark:text-gray-300">確定要刪除這個隊伍嗎？<br/><span className="text-red-500 dark:text-red-400 font-bold">此操作無法復原。</span></p>
                                <div className="flex justify-end space-x-3">
                                    <button onClick={() => setGroupToDelete(null)} className="px-5 py-2 text-gray-600 dark:text-gray-300 bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 rounded font-bold transition-colors">取消</button>
                                    <button onClick={() => {
                                        setGroups((groups || []).filter(g => g.id !== groupToDelete));
                                        setGroupToDelete(null);
                                    }} className="px-5 py-2 bg-red-600 text-white rounded font-bold hover:bg-red-700 shadow transition-colors">確認刪除</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
