</head>
<body className="text-gray-800 dark:text-gray-100">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        // 導入 Firebase 雲端服務
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, doc, setDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        const { useState, useEffect, useMemo } = React;

        // 安全的 LocalStorage 存取 (防止 Iframe 阻擋導致白畫面)
        const getLocal = (key) => { try { return localStorage.getItem(key); } catch(e) { return null; } };
        const setLocal = (key, val) => { try { localStorage.setItem(key, val); } catch(e) {} };
        const removeLocal = (key) => { try { localStorage.removeItem(key); } catch(e) {} };

        // --- 初始化 Firebase 環境 ---
        let db, auth, appId;
        
        // ⚠️【實際上線修改區】⚠️
        const myFirebaseConfig = {
          apiKey: "AIzaSyCJ5fCwLV9RRDq9EP8ptxtr2ULGlucM7p0",
          authDomain: "waku-raid.firebaseapp.com",
          projectId: "waku-raid",
          storageBucket: "waku-raid.firebasestorage.app",
          messagingSenderId: "518269067136",
          appId: "1:518269067136:web:12990425af05581a83eb65",
          measurementId: "G-483JD2VM1B"
        };

        // ⚠️【系統強制重置密碼】⚠️ (當系統崩潰或測試完要清空時，連點登入頁左上角的劍3下輸入此密碼)
        const MASTER_RESET_PASSWORD = "ji3g4t86au3"; // <--- 您可以在這裡自訂您的專屬重置密碼

        try {
            const envConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
            const finalConfig = myFirebaseConfig || envConfig;

            if (finalConfig) {
                const app = initializeApp(finalConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                appId = (typeof __app_id !== 'undefined' && !myFirebaseConfig) ? __app_id : 'waku-raid-custom-app';
            }
        } catch (e) {
            console.error("Firebase 連線初始化失敗", e);
        }

        // --- 預設資料庫 ---
        const initialBosses = [
            { id: 'b_zakum', name: '殘暴炎魔', icon: '🔥', color: '#ef4444' },
            { id: 'b_pap_n', name: '拉圖斯(普通)', icon: '⏰', color: '#3b82f6' },
            { id: 'b_pap_h', name: '拉圖斯(困難)', icon: '😈', color: '#8b5cf6' }
        ];

        const initialAccounts = [
            { id: 'a1', playerName: '伊爾參寺', role: 'admin', passcode: 'admin111', joinDate: Date.now() },
            { id: 'a2', playerName: '熱狗蛋蛋', role: 'subadmin', passcode: 'admin', joinDate: Date.now() }
        ];

        const initialJobCategories = [
            { id: 'jc_w_1', group: '劍士系', name: '龍騎士', bgColor: '#fee2e2', textColor: '#991b1b', borderColor: '#fca5a5' },
            { id: 'jc_w_2', group: '劍士系', name: '黑騎士', bgColor: '#fee2e2', textColor: '#991b1b', borderColor: '#fca5a5' },
            { id: 'jc_w_3', group: '劍士系', name: '十字軍', bgColor: '#fee2e2', textColor: '#991b1b', borderColor: '#fca5a5' },
            { id: 'jc_w_4', group: '劍士系', name: '英雄', bgColor: '#fee2e2', textColor: '#991b1b', borderColor: '#fca5a5' },
            { id: 'jc_w_5', group: '劍士系', name: '騎士', bgColor: '#fee2e2', textColor: '#991b1b', borderColor: '#fca5a5' },
            { id: 'jc_w_6', group: '劍士系', name: '聖騎士', bgColor: '#fee2e2', textColor: '#991b1b', borderColor: '#fca5a5' },
            { id: 'jc_m_1', group: '法師系', name: '冰雷', bgColor: '#dbeafe', textColor: '#1e3a8a', borderColor: '#93c5fd' },
            { id: 'jc_m_2', group: '法師系', name: '冰雷大魔導', bgColor: '#dbeafe', textColor: '#1e3a8a', borderColor: '#93c5fd' },
            { id: 'jc_m_3', group: '法師系', name: '火毒', bgColor: '#dbeafe', textColor: '#1e3a8a', borderColor: '#93c5fd' },
            { id: 'jc_m_4', group: '法師系', name: '火毒大魔導', bgColor: '#dbeafe', textColor: '#1e3a8a', borderColor: '#93c5fd' },
            { id: 'jc_m_5', group: '法師系', name: '祭司', bgColor: '#dbeafe', textColor: '#1e3a8a', borderColor: '#93c5fd' },
            { id: 'jc_m_6', group: '法師系', name: '主教', bgColor: '#dbeafe', textColor: '#1e3a8a', borderColor: '#93c5fd' },
            { id: 'jc_b_1', group: '弓箭手', name: '遊俠', bgColor: '#dcfce7', textColor: '#166534', borderColor: '#86efac' },
            { id: 'jc_b_2', group: '弓箭手', name: '箭神', bgColor: '#dcfce7', textColor: '#166534', borderColor: '#86efac' },
            { id: 'jc_b_3', group: '弓箭手', name: '狙擊手', bgColor: '#dcfce7', textColor: '#166534', borderColor: '#86efac' },
            { id: 'jc_b_4', group: '弓箭手', name: '神射手', bgColor: '#dcfce7', textColor: '#166534', borderColor: '#86efac' },
            { id: 'jc_t_1', group: '盜賊系', name: '神偷', bgColor: '#f3e8ff', textColor: '#6b21a8', borderColor: '#d8b4fe' },
            { id: 'jc_t_2', group: '盜賊系', name: '暗影神偷', bgColor: '#f3e8ff', textColor: '#6b21a8', borderColor: '#d8b4fe' },
            { id: 'jc_t_3', group: '盜賊系', name: '暗殺者', bgColor: '#f3e8ff', textColor: '#6b21a8', borderColor: '#d8b4fe' },
            { id: 'jc_t_4', group: '盜賊系', name: '夜使者', bgColor: '#f3e8ff', textColor: '#6b21a8', borderColor: '#d8b4fe' },
            { id: 'jc_p_1', group: '海盜系', name: '格鬥家', bgColor: '#ffedd5', textColor: '#9a3412', borderColor: '#fdba74' },
            { id: 'jc_p_2', group: '海盜系', name: '拳霸', bgColor: '#ffedd5', textColor: '#9a3412', borderColor: '#fdba74' },
            { id: 'jc_p_3', group: '海盜系', name: '神槍手', bgColor: '#ffedd5', textColor: '#9a3412', borderColor: '#fdba74' },
            { id: 'jc_p_4', group: '海盜系', name: '槍神', bgColor: '#ffedd5', textColor: '#9a3412', borderColor: '#fdba74' }
        ];

        const initialCharacters = [];
        const initialAvailability = {};
        const initialGroups = [];

        const App = () => {
            // ==========================================
            // 1. 扁平化集中管理所有全域狀態
            // ==========================================
            
            const [darkMode, setDarkMode] = useState(() => getLocal('waku-raid-darkmode') === 'true');
            
            // Firebase 資料狀態
            const [user, setUser] = useState(null);
            const [bosses, _setBosses] = useState(initialBosses);
            const [jobCategories, _setJobCategories] = useState(initialJobCategories);
            const [accounts, _setAccounts] = useState(initialAccounts);
            const [characters, _setCharacters] = useState(initialCharacters);
            const [availability, _setAvailability] = useState(initialAvailability);
            const [groups, _setGroups] = useState(initialGroups);
            const [weekStartDate, _setWeekStartDate] = useState(new Date().toISOString().split('T')[0]); 

            // App UI 導覽狀態
            const [loggedInId, setLoggedInId] = useState(() => getLocal('waku-raid-loggedInId') || null);
            const currentAccount = (accounts || []).find(a => a.id === loggedInId) || null;
            const [activeTab, setActiveTab] = useState('my-schedule');

            // 各分頁子狀態
            const [localAvail, setLocalAvail] = useState({});
            const [matrixSortMode, setMatrixSortMode] = useState('default');
            const [matrixBossTab, setMatrixBossTab] = useState('all');
            const [matrixStatusFilter, setMatrixStatusFilter] = useState('all'); 
            const [raidFilterMode, setRaidFilterMode] = useState('all');
            const [draftAccounts, setDraftAccounts] = useState([]);
            const [accSortMode, setAccSortMode] = useState('roleDesc'); 
            const [showRegistrationTime, setShowRegistrationTime] = useState(true); 
            
            // 密碼顯示狀態
            const [visiblePasswords, setVisiblePasswords] = useState({});

            // 系統管理表單狀態
            const [newBossName, setNewBossName] = useState('');
            const [newBossIcon, setNewBossIcon] = useState('🔥');
            const [newBossColor, setNewBossColor] = useState('#ef4444');
            const [newJobCatName, setNewJobCatName] = useState('');
            const [newJobCatGroup, setNewJobCatGroup] = useState('自訂系別');
            const [newJobCatBg, setNewJobCatBg] = useState('#dbeafe');
            const [newJobCatText, setNewJobCatText] = useState('#1e3a8a');
            const [editJobCatId, setEditJobCatId] = useState(null); 
            const [newAccName, setNewAccName] = useState('');

            // 所有彈出 Modal 狀態 
            const [isCreateModalOpen, setIsCreateModalOpen] = useState(false);
            const [newGroup, setNewGroup] = useState({ bossId: '', name: '', dayIndex: 0, time: '' });
            const [isAddCharModalOpen, setIsAddCharModalOpen] = useState(false);
            const [newChar, setNewChar] = useState({ name: '', job: '', jobTypeId: '', level: 0 });
            const [editCharId, setEditCharId] = useState(null);
            
            const [charToDelete, setCharToDelete] = useState(null);
            const [accountToDelete, setAccountToDelete] = useState(null);
            const [groupToDelete, setGroupToDelete] = useState(null);
            const [registrationToDelete, setRegistrationToDelete] = useState(null);
            const [groupStatusToToggle, setGroupStatusToToggle] = useState(null); // 新增：變更隊伍狀態的確認
            const [deletePromptInput, setDeletePromptInput] = useState('');
            
            const [alertMessage, setAlertMessage] = useState('');
            const [isConfirmResetOpen, setIsConfirmResetOpen] = useState(false); 
            
            // 更改密碼狀態
            const [isChangePwdOpen, setIsChangePwdOpen] = useState(false);
            const [pwdForm, setPwdForm] = useState({ old: '', new: '', confirm: '' });
            const [pwdMsg, setPwdMsg] = useState('');

            // 登入與註冊狀態
            const [loginName, setLoginName] = useState('');
            const [passcode, setPasscode] = useState('');
            const [loginError, setLoginError] = useState('');
            const [regError, setRegError] = useState(''); 
            const [rememberMe, setRememberMe] = useState(() => getLocal('waku-raid-remember') === 'true');
            const [isRegisterOpen, setIsRegisterOpen] = useState(false);
            const [regName, setRegName] = useState('');
            const [regPasscode, setRegPasscode] = useState('');
            const [swordClicks, setSwordClicks] = useState(0);
            const [isEasterEggModalOpen, setIsEasterEggModalOpen] = useState(false);
            const [easterEggPwd, setEasterEggPwd] = useState('');

            // ==========================================
            // 2. 生命週期與 Effect Hooks
            // ==========================================

            useEffect(() => {
                if (darkMode) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
                setLocal('waku-raid-darkmode', darkMode);
            }, [darkMode]);

            useEffect(() => {
                if (!auth) return;
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch(e) { console.error("認證失敗", e); }
                };
                initAuth();
                const unsub = onAuthStateChanged(auth, setUser);
                return () => unsub();
            }, []);

            // Firebase 資料同步讀取
            useEffect(() => {
                if (!user || !db) return;
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'guildState', 'main');
                const unsub = onSnapshot(docRef, (snap) => {
                    if (snap.exists()) {
                        const data = snap.data();
                        _setBosses(data.bosses || initialBosses || []);
                        _setJobCategories(data.jobCategories || initialJobCategories || []);
                        _setAccounts(data.accounts || initialAccounts || []);
                        _setCharacters(data.characters || initialCharacters || []);
                        _setAvailability(data.availability || initialAvailability || {});
                        _setGroups(data.groups || initialGroups || []);
                        _setWeekStartDate(data.weekStartDate || new Date().toISOString().split('T')[0]);
                    } else {
                        setDoc(docRef, { bosses: initialBosses, jobCategories: initialJobCategories, accounts: initialAccounts, characters: initialCharacters, availability: initialAvailability, groups: initialGroups, weekStartDate: new Date().toISOString().split('T')[0] });
                    }
                }, (err) => console.error(err));
                return () => unsub();
            }, [user]);

            useEffect(() => {
                setDraftAccounts(accounts || []);
            }, [accounts]);

            useEffect(() => {
                if (rememberMe) {
                    const savedName = getLocal('waku-raid-saved-name');
                    const savedPwd = getLocal('waku-raid-saved-pwd');
                    if (savedName) setLoginName(savedName);
                    if (savedPwd) setPasscode(savedPwd);
                }
            }, [rememberMe]);

            useEffect(() => {
                if (swordClicks > 0) {
                    const timer = setTimeout(() => setSwordClicks(0), 600);
                    return () => clearTimeout(timer);
                }
            }, [swordClicks]);

            // ==========================================
            // 3. 共用運算與資料更新函式
            // ==========================================

            const days = useMemo(() => {
                const start = new Date(weekStartDate);
                const wdays = ['週日', '週一', '週二', '週三', '週四', '週五', '週六'];
                return Array.from({length: 7}).map((_, i) => {
                    const d = new Date(start);
                    d.setDate(d.getDate() + i);
                    if (isNaN(d.getTime())) return `日期錯誤`; 
                    return `${d.getMonth()+1}/${d.getDate()} ${wdays[d.getDay()]}`;
                });
            }, [weekStartDate]);

            const roleWeight = { admin: 4, subadmin: 3, member: 2, guest: 1 };
            const getJoinDate = (acc) => {
                if (acc.joinDate) return acc.joinDate;
                if (acc.id && acc.id.startsWith('a_')) {
                    const ts = parseInt(acc.id.replace('a_', ''));
                    if (!isNaN(ts)) return ts;
                }
                return null; 
            };

            const sortedAccounts = useMemo(() => {
                let sorted = [...(draftAccounts || [])];
                sorted.sort((a, b) => {
                    if (accSortMode === 'roleDesc') {
                        const diff = (roleWeight[b.role] || 0) - (roleWeight[a.role] || 0);
                        if (diff !== 0) return diff;
                        return (getJoinDate(b) || 0) - (getJoinDate(a) || 0); 
                    } else if (accSortMode === 'dateDesc') {
                        return (getJoinDate(b) || 0) - (getJoinDate(a) || 0);
                    } else if (accSortMode === 'dateAsc') {
                        return (getJoinDate(a) || 0) - (getJoinDate(b) || 0);
                    }
                    return 0;
                });
                return sorted;
            }, [draftAccounts, accSortMode]);

            const updateCloud = (key, val) => {
                if (!user || !db) return;
                setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'guildState', 'main'), { [key]: val }, { merge: true });
            };

            const setBosses = (val) => { _setBosses(val || []); updateCloud('bosses', val || []); };
            const setJobCategories = (val) => { _setJobCategories(val || []); updateCloud('jobCategories', val || []); };
            const setAccounts = (val) => { _setAccounts(val || []); updateCloud('accounts', val || []); };
            const setCharacters = (val) => { _setCharacters(val || []); updateCloud('characters', val || []); };
            const setAvailability = (val) => { _setAvailability(val || {}); updateCloud('availability', val || {}); };
            const setGroups = (val) => { _setGroups(val || []); updateCloud('groups', val || []); };
            const setWeekStartDate = (val) => { _setWeekStartDate(val); updateCloud('weekStartDate', val); };

            const handleLogin = (id) => {
                setLoggedInId(id);
                setLocal('waku-raid-loggedInId', id);
                setActiveTab('my-schedule'); 
            };

            const handleLogout = () => {
                setLoggedInId(null);
                removeLocal('waku-raid-loggedInId');
            };

            const getJobStyle = (typeId, isWhiteBg = false) => {
                const jc = (jobCategories || []).find(j => j.id === typeId);
                if (jc) {
                    return { 
                        backgroundColor: darkMode ? '#1f2937' : (isWhiteBg ? '#ffffff' : jc.bgColor), 
                        color: jc.textColor, 
                        border: `1px solid ${jc.borderColor}`,
                        filter: darkMode ? 'brightness(1.5) saturate(1.2)' : 'none'
                    };
                }
                return { 
                    backgroundColor: darkMode ? '#374151' : (isWhiteBg ? '#ffffff' : '#e5e7eb'), 
                    color: darkMode ? '#d1d5db' : '#374151', 
                    border: '1px solid #d1d5db' 
                };
            };

            // 🔥 核心防呆：動態計算角色「實際有效」的每週最高可排團數
            const getEffectiveMaxRuns = (avail) => {
                if (!avail) return 2;
                // 過濾掉已被系統刪除的王團，避免隱形幽靈場次佔用
                const validBosses = (avail.bosses || []).filter(bId => bosses.some(b => b.id === bId));
                const totalSelected = validBosses.reduce((sum, bId) => sum + (parseInt((avail.bossCounts || {})[bId]) || 1), 0);
                if (totalSelected === 0) return 2; 
                return Math.min(avail.maxWeeklyRuns || 2, totalSelected);
            };
            
            // 計算群組順序(維持嚴格陣列順序)
            const groupedJobsArray = useMemo(() => {
                const groupsMap = new Map();
                (jobCategories || []).forEach(jc => {
                    const g = jc.group || '其他';
                    if (!groupsMap.has(g)) groupsMap.set(g, []);
                    groupsMap.get(g).push(jc);
                });
                return Array.from(groupsMap.entries()).map(([groupName, jobs]) => ({ groupName, jobs }));
            }, [jobCategories]);

            // --- 職業順序移動邏輯 ---
            const moveGroup = (groupName, direction) => {
                const uniqueGroups = [...new Set((jobCategories || []).map(j => j.group || '其他'))];
                const idx = uniqueGroups.indexOf(groupName);
                if (idx === -1) return;
                if (direction === -1 && idx === 0) return;
                if (direction === 1 && idx === uniqueGroups.length - 1) return;
                
                const targetIdx = idx + direction;
                const newGroupOrder = [...uniqueGroups];
                [newGroupOrder[idx], newGroupOrder[targetIdx]] = [newGroupOrder[targetIdx], newGroupOrder[idx]];
                
                const newJc = [...(jobCategories || [])].sort((a, b) => {
                    const idxA = newGroupOrder.indexOf(a.group || '其他');
                    const idxB = newGroupOrder.indexOf(b.group || '其他');
                    if (idxA !== idxB) return idxA - idxB;
                    // 同群組保持原本的相對順序
                    return jobCategories.indexOf(a) - jobCategories.indexOf(b);
                });
                setJobCategories(newJc);
            };

            const moveJob = (jobId, direction) => {
                const idx = (jobCategories || []).findIndex(j => j.id === jobId);
                if (idx === -1) return;
                const jc = jobCategories[idx];
                const groupName = jc.group || '其他';
                
                const groupJobs = jobCategories.filter(j => (j.group || '其他') === groupName);
                const groupIdx = groupJobs.findIndex(j => j.id === jobId);
                
                if (direction === -1 && groupIdx === 0) return;
                if (direction === 1 && groupIdx === groupJobs.length - 1) return;
                
                const targetJobId = groupJobs[groupIdx + direction].id;
                const targetIdx = jobCategories.findIndex(j => j.id === targetJobId);
                
                const newJc = [...jobCategories];
                [newJc[idx], newJc[targetIdx]] = [newJc[targetIdx], newJc[idx]];
                setJobCategories(newJc);
            };

            const formatUpdateTime = (ts) => {
                if (!ts) return '';
                const d = new Date(ts);
                return `${d.getMonth()+1}/${d.getDate()}-${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
            };

            // --- Modal 控制與執行邏輯 ---
            
            const handleOpenCreateModal = (dayIdx = 0) => {
                const defaultBossId = bosses && bosses[0] ? bosses[0].id : '';
                const defaultBossName = bosses && bosses[0] ? bosses[0].name : '';
                const bossGroupsCount = (groups || []).filter(g => g.bossId === defaultBossId).length;
                const defaultGroupName = defaultBossId ? `${bossGroupsCount + 1}.${defaultBossName}` : '';

                setNewGroup({ 
                    bossId: defaultBossId, 
                    name: defaultGroupName, 
                    dayIndex: dayIdx, 
                    time: '21:30~22:00集合' 
                });
                setIsCreateModalOpen(true);
            };

            const handleAddGroup = () => {
                if(!newGroup.name || !newGroup.time) {
                    setAlertMessage('請填寫完整資訊');
                    return;
                }
                setGroups([...(groups || []), {
                    id: 'g' + Date.now(),
                    bossId: newGroup.bossId,
                    name: newGroup.name,
                    dayIndex: parseInt(newGroup.dayIndex),
                    time: newGroup.time,
                    status: 'pending', // 預設狀態未出團
                    members: ['', '', '', '', '', ''],
                    reserves: ['']
                }]);
                setIsCreateModalOpen(false);
            };

            const handleAddCharacter = () => {
                if(!newChar.job || !newChar.jobTypeId) {
                    setAlertMessage('請選擇職業');
                    return;
                }

                if (editCharId) {
                    setCharacters((characters || []).map(c => c.id === editCharId ? { 
                        ...c, name: currentAccount.playerName, job: newChar.job, jobTypeId: newChar.jobTypeId, level: parseInt(newChar.level) 
                    } : c));
                } else {
                    const newCharId = 'c_' + Date.now();
                    setCharacters([...(characters || []), { 
                        id: newCharId, accountId: currentAccount.id, name: currentAccount.playerName, job: newChar.job, jobTypeId: newChar.jobTypeId, level: parseInt(newChar.level) 
                    }]);
                    
                    setAvailability({
                        ...(availability || {}),
                        [newCharId]: { days: Array(7).fill(false), bosses: [], bossCounts: {}, note: '', maxWeeklyRuns: 2 }
                    });
                }
                
                setIsAddCharModalOpen(false);
                setEditCharId(null);
            };

            const confirmDeleteChar = () => {
                if (!charToDelete) return;
                setCharacters((characters || []).filter(c => c.id !== charToDelete));
                const newGroups = (groups || []).map(g => ({
                    ...g,
                    members: (g.members || []).map(m => m === charToDelete ? '' : m),
                    reserves: (g.reserves || []).map(m => m === charToDelete ? '' : m)
                }));
                setGroups(newGroups);
                setCharToDelete(null);
                setAlertMessage('✅ 角色已成功刪除！');
            };

            const groupedJobs = (jobCategories || []).reduce((acc, jc) => {
                const g = jc.group || '其他';
                if (!acc[g]) acc[g] = [];
                acc[g].push(jc);
                return acc;
            }, {});

            // ==========================================
            // 4. 渲染各個頁面內容
            // ==========================================

            const renderLoginScreen = () => {
                const doLogin = () => {
                    const acc = (accounts || []).find(a => (a.playerName || '').toLowerCase() === (loginName || '').trim().toLowerCase());
                    if (!acc) {
                        setLoginError('找不到此帳號，請確認名稱是否正確或前往註冊！');
                        return;
                    }
                    const correctPasscode = (acc.passcode !== undefined && acc.passcode !== null) ? String(acc.passcode) : (acc.role === 'member' ? '1234' : 'admin');
                    if (String(passcode) === correctPasscode) {
                        if (rememberMe) {
                            setLocal('waku-raid-remember', 'true');
                            setLocal('waku-raid-saved-name', (loginName || '').trim());
                            setLocal('waku-raid-saved-pwd', passcode);
                        } else {
                            setLocal('waku-raid-remember', 'false');
                            removeLocal('waku-raid-saved-name');
                            removeLocal('waku-raid-saved-pwd');
                        }
                        handleLogin(acc.id);
                    } else {
                        setLoginError('密碼錯誤！請確認密碼是否正確。');
                    }
                };

                const handleRegister = () => {
                    setRegError(''); 
                    const cleanRegName = (regName || '').trim();
                    if (!cleanRegName) {
                        setRegError('請填寫 ID: DC名稱！');
                        return;
                    }
                    if ((accounts || []).some(a => (a.playerName || '').toLowerCase() === cleanRegName.toLowerCase())) {
                        setRegError('此名稱已被註冊！');
                        return;
                    }
                    let finalPasscode = (regPasscode || '').trim();
                    if (finalPasscode !== '') {
                        if (!/^[a-zA-Z0-9]{4,8}$/.test(finalPasscode)) { setRegError('密碼格式錯誤！只能使用英文與數字，且長度需為 4 到 8 碼。'); return; }
                    } else { finalPasscode = '1234'; }
                    const newAccId = 'a_' + Date.now();
                    const newAcc = { id: newAccId, playerName: cleanRegName, role: 'guest', passcode: finalPasscode, joinDate: Date.now() };
                    setAccounts([...(accounts || []), newAcc]);
                    setIsRegisterOpen(false);
                    setRegName('');
                    setRegPasscode('');
                    setLoginName(newAcc.playerName);
                    setPasscode(finalPasscode); 
                    setLoginError('✅ 註冊成功！您的帳號需等待管理員開通後方可報名。');
                };

                return (
                    <div className="min-h-screen bg-gray-100 dark:bg-gray-900 flex flex-col items-center justify-center p-4 relative transition-colors">
                        <div className="bg-white dark:bg-gray-800 p-8 rounded-xl shadow-2xl max-w-sm w-full border-t-8 border-blue-500 z-10 transition-colors">
                            <div className="flex justify-between items-center mb-6">
                                <h1 className="text-2xl font-black text-gray-800 dark:text-gray-100 flex items-center">
                                    <span onClick={() => {
                                        const newCount = swordClicks + 1;
                                        setSwordClicks(newCount);
                                        if (newCount >= 3) { setIsEasterEggModalOpen(true); setSwordClicks(0); }
                                    }} className="text-blue-500 mr-2 cursor-pointer select-none" title=" ">⚔️</span> 
                                    Waku突襲登入
                                </h1>
                                <button onClick={() => setDarkMode(!darkMode)} className="text-xl p-1 rounded hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors" title="切換深色模式">
                                    {darkMode ? '☀️' : '🌙'}
                                </button>
                            </div>
                            
                            {loginError && <div className={`p-3 rounded mb-4 text-sm font-bold border ${loginError.includes('✅') ? 'bg-green-100 dark:bg-green-900/30 text-green-700 dark:text-green-400 border-green-200 dark:border-green-800' : 'bg-red-100 dark:bg-red-900/30 text-red-600 dark:text-red-400 border-red-200 dark:border-red-800'}`}>{loginError}</div>}
                            <div className="space-y-5">
                                <div>
                                    <label className="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">輸入您的 ID (DC名稱)</label>
                                    <input type="text" placeholder="請輸入註冊的名稱" className="w-full p-3 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-100 rounded focus:ring-2 focus:ring-blue-500 font-medium" value={loginName} onChange={e => setLoginName(e.target.value)} onKeyDown={e => e.key === 'Enter' && doLogin()}/>
                                </div>
                                <div>
                                    <label className="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">輸入登入密碼</label>
                                    <input type="password" placeholder="預設: 一般1234 " className="w-full p-3 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-100 rounded focus:ring-2 focus:ring-blue-500" value={passcode} onChange={e => setPasscode(e.target.value)} onKeyDown={e => e.key === 'Enter' && doLogin()} />
                                    <label className="flex items-center space-x-2 mt-3 cursor-pointer">
                                        <input type="checkbox" className="w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 rounded focus:ring-blue-500 dark:bg-gray-700 dark:border-gray-600" checked={rememberMe} onChange={e => setRememberMe(e.target.checked)} />
                                        <span className="text-sm font-bold text-gray-600 dark:text-gray-400">記住帳號密碼</span>
                                    </label>
                                </div>
                                <button onClick={doLogin} className="w-full bg-blue-600 text-white font-bold py-3 rounded hover:bg-blue-700 transition-colors shadow-lg mt-2">登入系統</button>
                                
                                <div className="text-center mt-4 pt-4 border-t border-gray-100 dark:border-gray-700">
                                    <span className="text-sm text-gray-500 dark:text-gray-400">還沒有帳號嗎？ </span>
                                    <button onClick={() => { setLoginError(''); setRegError(''); setIsRegisterOpen(true); }} className="text-blue-600 dark:text-blue-400 font-bold hover:underline">立即註冊</button>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            // ==========================================
            // 🚨 核心防護：未登入時阻擋渲染後續元件
            // ==========================================
            if (!currentAccount) {
                return (
                    <React.Fragment>
                        {renderLoginScreen()}
                        
                        {/* 註冊 Modal */}
                        {isRegisterOpen && (
                            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center px-4" style={{ zIndex: 9999 }}>
                                <div className="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-2xl w-full max-w-sm border-t-8 border-green-500 transition-colors">
                                    <h2 className="text-2xl font-black mb-4 flex items-center text-gray-800 dark:text-gray-100">
                                        <span className="text-green-500 mr-2">📝</span> 註冊新帳號
                                    </h2>
                                    {regError && <div className="p-2 mb-4 bg-red-100 dark:bg-red-900/30 text-red-600 dark:text-red-400 text-sm font-bold rounded border border-red-200 dark:border-red-800">{regError}</div>}
                                    <div className="space-y-4">
                                        <div>
                                            <label className="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">ID: DC名稱 (必填)</label>
                                            <input type="text" className="w-full p-3 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-100 rounded focus:ring-2 focus:ring-green-500" placeholder="輸入您的 Discord 名稱" value={regName} onChange={e => setRegName(e.target.value)} />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">自訂密碼 (選填)</label>
                                            <input type="password" className="w-full p-3 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-100 rounded focus:ring-2 focus:ring-green-500" placeholder="限英數字4~8碼，不填預設為1234" value={regPasscode} onChange={e => setRegPasscode(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleRegister()} />
                                        </div>
                                    </div>
                                    <div className="mt-6 flex justify-end space-x-3">
                                        <button onClick={() => { setIsRegisterOpen(false); setRegError(''); }} className="px-5 py-2 text-gray-600 dark:text-gray-300 bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 rounded font-bold transition-colors">取消</button>
                                        <button onClick={() => {
                                            const cleanRegName = (regName || '').trim();
                                            if (!cleanRegName) { setRegError('請填寫 ID: DC名稱！'); return; }
                                            if ((accounts || []).some(a => (a.playerName || '').toLowerCase() === cleanRegName.toLowerCase())) { setRegError('此名稱已被註冊！'); return; }
                                            let finalPasscode = (regPasscode || '').trim();
                                            if (finalPasscode !== '') {
                                                if (!/^[a-zA-Z0-9]{4,8}$/.test(finalPasscode)) { setRegError('密碼格式錯誤！只能使用英文與數字，且長度需為 4 到 8 碼。'); return; }
                                            } else { finalPasscode = '1234'; }
                                            const newAccId = 'a_' + Date.now();
                                            const newAcc = { id: newAccId, playerName: cleanRegName, role: 'guest', passcode: finalPasscode, joinDate: Date.now() };
                                            setAccounts([...(accounts || []), newAcc]);
                                            setIsRegisterOpen(false);
                                            setRegName('');
                                            setRegPasscode('');
                                            setLoginName(newAcc.playerName);
                                            setPasscode(finalPasscode); 
                                            setLoginError('✅ 註冊成功！您的帳號需等待管理員開通後方可報名。');
                                        }} className="px-5 py-2 bg-green-600 text-white rounded font-bold hover:bg-green-700 shadow transition-colors">確認註冊</button>
                                    </div>
                                </div>
                            </div>
                        )}
                        
                        {/* 彩蛋：系統重置 Modal */}
                        {isEasterEggModalOpen && (
                            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center px-4" style={{ zIndex: 9999 }}>
                                <div className="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-2xl w-full max-w-sm border-t-8 border-red-500 transition-colors">
                                    <h2 className="text-xl font-black mb-4 flex items-center text-red-600 dark:text-red-400">⚠️ 系統重置警告</h2>
                                    <p className="mb-4 text-sm text-gray-700 dark:text-gray-300">請輸入最高管理員密碼以清空並重置所有資料：</p>
                                    <input 
                                        type="password" 
                                        className="w-full p-3 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-100 rounded focus:ring-2 focus:ring-red-500 mb-6" 
                                        value={easterEggPwd} 
                                        onChange={e => setEasterEggPwd(e.target.value)}
                                        onKeyDown={e => {
                                            if (e.key === 'Enter') {
                                                if (easterEggPwd === MASTER_RESET_PASSWORD) {
                                                    setAccounts(initialAccounts);
                                                    setCharacters(initialCharacters);
                                                    setAvailability(initialAvailability);
                                                    setGroups(initialGroups);
                                                    setLoginError('✅ 系統已重置為最新乾淨狀態！請重新登入。');
                                                    setIsEasterEggModalOpen(false);
                                                    setEasterEggPwd('');
                                                } else {
                                                    setLoginError('❌ 重置密碼錯誤。');
                                                    setIsEasterEggModalOpen(false);
                                                    setEasterEggPwd('');
                                                }
                                            }
                                        }}
                                    />
                                    <div className="flex justify-end space-x-3">
                                        <button onClick={() => { setIsEasterEggModalOpen(false); setEasterEggPwd(''); }} className="px-5 py-2 text-gray-600 dark:text-gray-300 bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 rounded font-bold transition-colors">取消</button>
                                        <button onClick={() => {
                                            if (easterEggPwd === MASTER_RESET_PASSWORD) {
                                                setAccounts(initialAccounts);
                                                setCharacters(initialCharacters);
                                                setAvailability(initialAvailability);
                                                setGroups(initialGroups);
                                                setLoginError('✅ 系統已重置為最新乾淨狀態！請重新登入。');
                                                setIsEasterEggModalOpen(false);
                                                setEasterEggPwd('');
                                            } else {
                                                setLoginError('❌ 重置密碼錯誤。');
                                                setIsEasterEggModalOpen(false);
                                                setEasterEggPwd('');
                                            }
                                        }} className="px-5 py-2 bg-red-600 text-white rounded font-bold hover:bg-red-700 shadow transition-colors">確認重置</button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </React.Fragment>
                );
            }

            // 🛡️ 新手隔離區
            if (currentAccount.role === 'guest') {
                return (
                    <div className="min-h-screen bg-gray-100 dark:bg-gray-900 flex flex-col items-center justify-center p-4 transition-colors">
                        <div className="bg-white dark:bg-gray-800 p-8 rounded-xl shadow-2xl max-w-md w-full border-t-8 border-yellow-500 text-center transition-colors">
                            <div className="text-6xl mb-4">⏳</div>
                            <h1 className="text-2xl font-black text-gray-800 dark:text-gray-100 mb-2">帳號審核中</h1>
                            <p className="text-gray-600 dark:text-gray-400 mb-6 font-medium">
                                您好，{currentAccount.playerName}！<br/>
                                您的帳號目前為「未開通」狀態。<br/>
                                請聯絡公會管理員為您設定權限，開通後即可開始報名王團！
                            </p>
                            <button onClick={handleLogout} className="px-6 py-2 bg-gray-200 dark:bg-gray-700 text-gray-700 dark:text-gray-200 font-bold rounded hover:bg-gray-300 dark:hover:bg-gray-600 transition-colors shadow-sm">
                                返回登入頁
                            </button>
                        </div>
                    </div>
                );
            }

            // --- 登入後的一般成員/管理員 元件渲染 ---

            const renderMemberSchedule = () => {
                const myCharacters = (characters || []).filter(c => c.accountId === currentAccount.id);
                
                // 計算本週全系統「有報名」的不重複玩家數量
                const signedUpAccountIds = new Set();
                (characters || []).forEach(char => {
                    const avail = (availability || {})[char.id];
                    // 有勾選天數且有勾選王團，才算有報名
                    if (avail && avail.days && avail.days.some(d => d) && avail.bosses && avail.bosses.length > 0) {
                        signedUpAccountIds.add(char.accountId);
                    }
                });
                const signedUpPlayersCount = signedUpAccountIds.size;
                
                const getAvail = (charId) => {
                    const base = localAvail[charId] || (availability || {})[charId] || {};
                    return { days: base.days || Array(7).fill(false), bosses: base.bosses || [], bossCounts: base.bossCounts || {}, note: base.note || '', maxWeeklyRuns: base.maxWeeklyRuns || 2 };
                };

                const toggleDay = (charId, index) => {
                    const charAvail = getAvail(charId);
                    const isCurrentlyChecked = charAvail.days[index];
                    if (isCurrentlyChecked) {
                        const scheduledOnDay = (groups || []).some(g => g.dayIndex === index && ((g.members || []).includes(charId) || (g.reserves || []).includes(charId)));
                        if (scheduledOnDay) {
                            setAlertMessage(`⚠️ 取消失敗！\n此角色在 ${days[index].split(' ')[0]} 已經被排入隊伍了。\n若需請假，請聯絡管理員協助移除。`);
                            return; 
                        }
                    }
                    const newDays = [...charAvail.days];
                    newDays[index] = !newDays[index];
                    setLocalAvail({ ...localAvail, [charId]: { ...charAvail, days: newDays } });
                };

                const handleSelectAllDays = (charId) => {
                    const charAvail = getAvail(charId);
                    const allSelected = charAvail.days.every(d => d);
                    
                    let newDays = [...charAvail.days];
                    let hasError = false;

                    if (allSelected) {
                        // 取消全選
                        for (let i = 0; i < 7; i++) {
                            const scheduledOnDay = (groups || []).some(g => g.dayIndex === i && ((g.members || []).includes(charId) || (g.reserves || []).includes(charId)));
                            if (scheduledOnDay) {
                                hasError = true; // 已經被排班的不能取消
                            } else {
                                newDays[i] = false;
                            }
                        }
                        if (hasError) {
                            setAlertMessage('⚠️ 部分日期取消失敗！\n因為該角色在某些日期已經被排入隊伍了。\n若需請假，請聯絡管理員協助移除。');
                        }
                    } else {
                        // 全選
                        newDays = Array(7).fill(true);
                    }
                    
                    setLocalAvail({ ...localAvail, [charId]: { ...charAvail, days: newDays } });
                };

                const toggleBoss = (charId, bossId) => {
                    const charAvail = getAvail(charId);
                    const currentBosses = charAvail.bosses || [];
                    const currentCounts = charAvail.bossCounts || {};

                    if (currentBosses.includes(bossId)) {
                        const assignedCount = (groups || []).filter(g => g.bossId === bossId && ((g.members || []).includes(charId) || (g.reserves || []).includes(charId))).length;
                        if (assignedCount > 0) {
                            setAlertMessage(`⚠️ 取消失敗！\n此角色已被排入 ${assignedCount} 個「${(bosses || []).find(b=>b.id===bossId)?.name}」隊伍。\n若需取消報名，請聯絡管理員協助移除。`);
                            return; 
                        }
                        const newBosses = currentBosses.filter(id => id !== bossId);
                        const newCounts = { ...currentCounts };
                        delete newCounts[bossId];
                        setLocalAvail({ ...localAvail, [charId]: { ...charAvail, bosses: newBosses, bossCounts: newCounts } });
                    } else {
                        setLocalAvail({ ...localAvail, [charId]: { ...charAvail, bosses: [...currentBosses, bossId], bossCounts: { ...currentCounts, [bossId]: 1 } } });
                    }
                };

                const updateBossCount = (charId, bossId, count) => {
                    const assignedCount = (groups || []).filter(g => g.bossId === bossId && ((g.members || []).includes(charId) || (g.reserves || []).includes(charId))).length;
                    if (count < assignedCount) {
                        setAlertMessage(`⚠️ 修改失敗！\n此角色已經被排入 ${assignedCount} 個「${(bosses || []).find(b=>b.id===bossId)?.name}」隊伍。\n報名場次不能低於已排入的數量，若需修改請聯絡管理員。`);
                        return; 
                    }
                    const charAvail = getAvail(charId);
                    setLocalAvail({ ...localAvail, [charId]: { ...charAvail, bossCounts: { ...(charAvail.bossCounts || {}), [bossId]: count } } });
                };

                const updateNote = (charId, e) => {
                    const charAvail = getAvail(charId);
                    setLocalAvail({ ...localAvail, [charId]: { ...charAvail, note: e.target.value } });
                };

                const saveToCloud = () => {
                    if (Object.keys(localAvail).length > 0) {
                        const now = Date.now();
                        const updatedLocal = {};
                        for (const charId in localAvail) {
                            updatedLocal[charId] = { ...localAvail[charId], lastUpdated: now };
                        }
                        const mergedAvailability = { ...(availability || {}), ...updatedLocal };
                        setAvailability(mergedAvailability);
                        setLocalAvail({}); 
                    }
                    setAlertMessage('報名成功🎉');
                };

                return (
                    <div className="space-y-6">
                        <div className="flex justify-between items-center bg-white dark:bg-gray-800 p-4 rounded-lg shadow border-l-4 border-blue-500 transition-colors">
                            <div className="flex items-center">
                                <h2 className="text-2xl font-bold text-gray-800 dark:text-gray-100">我的資訊卡</h2>
                                <span className="ml-3 px-2.5 py-0.5 bg-blue-100 text-blue-700 dark:bg-blue-900/30 dark:text-blue-400 text-sm font-bold rounded-full shadow-sm border border-blue-200 dark:border-blue-800">
                                    本週已報名玩家: {signedUpPlayersCount} 人
                                </span>
                            </div>
                            <button onClick={() => {
                                setEditCharId(null);
                                setNewChar({ name: currentAccount.playerName, job: '', jobTypeId: '', level: 0 });
                                setIsAddCharModalOpen(true);
                            }} className="bg-blue-600 text-white px-5 py-2 rounded font-bold hover:bg-blue-700 shadow transition-colors">
                                + 新增角色
                            </button>
                        </div>

                        {myCharacters.map((char) => {
                            const charAvail = getAvail(char.id);
                            
                            // Calculate dynamically the sum of all checked bosses' counts (過濾已刪除王團)
                            const validSelectedBosses = (charAvail.bosses || []).filter(bId => bosses.some(b => b.id === bId));
                            const totalSelectedRuns = validSelectedBosses.reduce((sum, bId) => sum + (parseInt((charAvail.bossCounts || {})[bId]) || 1), 0);
                            const allowedMaxRuns = Math.max(1, Math.min(2, totalSelectedRuns));
                            const currentDisplayMaxRuns = Math.min(charAvail.maxWeeklyRuns || 2, allowedMaxRuns);

                            return (
                                <div key={char.id} className="bg-white dark:bg-gray-800 p-6 rounded-lg shadow border border-gray-100 dark:border-gray-700 transition-colors">
                                    <div className="mb-4 flex justify-between items-center border-b dark:border-gray-700 pb-2">
                                        <div className="flex items-center space-x-3">
                                            <span className="font-bold text-xl dark:text-gray-100">{char.name}</span>
                                            <span style={getJobStyle(char.jobTypeId)} className="px-2 py-1 rounded text-xs font-bold shadow-sm">
                                                {char.job} (Lv.{char.level})
                                            </span>
                                        </div>
                                        <div className="flex space-x-2">
                                            <button onClick={() => {
                                                setEditCharId(char.id);
                                                setNewChar({ name: currentAccount.playerName, job: char.job, jobTypeId: char.jobTypeId, level: char.level });
                                                setIsAddCharModalOpen(true);
                                            }} className="text-gray-500 dark:text-gray-400 hover:text-blue-600 dark:hover:text-blue-400 font-bold text-sm px-3 py-1 bg-gray-100 dark:bg-gray-700 hover:bg-blue-50 dark:hover:bg-gray-600 rounded transition-colors border border-gray-200 dark:border-gray-600">
                                                編輯
                                            </button>
                                            <button onClick={() => setCharToDelete(char.id)} className="text-gray-500 dark:text-gray-400 hover:text-red-600 dark:hover:text-red-400 font-bold text-sm px-3 py-1 bg-gray-100 dark:bg-gray-700 hover:bg-red-50 dark:hover:bg-gray-600 rounded transition-colors border border-gray-200 dark:border-gray-600">
                                                刪除
                                            </button>
                                        </div>
                                    </div>

                                    {/* 王團與場次選擇 */}
                                    <div className="mb-6 bg-orange-50 dark:bg-orange-900/10 p-4 rounded-lg border border-orange-100 dark:border-orange-800/30">
                                        <h3 className="font-bold text-orange-800 dark:text-orange-400 mb-3">請選擇此角色本週突襲王與場數 (可複選)：</h3>
                                        <div className="flex flex-wrap gap-4">
                                            {(bosses || []).map(boss => {
                                                const isChecked = (charAvail.bosses || []).includes(boss.id);
                                                const count = (charAvail.bossCounts && charAvail.bossCounts[boss.id]) ? charAvail.bossCounts[boss.id] : 1;
                                                return (
                                                    <div key={boss.id} style={{ borderColor: isChecked ? boss.color : (darkMode ? '#4b5563' : '#e5e7eb') }} className={`flex items-center bg-white dark:bg-gray-800 px-3 py-2 rounded border transition-all ${isChecked ? 'shadow-md' : 'hover:bg-gray-50 dark:hover:bg-gray-700'}`}>
                                                        <label className="flex items-center space-x-2 cursor-pointer flex-1 mr-2">
                                                            <input 
                                                                type="checkbox" 
                                                                className="w-4 h-4 rounded bg-gray-100 dark:bg-gray-700 border-gray-300 dark:border-gray-600"
                                                                checked={isChecked}
                                                                onChange={() => toggleBoss(char.id, boss.id)}
                                                            />
                                                            <span className="font-bold" style={{ color: boss.color }}>{boss.icon} {boss.name}</span>
                                                        </label>
                                                        {isChecked && (
                                                            <div className="flex items-center border-l pl-2 border-gray-200 dark:border-gray-600">
                                                                <span className="text-xs text-gray-500 dark:text-gray-400 mr-1">場次:</span>
                                                                <input 
                                                                    type="number" 
                                                                    min="1" 
                                                                    max="2" 
                                                                    className="w-12 p-0.5 text-center border rounded text-xs font-bold focus:ring-1 focus:outline-none bg-white dark:bg-gray-700"
                                                                    style={{ borderColor: boss.color, color: boss.color }}
                                                                    value={count}
                                                                    onChange={(e) => {
                                                                        let val = parseInt(e.target.value) || 1;
                                                                        if (val > 2) val = 2;
                                                                        if (val < 1) val = 1;
                                                                        updateBossCount(char.id, boss.id, val);
                                                                    }}
                                                                />
                                                            </div>
                                                        )}
                                                    </div>
                                                )
                                            })}
                                        </div>
                                        <div className="mt-4 pt-3 border-t border-orange-200 dark:border-orange-800/30 flex flex-col sm:flex-row sm:items-center justify-between gap-2">
                                            <div className="text-sm font-bold text-orange-800 dark:text-orange-400">
                                                此角色本週最多可出勤幾團？
                                                <span className="text-xs text-orange-600 dark:text-orange-300 ml-1 font-normal block sm:inline">(若勾選多個突襲王沒有明確備註，將會由管理員隨機安排)</span>
                                            </div>
                                            <select
                                                className="p-1.5 border border-orange-300 rounded font-black text-orange-700 bg-orange-50 dark:bg-gray-700 dark:text-orange-300 dark:border-orange-600 focus:ring-2 focus:ring-orange-500 shadow-sm disabled:opacity-50 disabled:cursor-not-allowed"
                                                value={currentDisplayMaxRuns}
                                                disabled={allowedMaxRuns <= 1}
                                                onChange={(e) => {
                                                    setLocalAvail({
                                                        ...localAvail,
                                                        [char.id]: { ...charAvail, maxWeeklyRuns: parseInt(e.target.value) }
                                                    });
                                                }}
                                            >
                                                <option value={1}>最多 1 團</option>
                                                {allowedMaxRuns >= 2 && <option value={2}>最多 2 團</option>}
                                            </select>
                                        </div>
                                    </div>

                                    {/* 日期選擇 */}
                                    <div className="mb-4">
                                        <div className="flex justify-between items-center mb-2">
                                            <h3 className="font-bold text-gray-700 dark:text-gray-300">請勾選可出團的日期：</h3>
                                            <button 
                                                onClick={() => handleSelectAllDays(char.id)}
                                                className="text-xs px-3 py-1 bg-blue-100 hover:bg-blue-200 text-blue-700 dark:bg-blue-900/30 dark:text-blue-400 dark:hover:bg-blue-800/50 rounded font-bold transition-colors border border-blue-200 dark:border-blue-700"
                                            >
                                                {charAvail.days.every(d => d) ? '取消全選' : '全選'}
                                            </button>
                                        </div>
                                        <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-4">
                                            {days.map((day, index) => (
                                                <label key={index} className={`cursor-pointer border rounded-lg p-3 flex flex-col items-center justify-center transition-colors ${charAvail.days[index] ? 'bg-blue-50 dark:bg-blue-900/20 border-blue-400 dark:border-blue-500' : 'bg-gray-50 dark:bg-gray-700/50 hover:bg-gray-100 dark:hover:bg-gray-600 border-gray-200 dark:border-gray-600'}`}>
                                                    <input 
                                                        type="checkbox" 
                                                        className="w-5 h-5 mb-1 text-blue-600 bg-gray-100 dark:bg-gray-600 border-gray-300 dark:border-gray-500"
                                                        checked={charAvail.days[index] || false}
                                                        onChange={() => toggleDay(char.id, index)}
                                                    />
                                                    <span className="font-bold text-sm text-gray-800 dark:text-gray-100">{day.split(' ')[0]}</span>
                                                    <span className="text-xs text-gray-500 dark:text-gray-400">({day.split(' ')[1]})</span>
                                                </label>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="mb-2">
                                        <input 
                                            type="text" 
                                            className="w-full border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-100 p-2 rounded focus:ring-2 focus:ring-blue-500 focus:outline-none"
                                            value={charAvail.note}
                                            onChange={(e) => updateNote(char.id, e)}
                                            placeholder="時間備註 (例如：晚上9點後)"
                                        />
                                    </div>
                                </div>
                            );
                        })}

                        <div className="text-right">
                            <button onClick={saveToCloud} className="bg-blue-600 text-white px-8 py-3 rounded-lg font-bold hover:bg-blue-700 transition-colors shadow-lg">
                                確認報名
                            </button>
                        </div>
                    </div>
                );
            };

            const renderAvailabilityMatrix = () => {
                const assignCharToGroup = (charId, groupId) => {
                    if (!groupId) return;
                    
                    const group = (groups || []).find(g => g.id === groupId);
                    if (!group) return;

                    if (group.status === 'completed') {
                        setAlertMessage('⚠️ 此隊伍已鎖定 (已完成出團)，無法再指派隊員！');
                        return;
                    }
                    
                    const totalWeeklyAssigned = (groups || []).reduce((sum, g) => {
                        const inMembers = (g.members || []).includes(charId) ? 1 : 0;
                        const inReserves = (g.reserves || []).includes(charId) ? 1 : 0;
                        return sum + inMembers + inReserves;
                    }, 0);
                    
                    const avail = (availability || {})[charId] || {};
                    const maxRuns = getEffectiveMaxRuns(avail);
                    
                    if (totalWeeklyAssigned >= maxRuns) {
                        setAlertMessage(`⚠️ 指派失敗！此角色本週已達 ${maxRuns} 團出勤上限。`);
                        return;
                    }

                    const emptyIdx = (group.members || []).findIndex(m => m === '');
                    if (emptyIdx === -1) {
                        setAlertMessage(`「${group.name}」的正式隊員已滿！\n請至「王團編組排班」頁面手動將其加入候補。`);
                        return;
                    }
                    const newGroups = (groups || []).map(g => {
                        if (g.id === groupId) {
                            const newMembers = [...(g.members || [])];
                            newMembers[emptyIdx] = charId;
                            return { ...g, members: newMembers };
                        }
                        return g;
                    });
                    setGroups(newGroups);
                };

                const removeCharFromGroup = (charId, groupId) => {
                    const group = (groups || []).find(g => g.id === groupId);
                    if (group && group.status === 'completed') {
                        setAlertMessage('⚠️ 此隊伍已鎖定 (已完成出團)，無法移除隊員！');
                        return;
                    }

                    const newGroups = (groups || []).map(g => {
                        if (g.id === groupId) {
                            const newMembers = (g.members || []).map(m => m === charId ? '' : m);
                            const newReserves = (g.reserves || []).map(m => m === charId ? '' : m);
                            return { ...g, members: newMembers, reserves: newReserves };
                        }
                        return g;
                    });
                    setGroups(newGroups);
                };

                let sortedCharacters = [...(characters || [])];
                if (matrixSortMode === 'name') {
                    sortedCharacters.sort((a, b) => a.name.localeCompare(b.name, 'zh-TW'));
                } else if (matrixSortMode === 'job') {
                    sortedCharacters.sort((a, b) => {
                        const idxA = (jobCategories || []).findIndex(j => j.id === a.jobTypeId);
                        const idxB = (jobCategories || []).findIndex(j => j.id === b.jobTypeId);
                        const posA = idxA !== -1 ? idxA : 9999;
                        const posB = idxB !== -1 ? idxB : 9999;
                        if (posA !== posB) return posA - posB;
                        return b.level - a.level;
                    });
                } else if (matrixSortMode === 'levelDesc') {
                    sortedCharacters.sort((a, b) => b.level - a.level);
                } else if (matrixSortMode === 'levelAsc') {
                    sortedCharacters.sort((a, b) => a.level - b.level);
                }

                const displayCharacters = sortedCharacters.filter(char => {
                    const avail = (availability || {})[char.id] || {};
                    if (!avail.days || !avail.days.some(d => d)) return false;
                    if (matrixBossTab !== 'all') {
                        if (!avail.bosses || !avail.bosses.includes(matrixBossTab)) return false;
                    }

                    // --- 排班狀態過濾 (Status Filter) ---
                    const totalWeeklyAssigned = (groups || []).reduce((sum, g) => {
                        const inMembers = (g.members || []).includes(char.id) ? 1 : 0;
                        const inReserves = (g.reserves || []).includes(char.id) ? 1 : 0;
                        return sum + inMembers + inReserves;
                    }, 0);
                    const maxRuns = getEffectiveMaxRuns(avail);

                    if (matrixStatusFilter === 'zero' && totalWeeklyAssigned > 0) return false;
                    if (matrixStatusFilter === 'short' && (totalWeeklyAssigned === 0 || totalWeeklyAssigned >= maxRuns)) return false;
                    if (matrixStatusFilter === 'full' && totalWeeklyAssigned < maxRuns) return false;

                    return true;
                });

                return (
                    <div className="bg-white dark:bg-gray-800 p-6 rounded-lg shadow overflow-x-auto transition-colors">
                        <div className="flex justify-between items-center mb-4">
                            <h2 className="text-2xl font-bold text-gray-800 dark:text-gray-100">所有角色報名總表</h2>
                        </div>

                        <div className="flex flex-col md:flex-row md:justify-between md:items-center gap-3 mb-4 border-b border-gray-100 dark:border-gray-700 pb-3">
                            <div className="flex space-x-2 overflow-x-auto flex-1 pb-1">
                                <button 
                                    className={`px-4 py-2 rounded-full font-bold text-sm whitespace-nowrap transition-all shadow-sm ${matrixBossTab === 'all' ? 'bg-gray-800 dark:bg-gray-200 text-white dark:text-gray-900 scale-105' : 'bg-gray-100 dark:bg-gray-700 text-gray-500 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-600'}`}
                                    onClick={() => setMatrixBossTab('all')}
                                >
                                    📋 報名總表
                                </button>
                                {(bosses || []).map(boss => (
                                    <button 
                                        key={boss.id}
                                        className={`px-4 py-2 rounded-full font-bold text-sm whitespace-nowrap transition-all shadow-sm ${matrixBossTab === boss.id ? 'scale-105' : 'hover:bg-gray-50 dark:hover:bg-gray-700 opacity-70 hover:opacity-100'}`}
                                        style={{ 
                                            backgroundColor: matrixBossTab === boss.id ? boss.color : (darkMode ? '#374151' : '#ffffff'),
                                            color: matrixBossTab === boss.id ? '#ffffff' : boss.color,
                                            border: `2px solid ${boss.color}`
                                        }}
                                        onClick={() => setMatrixBossTab(boss.id)}
                                    >
                                        {boss.icon} {boss.name}
                                    </button>
                                ))}
                            </div>
                            <div className="flex-shrink-0">
                                <select 
                                    className="p-2 border border-blue-300 dark:border-blue-700 rounded text-xs font-bold text-blue-700 dark:text-blue-300 bg-blue-50 dark:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500 shadow-sm cursor-pointer"
                                    value={matrixStatusFilter}
                                    onChange={e => setMatrixStatusFilter(e.target.value)}
                                >
                                    <option value="all" className="bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-200">🚦 顯示全部排班狀態</option>
                                    <option value="zero" className="bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-200">🔴 完全沒團 (0場)</option>
                                    <option value="short" className="bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-200">🟡 還缺團 (未滿上限)</option>
                                    <option value="full" className="bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-200">🟢 已經排滿 (達上限)</option>
                                </select>
                            </div>
                        </div>

                        <table className="w-full border-collapse text-sm text-left whitespace-nowrap">
                            <thead>
                                <tr className="bg-orange-100 dark:bg-orange-900/30 border-b-2 border-orange-300 dark:border-orange-800 text-gray-800 dark:text-gray-200">
                                    <th className="p-2 border dark:border-gray-700">
                                        <div className="flex items-center space-x-1">
                                            <span>角色名稱</span>
                                            <div className="relative w-4 h-4 text-orange-500 dark:text-orange-400 hover:text-orange-700 dark:hover:text-orange-300 transition-colors" title="選擇排序方式">
                                                <select 
                                                    className="opacity-0 absolute inset-0 w-full h-full cursor-pointer z-10"
                                                    value={matrixSortMode === 'name' ? matrixSortMode : 'default'}
                                                    onChange={(e) => setMatrixSortMode(e.target.value)}
                                                >
                                                    <option value="default" className="bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-200">預設順序</option>
                                                    <option value="name" className="bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-200">按筆畫排序</option>
                                                </select>
                                                <svg className="w-4 h-4 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M19 9l-7 7-7-7"></path></svg>
                                            </div>
                                        </div>
                                    </th>
                                    <th className="p-2 border dark:border-gray-700">
                                        <div className="flex items-center space-x-1">
                                            <span>職業</span>
                                            <div className="relative w-4 h-4 text-orange-500 dark:text-orange-400 hover:text-orange-700 dark:hover:text-orange-300 transition-colors" title="選擇排序方式">
                                                <select 
                                                    className="opacity-0 absolute inset-0 w-full h-full cursor-pointer z-10"
                                                    value={['job', 'levelDesc', 'levelAsc'].includes(matrixSortMode) ? matrixSortMode : 'default'}
                                                    onChange={(e) => setMatrixSortMode(e.target.value)}
                                                >
                                                    <option value="default" className="bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-200">預設順序</option>
                                                    <option value="job" className="bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-200">同職業排序</option>
                                                    <option value="levelDesc" className="bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-200">等級高到低</option>
                                                    <option value="levelAsc" className="bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-200">等級低到高</option>
                                                </select>
                                                <svg className="w-4 h-4 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M19 9l-7 7-7-7"></path></svg>
                                            </div>
                                        </div>
                                    </th>
                                    <th className="p-2 border dark:border-gray-700 w-1/4">報名的王團</th>
                                    <th className="p-2 border dark:border-gray-700 w-1/5">
                                        <div className="flex items-center space-x-1">
                                            <span>備註</span>
                                            <button onClick={() => setShowRegistrationTime(!showRegistrationTime)} className="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 transition-colors focus:outline-none ml-1" title={showRegistrationTime ? "隱藏報名時間" : "顯示報名時間"}>
                                                {showRegistrationTime ? '👁️' : '🙈'}
                                            </button>
                                        </div>
                                    </th>
                                    {days.map((day, i) => (
                                        <th key={i} className="p-2 border dark:border-gray-700 text-center min-w-[90px] align-top">
                                            <div className="font-bold text-gray-800 dark:text-gray-200 text-base">{day.split(' ')[0]}</div>
                                            <div className="text-xs text-gray-500 dark:text-gray-400 mb-1">({day.split(' ')[1]})</div>
                                            {(currentAccount.role === 'admin' || currentAccount.role === 'subadmin') && (
                                                <button
                                                    onClick={() => handleOpenCreateModal(i)}
                                                    className="w-full bg-indigo-50 dark:bg-indigo-900/30 border border-indigo-200 dark:border-indigo-700 text-indigo-700 dark:text-indigo-300 text-[11px] px-1 py-1 rounded hover:bg-indigo-100 dark:hover:bg-indigo-800/50 font-bold transition-colors shadow-sm"
                                                    title={`在 ${day} 建立新王團`}
                                                >
                                                    + 開團
                                                </button>
                                            )}
                                        </th>
                                    ))}
                                </tr>
                            </thead>
                            <tbody>
                                {displayCharacters.map(char => {
                                    const avail = (availability || {})[char.id] || {};
                                    const safeDays = avail.days || Array(7).fill(false);
                                    const safeBosses = avail.bosses || [];
                                    const safeBossCounts = avail.bossCounts || {};
                                    
                                    const sameAccountCharIds = (characters || []).filter(c => c.accountId === char.accountId).map(c => c.id);

                                    // 計算該角色一週內總共被指派的次數
                                    const totalWeeklyAssigned = (groups || []).reduce((sum, g) => {
                                        const inMembers = (g.members || []).includes(char.id) ? 1 : 0;
                                        const inReserves = (g.reserves || []).includes(char.id) ? 1 : 0;
