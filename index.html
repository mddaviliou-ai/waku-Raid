                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 px-4">
                            <div className="bg-white p-6 rounded-xl shadow-2xl w-full max-w-md border-t-8 border-blue-500">
                                <h2 className="text-2xl font-black mb-4 flex items-center">
                                    <span className="text-blue-500 mr-2">{editCharId ? '✏️' : '➕'}</span> 
                                    {editCharId ? '編輯遊戲角色' : '新增遊戲角色'}
                                </h2>
                                <div className="space-y-4">
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-1">角色名稱 (與帳號綁定)</label>
                                        <input type="text" className="w-full p-2 border border-gray-300 rounded bg-gray-100 font-bold text-gray-500 cursor-not-allowed" value={currentAccount.playerName} disabled title="角色名稱與帳號名稱連動" />
                                    </div>
                                    <div className="flex gap-4">
                                        <div className="flex-1">
                                            <label className="block text-sm font-bold text-gray-700 mb-1">職業 (三轉/四轉)</label>
                                            <select 
                                                className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 font-medium" 
                                                value={newChar.jobTypeId} 
                                                onChange={e => {
                                                    const selected = jobCategories.find(jc => jc.id === e.target.value);
                                                    setNewChar({...newChar, jobTypeId: e.target.value, job: selected ? selected.name : ''})
                                                }}
                                            >
                                                <option value="" disabled>-- 選擇職業 --</option>
                                                {Object.entries(groupedJobs).map(([groupName, jobs]) => (
                                                    <optgroup key={groupName} label={groupName}>
                                                        {jobs.map(jc => <option key={jc.id} value={jc.id}>{jc.name}</option>)}
                                                    </optgroup>
                                                ))}
                                            </select>
                                        </div>
                                        <div className="w-24">
                                            <label className="block text-sm font-bold text-gray-700 mb-1">等級</label>
                                            <input type="number" className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500" value={newChar.level} onChange={e => setNewChar({...newChar, level: e.target.value})} />
                                        </div>
                                    </div>
                                </div>
                                <div className="mt-6 flex justify-end space-x-3">
                                    <button onClick={() => setIsAddCharModalOpen(false)} className="px-5 py-2 text-gray-600 bg-gray-100 hover:bg-gray-200 rounded font-bold transition-colors">取消</button>
                                    <button onClick={handleAddCharacter} className="px-5 py-2 bg-blue-600 text-white rounded font-bold hover:bg-blue-700 shadow transition-colors">
                                        {editCharId ? '儲存修改' : '確認新增'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 新增王團 Modal */}
                    {isCreateModalOpen && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 px-4">
                            <div className="bg-white p-6 rounded-xl shadow-2xl w-full max-w-md border-t-8 border-indigo-500">
                                <h2 className="text-2xl font-black mb-4 flex items-center"><span className="text-indigo-500 mr-2">✚</span> 新增王團隊伍</h2>
                                <div className="space-y-4">
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-1">選擇王團</label>
                                        <select 
                                            className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-indigo-500" 
                                            value={newGroup.bossId} 
                                            onChange={e => {
                                                const newBossId = e.target.value;
                                                const newBoss = bosses.find(b => b.id === newBossId);
                                                // 切換王團時，動態更新預設隊伍名稱
                                                const bossGroupsCount = groups.filter(g => g.bossId === newBossId).length;
                                                const defaultGroupName = newBoss ? `${bossGroupsCount + 1}.${newBoss.name}` : '';
                                                setNewGroup({...newGroup, bossId: newBossId, name: defaultGroupName});
                                            }}
                                        >
                                            {bosses.map(b => <option key={b.id} value={b.id}>{b.icon} {b.name}</option>)}
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-1">隊伍名稱 (可自訂修改)</label>
                                        <input type="text" className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-indigo-500" placeholder="例: 1.殘暴炎魔" value={newGroup.name} onChange={e => setNewGroup({...newGroup, name: e.target.value})} />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-1">出團日期</label>
                                        <select className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-indigo-500 font-medium text-indigo-700" value={newGroup.dayIndex} onChange={e => setNewGroup({...newGroup, dayIndex: e.target.value})}>
                                            {days.map((d, i) => <option key={i} value={i}>{d}</option>)}
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-1">詳細時間說明 (可自訂修改)</label>
                                        <input type="text" className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-indigo-500" placeholder="例: 21:30~22:00集合" value={newGroup.time} onChange={e => setNewGroup({...newGroup, time: e.target.value})} />
                                    </div>
                                </div>
                                <div className="mt-6 flex justify-end space-x-3">
                                    <button onClick={() => setIsCreateModalOpen(false)} className="px-5 py-2 text-gray-600 bg-gray-100 hover:bg-gray-200 rounded font-bold transition-colors">取消</button>
                                    <button onClick={handleAddGroup} className="px-5 py-2 bg-indigo-600 text-white rounded font-bold hover:bg-indigo-700 shadow transition-colors">確認建立</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 自訂 Alert Modal (系統提示) */}
                    {alertMessage && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-[60] px-4">
                            <div className="bg-white p-6 rounded-xl shadow-2xl w-full max-w-sm border-t-8 border-yellow-500">
                                <h2 className="text-xl font-black mb-4 flex items-center text-yellow-600">⚠️ 系統提示</h2>
                                <p className="mb-6 text-gray-700 whitespace-pre-line">{alertMessage}</p>
                                <div className="flex justify-end">
                                    <button onClick={() => setAlertMessage('')} className="px-5 py-2 bg-yellow-500 text-white rounded font-bold hover:bg-yellow-600 transition-colors">確認</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 自訂 Confirm Modal (隊伍刪除確認) */}
                    {groupToDelete && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-[60] px-4">
                            <div className="bg-white p-6 rounded-xl shadow-2xl w-full max-w-sm border-t-8 border-red-500">
                                <h2 className="text-xl font-black mb-4 flex items-center text-red-600">🚨 刪除確認</h2>
                                <p className="mb-6 text-gray-700">確定要刪除這個隊伍嗎？<br/><span className="text-red-500 font-bold">此操作無法復原。</span></p>
                                <div className="flex justify-end space-x-3">
                                    <button onClick={() => setGroupToDelete(null)} className="px-5 py-2 text-gray-600 bg-gray-100 hover:bg-gray-200 rounded font-bold transition-colors">取消</button>
                                    <button onClick={() => {
                                        setGroups(groups.filter(g => g.id !== groupToDelete));
                                        setGroupToDelete(null);
                                    }} className="px-5 py-2 bg-red-600 text-white rounded font-bold hover:bg-red-700 shadow transition-colors">確認刪除</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 自訂 Confirm Modal (角色刪除確認) */}
                    {charToDelete && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-[60] px-4">
                            <div className="bg-white p-6 rounded-xl shadow-2xl w-full max-w-sm border-t-8 border-red-500">
                                <h2 className="text-xl font-black mb-4 flex items-center text-red-600">🚨 刪除角色確認</h2>
                                <p className="mb-6 text-gray-700">確定要刪除該角色嗎？<br/><span className="text-red-500 font-bold">這將會同時將其從已排入的王團中移除。</span></p>
                                <div className="flex justify-end space-x-3">
                                    <button onClick={() => setCharToDelete(null)} className="px-5 py-2 text-gray-600 bg-gray-100 hover:bg-gray-200 rounded font-bold transition-colors">取消</button>
                                    <button onClick={confirmDeleteChar} className="px-5 py-2 bg-red-600 text-white rounded font-bold hover:bg-red-700 shadow transition-colors">確認刪除</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 自訂 Confirm Modal (帳號刪除確認) */}
                    {accountToDelete && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-[60] px-4">
                            <div className="bg-white p-6 rounded-xl shadow-2xl w-full max-w-sm border-t-8 border-red-500">
                                <h2 className="text-xl font-black mb-4 flex items-center text-red-600">🚨 刪除帳號確認</h2>
                                <p className="mb-6 text-gray-700">確定要刪除該玩家帳號嗎？<br/><span className="text-red-500 font-bold">他將無法再登入系統。</span></p>
                                <div className="flex justify-end space-x-3">
                                    <button onClick={() => setAccountToDelete(null)} className="px-5 py-2 text-gray-600 bg-gray-100 hover:bg-gray-200 rounded font-bold transition-colors">取消</button>
                                    <button onClick={() => {
                                        setAccounts(accounts.filter(a => a.id !== accountToDelete));
                                        setAccountToDelete(null);
                                    }} className="px-5 py-2 bg-red-600 text-white rounded font-bold hover:bg-red-700 shadow transition-colors">確認刪除</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 自訂 Confirm Modal (換週清空確認) */}
                    {isConfirmResetOpen && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-[60] px-4">
                            <div className="bg-white p-6 rounded-xl shadow-2xl w-full max-w-sm border-t-8 border-yellow-500">
                                <h2 className="text-xl font-black mb-4 flex items-center text-yellow-600">⚠️ 換週清空確認</h2>
                                <p className="mb-6 text-gray-700">確定要清空所有人的報名資料與王團名單嗎？<br/><span className="text-red-500 font-bold">此操作將重置全部表單，無法復原！</span></p>
                                <div className="flex justify-end space-x-3">
                                    <button onClick={() => setIsConfirmResetOpen(false)} className="px-5 py-2 text-gray-600 bg-gray-100 hover:bg-gray-200 rounded font-bold transition-colors">取消</button>
                                    <button onClick={() => {
                                        const newAvail = {};
                                        characters.forEach(c => {
                                            newAvail[c.id] = { days: Array(7).fill(false), bosses: [], bossCounts: {}, note: '' };
                                        });
                                        setAvailability(newAvail); // 自動同步至雲端
                                        setGroups([]);             // 自動同步至雲端
                                        setIsConfirmResetOpen(false);
                                        setAlertMessage('已成功清空所有報名資料與排班名單！大家可以開始填寫新的一週了！');
                                    }} className="px-5 py-2 bg-yellow-600 text-white rounded font-bold hover:bg-yellow-700 shadow transition-colors">確認清空</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
