<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公會王團報名排班系統</title>
    
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 引入 React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- 引入 Babel 讓瀏覽器可以編譯 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f3f4f6; }
        .tab-active { border-bottom: 2px solid #3b82f6; color: #3b82f6; font-weight: bold; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        // 導入 Firebase 雲端服務
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, doc, setDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        const { useState, useEffect, useMemo } = React;

        // --- 初始化 Firebase 環境 ---
        let db, auth, appId;
        
        // ⚠️【實際上線修改區】⚠️
        const myFirebaseConfig = {
          apiKey: "AIzaSyCJ5fCwLV9RRDq9EP8ptxtr2ULGlucM7p0",
          authDomain: "waku-raid.firebaseapp.com",
          projectId: "waku-raid",
          storageBucket: "waku-raid.firebasestorage.app",
          messagingSenderId: "518269067136",
          appId: "1:518269067136:web:12990425af05581a83eb65",
          measurementId: "G-483JD2VM1B"
        };

        try {
            const envConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
            const finalConfig = myFirebaseConfig || envConfig;

            if (finalConfig) {
                const app = initializeApp(finalConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                appId = (typeof __app_id !== 'undefined' && !myFirebaseConfig) ? __app_id : 'waku-raid-custom-app';
            }
        } catch (e) {
            console.error("Firebase 連線初始化失敗", e);
        }

        // --- 預設資料庫 ---
        const initialBosses = [
            { id: 'b_zakum', name: '殘暴炎魔', icon: '🔥', color: '#ef4444' },
            { id: 'b_pap_n', name: '拉圖斯(普通)', icon: '⏰', color: '#3b82f6' },
            { id: 'b_pap_h', name: '拉圖斯(困難)', icon: '😈', color: '#8b5cf6' }
        ];

        // 1. 玩家帳號 
        const initialAccounts = [
            { id: 'a1', playerName: '伊爾參寺', role: 'admin', passcode: 'admin' },
            { id: 'a2', playerName: '熱狗蛋蛋', role: 'subadmin', passcode: 'admin' }
        ];

        const initialJobCategories = [
            { id: 'jc_w_1', group: '劍士系', name: '龍騎士', bgColor: '#fee2e2', textColor: '#991b1b', borderColor: '#fca5a5' },
            { id: 'jc_w_2', group: '劍士系', name: '黑騎士', bgColor: '#fee2e2', textColor: '#991b1b', borderColor: '#fca5a5' },
            { id: 'jc_w_3', group: '劍士系', name: '十字軍', bgColor: '#fee2e2', textColor: '#991b1b', borderColor: '#fca5a5' },
            { id: 'jc_w_4', group: '劍士系', name: '英雄', bgColor: '#fee2e2', textColor: '#991b1b', borderColor: '#fca5a5' },
            { id: 'jc_w_5', group: '劍士系', name: '騎士', bgColor: '#fee2e2', textColor: '#991b1b', borderColor: '#fca5a5' },
            { id: 'jc_w_6', group: '劍士系', name: '聖騎士', bgColor: '#fee2e2', textColor: '#991b1b', borderColor: '#fca5a5' },
            { id: 'jc_m_1', group: '法師系', name: '冰雷', bgColor: '#dbeafe', textColor: '#1e3a8a', borderColor: '#93c5fd' },
            { id: 'jc_m_2', group: '法師系', name: '冰雷大魔導', bgColor: '#dbeafe', textColor: '#1e3a8a', borderColor: '#93c5fd' },
            { id: 'jc_m_3', group: '法師系', name: '火毒', bgColor: '#dbeafe', textColor: '#1e3a8a', borderColor: '#93c5fd' },
            { id: 'jc_m_4', group: '法師系', name: '火毒大魔導', bgColor: '#dbeafe', textColor: '#1e3a8a', borderColor: '#93c5fd' },
            { id: 'jc_m_5', group: '法師系', name: '祭司', bgColor: '#dbeafe', textColor: '#1e3a8a', borderColor: '#93c5fd' },
            { id: 'jc_m_6', group: '法師系', name: '主教', bgColor: '#dbeafe', textColor: '#1e3a8a', borderColor: '#93c5fd' },
            { id: 'jc_b_1', group: '弓箭手', name: '遊俠', bgColor: '#dcfce7', textColor: '#166534', borderColor: '#86efac' },
            { id: 'jc_b_2', group: '弓箭手', name: '箭神', bgColor: '#dcfce7', textColor: '#166534', borderColor: '#86efac' },
            { id: 'jc_b_3', group: '弓箭手', name: '狙擊手', bgColor: '#dcfce7', textColor: '#166534', borderColor: '#86efac' },
            { id: 'jc_b_4', group: '弓箭手', name: '神射手', bgColor: '#dcfce7', textColor: '#166534', borderColor: '#86efac' },
            { id: 'jc_t_1', group: '盜賊系', name: '神偷', bgColor: '#f3e8ff', textColor: '#6b21a8', borderColor: '#d8b4fe' },
            { id: 'jc_t_2', group: '盜賊系', name: '暗影神偷', bgColor: '#f3e8ff', textColor: '#6b21a8', borderColor: '#d8b4fe' },
            { id: 'jc_t_3', group: '盜賊系', name: '暗殺者', bgColor: '#f3e8ff', textColor: '#6b21a8', borderColor: '#d8b4fe' },
            { id: 'jc_t_4', group: '盜賊系', name: '夜使者', bgColor: '#f3e8ff', textColor: '#6b21a8', borderColor: '#d8b4fe' },
            { id: 'jc_p_1', group: '海盜系', name: '格鬥家', bgColor: '#ffedd5', textColor: '#9a3412', borderColor: '#fdba74' },
            { id: 'jc_p_2', group: '海盜系', name: '拳霸', bgColor: '#ffedd5', textColor: '#9a3412', borderColor: '#fdba74' },
            { id: 'jc_p_3', group: '海盜系', name: '神槍手', bgColor: '#ffedd5', textColor: '#9a3412', borderColor: '#fdba74' },
            { id: 'jc_p_4', group: '海盜系', name: '槍神', bgColor: '#ffedd5', textColor: '#9a3412', borderColor: '#fdba74' }
        ];

        const initialCharacters = [];
        const initialAvailability = {};
        const initialGroups = [];

        const App = () => {
            // --- 雲端同步與授權機制 ---
            const [user, setUser] = useState(null);
            
            useEffect(() => {
                if (!auth) return;
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch(e) { console.error("認證失敗", e); }
                };
                initAuth();
                const unsub = onAuthStateChanged(auth, setUser);
                return () => unsub();
            }, []);

            const updateCloud = (key, val) => {
                if (!user || !db) return;
                setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'guildState', 'main'), { [key]: val }, { merge: true });
            };

            const [bosses, _setBosses] = useState(initialBosses);
            const setBosses = (val) => { _setBosses(val); updateCloud('bosses', val); };

            const [jobCategories, _setJobCategories] = useState(initialJobCategories);
            const setJobCategories = (val) => { _setJobCategories(val); updateCloud('jobCategories', val); };

            const [accounts, _setAccounts] = useState(initialAccounts);
            const setAccounts = (val) => { _setAccounts(val); updateCloud('accounts', val); };

            const [characters, _setCharacters] = useState(initialCharacters);
            const setCharacters = (val) => { _setCharacters(val); updateCloud('characters', val); };

            const [availability, _setAvailability] = useState(initialAvailability);
            const setAvailability = (val) => { _setAvailability(val); updateCloud('availability', val); };

            const [groups, _setGroups] = useState(initialGroups);
            const setGroups = (val) => { _setGroups(val); updateCloud('groups', val); };

            const [weekStartDate, _setWeekStartDate] = useState(new Date().toISOString().split('T')[0]); 
            const setWeekStartDate = (val) => { _setWeekStartDate(val); updateCloud('weekStartDate', val); };

            useEffect(() => {
                if (!user || !db) return;
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'guildState', 'main');
                const unsub = onSnapshot(docRef, (snap) => {
                    if (snap.exists()) {
                        const data = snap.data();
                        if(data.bosses) _setBosses(data.bosses);
                        if(data.jobCategories) _setJobCategories(data.jobCategories);
                        if(data.accounts) _setAccounts(data.accounts);
                        if(data.characters) _setCharacters(data.characters);
                        if(data.availability) _setAvailability(data.availability);
                        if(data.groups) _setGroups(data.groups);
                        if(data.weekStartDate) _setWeekStartDate(data.weekStartDate);
                    } else {
                        setDoc(docRef, { bosses, jobCategories, accounts, characters, availability, groups, weekStartDate });
                    }
                }, (err) => console.error(err));
                return () => unsub();
            }, [user]);

            const days = useMemo(() => {
                const start = new Date(weekStartDate);
                const wdays = ['週日', '週一', '週二', '週三', '週四', '週五', '週六'];
                return Array.from({length: 7}).map((_, i) => {
                    const d = new Date(start);
                    d.setDate(d.getDate() + i);
                    return `${d.getMonth()+1}/${d.getDate()} ${wdays[d.getDay()]}`;
                });
            }, [weekStartDate]);
            
            const [loggedInId, setLoggedInId] = useState(() => localStorage.getItem('waku-raid-loggedInId') || null);
            const currentAccount = accounts.find(a => a.id === loggedInId) || null;
            const [activeTab, setActiveTab] = useState('my-schedule');

            const handleLogin = (id) => {
                setLoggedInId(id);
                localStorage.setItem('waku-raid-loggedInId', id);
                setActiveTab('my-schedule'); 
            };

            const handleLogout = () => {
                setLoggedInId(null);
                localStorage.removeItem('waku-raid-loggedInId');
            };

            const [isCreateModalOpen, setIsCreateModalOpen] = useState(false);
            const [newGroup, setNewGroup] = useState({ bossId: '', name: '', dayIndex: 0, time: '' });

            const [isAddCharModalOpen, setIsAddCharModalOpen] = useState(false);
            const [newChar, setNewChar] = useState({ name: '', job: '', jobTypeId: '', level: 200 });
            
            const [editCharId, setEditCharId] = useState(null);
            const [charToDelete, setCharToDelete] = useState(null);
            const [accountToDelete, setAccountToDelete] = useState(null); 

            const [alertMessage, setAlertMessage] = useState('');
            const [groupToDelete, setGroupToDelete] = useState(null);
            
            const [isConfirmResetOpen, setIsConfirmResetOpen] = useState(false); 

            const getJobStyle = (typeId) => {
                const jc = jobCategories.find(j => j.id === typeId);
                if (jc) return { backgroundColor: jc.bgColor, color: jc.textColor, border: `1px solid ${jc.borderColor}` };
                return { backgroundColor: '#e5e7eb', color: '#374151', border: '1px solid #d1d5db' };
            };

            const handleOpenCreateModal = (dayIdx = 0) => {
                const defaultBossId = bosses[0]?.id || '';
                const defaultBossName = bosses[0]?.name || '';
                const bossGroupsCount = groups.filter(g => g.bossId === defaultBossId).length;
                const defaultGroupName = defaultBossId ? `${bossGroupsCount + 1}.${defaultBossName}` : '';

                setNewGroup({ 
                    bossId: defaultBossId, 
                    name: defaultGroupName, 
                    dayIndex: dayIdx, 
                    time: '21:30~22:00集合' 
                });
                setIsCreateModalOpen(true);
            };

            const handleAddGroup = () => {
                if(!newGroup.name || !newGroup.time) {
                    setAlertMessage('請填寫完整資訊');
                    return;
                }
                setGroups([...groups, {
                    id: 'g' + Date.now(),
                    bossId: newGroup.bossId,
                    name: newGroup.name,
                    dayIndex: parseInt(newGroup.dayIndex),
                    time: newGroup.time,
                    members: ['', '', '', '', '', ''],
                    reserves: ['']
                }]);
                setIsCreateModalOpen(false);
            };

            const handleAddCharacter = () => {
                if(!newChar.job || !newChar.jobTypeId) {
                    setAlertMessage('請選擇職業');
                    return;
                }

                if (editCharId) {
                    setCharacters(characters.map(c => c.id === editCharId ? { 
                        ...c, 
                        name: currentAccount.playerName, 
                        job: newChar.job, 
                        jobTypeId: newChar.jobTypeId, 
                        level: parseInt(newChar.level) 
                    } : c));
                } else {
                    const newCharId = 'c_' + Date.now();
                    setCharacters([...characters, { 
                        id: newCharId, 
                        accountId: currentAccount.id, 
                        name: currentAccount.playerName, 
                        job: newChar.job, 
                        jobTypeId: newChar.jobTypeId, 
                        level: parseInt(newChar.level) 
                    }]);
                    
                    setAvailability({
                        ...availability,
                        [newCharId]: { days: Array(7).fill(false), bosses: [], bossCounts: {}, note: '' }
                    });
                }
                
                setIsAddCharModalOpen(false);
                setEditCharId(null);
            };

            const confirmDeleteChar = () => {
                if (!charToDelete) return;
                setCharacters(characters.filter(c => c.id !== charToDelete));
                const newGroups = groups.map(g => ({
                    ...g,
                    members: g.members.map(m => m === charToDelete ? '' : m),
                    reserves: g.reserves.map(m => m === charToDelete ? '' : m)
                }));
                setGroups(newGroups);
                setCharToDelete(null);
            };

            const groupedJobs = jobCategories.reduce((acc, jc) => {
                const g = jc.group || '其他';
                if (!acc[g]) acc[g] = [];
                acc[g].push(jc);
                return acc;
            }, {});

            // --- 元件：登入系統畫面 ---
            const LoginScreen = () => {
                const [selectedAcc, setSelectedAcc] = useState(accounts[0]?.id || '');
                const [passcode, setPasscode] = useState('');
                const [error, setError] = useState('');

                const doLogin = () => {
                    const acc = accounts.find(a => a.id === selectedAcc);
                    const correctPasscode = acc.passcode ? String(acc.passcode) : (acc.role === 'member' ? '1234' : 'admin');

                    if (acc && String(passcode) === correctPasscode) {
                        handleLogin(acc.id);
                    } else {
                        setError('密碼錯誤！請確認密碼是否正確。(預設：管理員 admin，一般 1234)');
                    }
                };

                return (
                    <div className="min-h-screen bg-gray-100 flex flex-col items-center justify-center p-4 relative">
                        <div className="bg-white p-8 rounded-xl shadow-2xl max-w-sm w-full border-t-8 border-blue-500 z-10">
                            <h1 className="text-2xl font-black text-center mb-6 text-gray-800"><span className="text-blue-500">⚔️</span> 公會排班登入</h1>
                            {error && <div className={`p-3 rounded mb-4 text-sm font-bold border ${error.includes('✅') ? 'bg-green-100 text-green-700 border-green-200' : 'bg-red-100 text-red-600 border-red-200'}`}>{error}</div>}
                            <div className="space-y-5">
                                <div>
                                    <label className="block text-sm font-bold text-gray-700 mb-1">選擇您的帳號</label>
                                    <select className="w-full p-3 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 font-medium" value={selectedAcc} onChange={e => setSelectedAcc(e.target.value)}>
                                        <option value="" disabled>-- 請選擇帳號 --</option>
                                        {accounts.map(a => <option key={a.id} value={a.id}>{a.playerName}</option>)}
                                    </select>
                                </div>
                                <div>
                                    <label className="block text-sm font-bold text-gray-700 mb-1">輸入登入密碼</label>
                                    <input type="password" placeholder="預設: 一般1234 / 管理admin" className="w-full p-3 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500" value={passcode} onChange={e => setPasscode(e.target.value)} onKeyDown={e => e.key === 'Enter' && doLogin()} />
                                </div>
                                <button onClick={doLogin} className="w-full bg-blue-600 text-white font-bold py-3 rounded hover:bg-blue-700 transition-colors shadow-lg mt-2">登入系統</button>
                            </div>
                        </div>
                    </div>
                );
            };

            if (!currentAccount) {
                return <LoginScreen />;
            }

            // --- 元件：會員報名頁面 ---
            const MemberSchedule = () => {
                const myCharacters = characters.filter(c => c.accountId === currentAccount.id);
                // 解耦打字與雲端同步的本地暫存狀態
                const [localAvail, setLocalAvail] = useState({});

                const getAvail = (charId) => localAvail[charId] || availability[charId] || { days: Array(7).fill(false), bosses: [], bossCounts: {}, note: '' };

                const toggleDay = (charId, index) => {
                    const charAvail = getAvail(charId);
                    const newDays = [...charAvail.days];
                    newDays[index] = !newDays[index];
                    setLocalAvail({ ...localAvail, [charId]: { ...charAvail, days: newDays } });
                };

                const toggleBoss = (charId, bossId) => {
                    const charAvail = getAvail(charId);
                    const currentBosses = charAvail.bosses || [];
                    const currentCounts = charAvail.bossCounts || {};

                    if (currentBosses.includes(bossId)) {
                        const newBosses = currentBosses.filter(id => id !== bossId);
                        const newCounts = { ...currentCounts };
                        delete newCounts[bossId];
                        setLocalAvail({ ...localAvail, [charId]: { ...charAvail, bosses: newBosses, bossCounts: newCounts } });
                    } else {
                        setLocalAvail({ 
                            ...localAvail, 
                            [charId]: { 
                                ...charAvail, 
                                bosses: [...currentBosses, bossId],
                                bossCounts: { ...currentCounts, [bossId]: 1 }
                            } 
                        });
                    }
                };

                const updateBossCount = (charId, bossId, count) => {
                    const charAvail = getAvail(charId);
                    setLocalAvail({
                        ...localAvail,
                        [charId]: {
                            ...charAvail,
                            bossCounts: { ...(charAvail.bossCounts || {}), [bossId]: count }
                        }
                    });
                };

                const updateNote = (charId, e) => {
                    const charAvail = getAvail(charId);
                    setLocalAvail({ ...localAvail, [charId]: { ...charAvail, note: e.target.value } });
                };

                // 將本地狀態一次性推送到雲端
                const saveToCloud = () => {
                    if (Object.keys(localAvail).length > 0) {
                        const mergedAvailability = { ...availability, ...localAvail };
                        setAvailability(mergedAvailability);
                        setLocalAvail({}); // 儲存後清空本地暫存，重新依賴雲端
                    }
                    setAlertMessage('報名資料已成功儲存！');
                };

                return (
                    <div className="space-y-6">
                        <div className="flex justify-between items-center bg-white p-4 rounded-lg shadow border-l-4 border-blue-500">
                            <h2 className="text-2xl font-bold text-gray-800">我的報名表</h2>
                            <button onClick={() => {
                                setEditCharId(null);
                                setNewChar({ name: currentAccount.playerName, job: '', jobTypeId: '', level: 200 });
                                setIsAddCharModalOpen(true);
                            }} className="bg-blue-600 text-white px-5 py-2 rounded font-bold hover:bg-blue-700 shadow transition-colors">
                                + 新增角色
                            </button>
                        </div>

                        {myCharacters.map((char) => {
                            const charAvail = getAvail(char.id);
                            return (
                                <div key={char.id} className="bg-white p-6 rounded-lg shadow border border-gray-100">
                                    <div className="mb-4 flex justify-between items-center border-b pb-2">
                                        <div className="flex items-center space-x-3">
                                            <span className="font-bold text-xl">{char.name}</span>
                                            <span style={getJobStyle(char.jobTypeId)} className="px-2 py-1 rounded text-xs font-bold shadow-sm">
                                                {char.job} (Lv.{char.level})
                                            </span>
                                        </div>
                                        <div className="flex space-x-2">
                                            <button onClick={() => {
                                                setEditCharId(char.id);
                                                setNewChar({ name: currentAccount.playerName, job: char.job, jobTypeId: char.jobTypeId, level: char.level });
                                                setIsAddCharModalOpen(true);
                                            }} className="text-gray-500 hover:text-blue-600 font-bold text-sm px-3 py-1 bg-gray-100 hover:bg-blue-50 rounded transition-colors border border-gray-200">
                                                編輯
                                            </button>
                                            <button onClick={() => setCharToDelete(char.id)} className="text-gray-500 hover:text-red-600 font-bold text-sm px-3 py-1 bg-gray-100 hover:bg-red-50 rounded transition-colors border border-gray-200">
                                                刪除
                                            </button>
                                        </div>
                                    </div>

                                    {/* 王團與場次選擇 */}
                                    <div className="mb-6 bg-orange-50 p-4 rounded-lg border border-orange-100">
                                        <h3 className="font-bold text-orange-800 mb-3">請選擇此角色本週想打的王與場次數 (可複選)：</h3>
                                        <div className="flex flex-wrap gap-4">
                                            {bosses.map(boss => {
                                                const isChecked = (charAvail.bosses || []).includes(boss.id);
                                                const count = (charAvail.bossCounts && charAvail.bossCounts[boss.id]) ? charAvail.bossCounts[boss.id] : 1;
                                                return (
                                                    <div key={boss.id} style={{ borderColor: isChecked ? boss.color : '#e5e7eb' }} className={`flex items-center bg-white px-3 py-2 rounded border transition-all ${isChecked ? 'shadow-md' : 'hover:bg-gray-50'}`}>
                                                        <label className="flex items-center space-x-2 cursor-pointer flex-1 mr-2">
                                                            <input 
                                                                type="checkbox" 
                                                                className="w-4 h-4 rounded"
                                                                checked={isChecked}
                                                                onChange={() => toggleBoss(char.id, boss.id)}
                                                            />
                                                            <span className="font-bold" style={{ color: boss.color }}>{boss.icon} {boss.name}</span>
                                                        </label>
                                                        {isChecked && (
                                                            <div className="flex items-center border-l pl-2 border-gray-200">
                                                                <span className="text-xs text-gray-500 mr-1">場次:</span>
                                                                <input 
                                                                    type="number" 
                                                                    min="1" 
                                                                    max="10" 
                                                                    className="w-12 p-0.5 text-center border rounded text-xs font-bold focus:ring-1 focus:outline-none"
                                                                    style={{ borderColor: boss.color, color: boss.color }}
                                                                    value={count}
                                                                    onChange={(e) => updateBossCount(char.id, boss.id, parseInt(e.target.value) || 1)}
                                                                />
                                                            </div>
                                                        )}
                                                    </div>
                                                )
                                            })}
                                        </div>
                                    </div>

                                    {/* 日期選擇 */}
                                    <div className="mb-4">
                                        <h3 className="font-bold text-gray-700 mb-2">請勾選可出團的日期：</h3>
                                        <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-4">
                                            {days.map((day, index) => (
                                                <label key={index} className={`cursor-pointer border rounded-lg p-3 flex flex-col items-center justify-center transition-colors ${charAvail.days[index] ? 'bg-blue-50 border-blue-400' : 'bg-gray-50 hover:bg-gray-100'}`}>
                                                    <input 
                                                        type="checkbox" 
                                                        className="w-5 h-5 mb-1 text-blue-600"
                                                        checked={charAvail.days[index]}
                                                        onChange={() => toggleDay(char.id, index)}
                                                    />
                                                    <span className="font-bold text-sm text-gray-800">{day.split(' ')[0]}</span>
                                                    <span className="text-xs text-gray-500">({day.split(' ')[1]})</span>
                                                </label>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="mb-2">
                                        <input 
                                            type="text" 
                                            className="w-full border border-gray-300 p-2 rounded focus:ring-2 focus:ring-blue-500 focus:outline-none"
                                            value={charAvail.note}
                                            onChange={(e) => updateNote(char.id, e)}
                                            placeholder="時間備註 (例如：晚上9點後)"
                                        />
                                    </div>
                                </div>
                            );
                        })}

                        <div className="text-right">
                            <button onClick={saveToCloud} className="bg-blue-600 text-white px-8 py-3 rounded-lg font-bold hover:bg-blue-700 transition-colors shadow-lg">
                                儲存報名資料
                            </button>
                        </div>
                    </div>
                );
            };

            // --- 元件：報名總表 ---
            const AvailabilityMatrix = ({ onOpenCreateModal }) => {
                const [sortMode, setSortMode] = useState('default'); // 新增：排序狀態管理

                const assignCharToGroup = (charId, groupId) => {
                    if (!groupId) return;
                    const group = groups.find(g => g.id === groupId);
                    const emptyIdx = group.members.findIndex(m => m === '');
                    
                    if (emptyIdx === -1) {
                        setAlertMessage(`「${group.name}」的正式隊員已滿！\n請至「王團編組排班」頁面手動將其加入候補。`);
                        return;
                    }
                    
                    const newGroups = groups.map(g => {
                        if (g.id === groupId) {
                            const newMembers = [...g.members];
                            newMembers[emptyIdx] = charId;
                            return { ...g, members: newMembers };
                        }
                        return g;
                    });
                    setGroups(newGroups);
                };

                const removeCharFromGroup = (charId, groupId) => {
                    const newGroups = groups.map(g => {
                        if (g.id === groupId) {
                            const newMembers = g.members.map(m => m === charId ? '' : m);
                            const newReserves = g.reserves.map(m => m === charId ? '' : m);
                            return { ...g, members: newMembers, reserves: newReserves };
                        }
                        return g;
                    });
                    setGroups(newGroups);
                };

                // 新增：處理名單動態排序的邏輯 (按筆畫、職業、等級)
                const sortedCharacters = useMemo(() => {
                    let sorted = [...characters];
                    if (sortMode === 'name') {
                        // 依照名稱筆畫排序 (繁體中文語系)
                        sorted.sort((a, b) => a.name.localeCompare(b.name, 'zh-TW'));
                    } else if (sortMode === 'job') {
                        // 依照相同職業名稱排序
                        sorted.sort((a, b) => a.job.localeCompare(b.job, 'zh-TW'));
                    } else if (sortMode === 'levelDesc') {
                        // 等級：高到低
                        sorted.sort((a, b) => b.level - a.level);
                    } else if (sortMode === 'levelAsc') {
                        // 等級：低到高
                        sorted.sort((a, b) => a.level - b.level);
                    }
                    return sorted; // 若為 default 則保持原註冊順序
                }, [characters, sortMode]);

                return (
                    <div className="bg-white p-6 rounded-lg shadow overflow-x-auto">
                        <div className="flex justify-between items-center mb-4">
                            <h2 className="text-2xl font-bold text-gray-800">所有角色報名總表</h2>
                        </div>
                        <table className="w-full border-collapse text-sm text-left whitespace-nowrap">
                            <thead>
                                <tr className="bg-orange-100 border-b-2 border-orange-300">
                                    <th className="p-2 border min-w-[140px]">
                                        <div className="flex items-center justify-between">
                                            <span>角色名稱</span>
                                            {/* 名稱排序下拉選單 */}
                                            <select 
                                                className="bg-white border border-orange-200 text-orange-800 text-[11px] rounded outline-none cursor-pointer ml-1 p-0.5 shadow-sm focus:ring-1 focus:ring-orange-400"
                                                value={sortMode === 'name' ? sortMode : 'default'}
                                                onChange={(e) => setSortMode(e.target.value)}
                                                title="選擇排序方式"
                                            >
                                                <option value="default">預設順序</option>
                                                <option value="name">按筆畫排序</option>
                                            </select>
                                        </div>
                                    </th>
                                    <th className="p-2 border min-w-[140px]">
                                        <div className="flex items-center justify-between">
                                            <span>職業</span>
                                            {/* 職業與等級排序下拉選單 */}
                                            <select 
                                                className="bg-white border border-orange-200 text-orange-800 text-[11px] rounded outline-none cursor-pointer ml-1 p-0.5 shadow-sm focus:ring-1 focus:ring-orange-400"
                                                value={['job', 'levelDesc', 'levelAsc'].includes(sortMode) ? sortMode : 'default'}
                                                onChange={(e) => setSortMode(e.target.value)}
                                                title="選擇排序方式"
                                            >
                                                <option value="default">預設順序</option>
                                                <option value="job">同職業排序</option>
                                                <option value="levelDesc">等級高到低</option>
                                                <option value="levelAsc">等級低到高</option>
                                            </select>
                                        </div>
                                    </th>
                                    <th className="p-2 border w-1/4">報名的王團</th>
                                    <th className="p-2 border w-1/5">備註</th>
                                    {days.map((day, i) => (
                                        <th key={i} className="p-2 border text-center min-w-[90px] align-top">
                                            <div className="font-bold text-gray-800 text-base">{day.split(' ')[0]}</div>
                                            <div className="text-xs text-gray-500 mb-1">({day.split(' ')[1]})</div>
                                            {(currentAccount.role === 'admin' || currentAccount.role === 'subadmin') && (
                                                <button
                                                    onClick={() => onOpenCreateModal(i)}
                                                    className="w-full bg-indigo-50 border border-indigo-200 text-indigo-700 text-[11px] px-1 py-1 rounded hover:bg-indigo-100 font-bold transition-colors shadow-sm"
                                                    title={`在 ${day} 建立新王團`}
                                                >
                                                    + 開團
                                                </button>
                                            )}
                                        </th>
                                    ))}
                                </tr>
                            </thead>
                            <tbody>
                                {/* 替換：將原本的 characters.map 改為已經排好序的 sortedCharacters.map */}
                                {sortedCharacters.map(char => {
                                    const avail = availability[char.id] || { days: Array(7).fill(false), bosses: [], bossCounts: {}, note: '' };
                                    if(!avail.days.some(d => d)) return null; 

                                    return (
                                        <tr key={char.id} className="hover:bg-gray-50 border-b">
                                            <td className="p-2 border font-bold">
                                                {char.name}<br/>
                                                <span className="text-xs text-gray-400 font-normal">{accounts.find(a => a.id === char.accountId)?.playerName}</span>
                                            </td>
                                            <td className="p-2 border">
                                                <span style={getJobStyle(char.jobTypeId)} className="px-2 py-1 rounded text-xs font-bold shadow-sm">{char.job}</span>
                                                <div className="text-[11px] text-gray-500 font-bold mt-1 pl-1">Lv.{char.level}</div>
                                            </td>
                                            <td className="p-2 border">
                                                <div className="flex flex-wrap gap-1">
                                                    {(avail.bosses || []).map(bId => {
                                                        const b = bosses.find(x => x.id === bId);
                                                        const count = parseInt(avail.bossCounts?.[bId]) || 1;
                                                        return b ? (
                                                            <span key={bId} style={{ borderColor: b.color, color: b.color }} className="bg-white px-1.5 py-0.5 rounded border text-xs font-bold shadow-sm whitespace-nowrap">
                                                                {b.icon} {b.name} {count > 1 && `x${count}`}
                                                            </span>
                                                        ) : null;
                                                    })}
                                                </div>
                                            </td>
                                            <td className="p-2 border text-gray-600 text-xs whitespace-normal min-w-[120px]">{avail.note}</td>
                                            {avail.days.map((isAvail, dayIndex) => {
                                                const charGroupsOnDay = groups.filter(g => g.dayIndex === dayIndex && (g.members.includes(char.id) || g.reserves.includes(char.id)));
                                                const availableGroupsOnDay = groups.filter(g => 
                                                    g.dayIndex === dayIndex && 
                                                    !g.members.includes(char.id) && 
                                                    !g.reserves.includes(char.id)
                                                );

                                                return (
                                                    <td key={dayIndex} className="p-2 border text-center align-top relative min-w-[90px]">
                                                        {isAvail ? (
                                                            <div className="flex flex-col items-center gap-1">
                                                                {/* 顯示該日已被指派的隊伍標籤 */}
                                                                {charGroupsOnDay.map(g => {
                                                                    const b = bosses.find(x => x.id === g.bossId);
                                                                    const tagColor = b ? b.color : '#3b82f6';
                                                                    return (
                                                                        <div key={g.id} style={{ borderColor: tagColor, color: tagColor }} className="bg-white text-[11px] px-1 py-0.5 rounded flex items-center justify-between w-full shadow-sm border font-bold mb-1">
                                                                            <span className="truncate flex-1 text-left" title={g.name}>{g.name}</span>
                                                                            {(currentAccount.role === 'admin' || currentAccount.role === 'subadmin') && (
                                                                                <button onClick={() => removeCharFromGroup(char.id, g.id)} className="hover:opacity-70 ml-1 font-black px-1" style={{ color: tagColor }}>×</button>
                                                                            )}
                                                                        </div>
                                                                    )
                                                                })}

                                                                {/* 顯示剩餘可排的王團圖示 (只有當該日沒有被排入任何團時才顯示圖示) */}
                                                                {charGroupsOnDay.length === 0 && (
                                                                    <div className="text-lg drop-shadow-sm select-none my-1 flex flex-wrap justify-center gap-2">
                                                                        {(avail.bosses || []).map(bId => {
                                                                            const b = bosses.find(x => x.id === bId);
                                                                            if (!b) return null;
                                                                            
                                                                            // 精確計算：將場次轉為數字，並扣除所有日子中已被指派的總次數
                                                                            const totalCount = parseInt(avail.bossCounts?.[bId]) || 1;
                                                                            const assignedCount = groups.filter(g => g.bossId === bId && (g.members.includes(char.id) || g.reserves.includes(char.id))).length;
                                                                            const remainingCount = Math.max(0, totalCount - assignedCount);

                                                                            if (remainingCount <= 0) {
                                                                                // 次數用盡：顯示變灰防呆
                                                                                return (
                                                                                    <span key={b.id} className="relative inline-flex items-center grayscale opacity-40" title="排班次數已滿">
                                                                                        <span>{b.icon}</span>
                                                                                    </span>
                                                                                );
                                                                            } else {
                                                                                // 還有剩餘次數：顯示正常圖案與剩餘場次(若總場次>1)
                                                                                return (
                                                                                    <span key={b.id} className="relative inline-flex items-center" title={`剩餘可排: ${remainingCount} 場`}>
                                                                                        <span>{b.icon}</span>
                                                                                        {(totalCount > 1 && remainingCount > 0) && (
                                                                                            <span className="absolute -bottom-2 -right-2 text-[10px] font-black z-10" style={{color: b.color, textShadow: '1px 1px 0px #fff, -1px -1px 0px #fff, -1px 1px 0px #fff, 1px -1px 0px #fff'}}>
                                                                                                x{remainingCount}
                                                                                            </span>
                                                                                        )}
                                                                                    </span>
                                                                                );
                                                                            }
                                                                        })}
                                                                        {!(avail.bosses && avail.bosses.length > 0) && <span className="font-bold text-red-500 text-sm tracking-normal">V</span>}
                                                                    </div>
                                                                )}

                                                                {(currentAccount.role === 'admin' || currentAccount.role === 'subadmin') && (
                                                                    availableGroupsOnDay.length > 0 ? (
                                                                        <select
                                                                            className="w-full text-[11px] p-1 border border-blue-300 rounded mt-1 bg-blue-50 text-blue-700 cursor-pointer font-bold focus:outline-none focus:ring-1 focus:ring-blue-500"
                                                                            value=""
                                                                            onChange={(e) => assignCharToGroup(char.id, e.target.value)}
                                                                            title="直接指派到王團"
                                                                        >
                                                                            <option value="" disabled>+ 快速指派</option>
                                                                            {availableGroupsOnDay.map(g => {
                                                                                const isDesired = (avail.bosses || []).includes(g.bossId);
                                                                                return (
                                                                                    <option key={g.id} value={g.id}>
                                                                                        {g.name} {!isDesired ? '(未報名)' : ''}
                                                                                    </option>
                                                                                )
                                                                            })}
                                                                        </select>
                                                                    ) : (
                                                                        charGroupsOnDay.length === 0 && !groups.some(g => g.dayIndex === dayIndex) && (
                                                                            <div className="w-full text-[10px] text-gray-400 text-center mt-1 bg-gray-50 border border-gray-200 rounded py-0.5" title="請先至排班頁面新增該日期的王團">
                                                                                本日未開團
                                                                            </div>
                                                                        )
                                                                    )
                                                                )}
                                                            </div>
                                                        ) : (
                                                            <span className="text-gray-300">-</span>
                                                        )}
                                                    </td>
                                                );
                                            })}
                                        </tr>
                                    );
                                })}
                            </tbody>
                        </table>
                    </div>
                );
            };

            // --- 元件：排團管理 ---
            const RaidPlanner = ({ onOpenCreateModal }) => {
                const handleDeleteGroup = (groupId) => {
                    setGroupToDelete(groupId);
                };

                const getConflictGroup = (charId, currentGroupId, dayIndex) => {
                    if (!charId) return null;
                    const conflict = groups.find(g => 
                        g.id !== currentGroupId && 
                        g.dayIndex === parseInt(dayIndex) && 
                        (g.members.includes(charId) || g.reserves.includes(charId))
                    );
                    return conflict ? conflict.name : null;
                };

                const handleAssign = (groupId, slotType, slotIndex, charId) => {
                    const newGroups = groups.map(g => {
                        if (g.id === groupId) {
                            const updatedList = [...g[slotType]];
                            updatedList[slotIndex] = charId;
                            return { ...g, [slotType]: updatedList };
                        }
                        return g;
                    });
                    setGroups(newGroups);
                };

                return (
                    <div className="space-y-8">
                        <div className="flex justify-between items-center bg-white p-4 rounded-lg shadow border-l-4 border-indigo-500">
                            <h2 className="text-2xl font-bold text-gray-800">王團編組排班 (依王團分類)</h2>
                            {(currentAccount.role === 'admin' || currentAccount.role === 'subadmin') && (
                                <button onClick={() => onOpenCreateModal(0)} className="bg-indigo-600 text-white px-4 py-2 rounded font-bold hover:bg-indigo-700 shadow">
                                    + 新增隊伍
                                </button>
                            )}
                        </div>

                        {bosses.map(boss => {
                            const bossGroups = groups.filter(g => g.bossId === boss.id);
                            if(bossGroups.length === 0) return null;

                            return (
                                <div key={boss.id} className="bg-white p-5 rounded-lg shadow-md border border-gray-200">
                                    <h3 className="text-xl font-black mb-4 border-b pb-2 flex items-center">
                                        <span className="mr-2 text-2xl drop-shadow-sm">{boss.icon}</span> 
                                        <span style={{ color: boss.color }}>{boss.name}</span>
                                    </h3>
                                    
                                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                        {bossGroups.map(group => (
                                            <div key={group.id} className="bg-gray-50 rounded-lg border border-gray-300 overflow-hidden">
                                                <div className="bg-gray-200 border-b border-gray-300 p-3 flex justify-between items-center">
                                                    <h4 className="font-bold text-gray-800">{group.name}</h4>
                                                    <div className="flex items-center space-x-2">
                                                        <div className="text-sm font-bold text-indigo-700 bg-white px-2 py-1 rounded border border-indigo-200">
                                                            {days[group.dayIndex].split(' ')[0]} ({days[group.dayIndex].split(' ')[1]}) | {group.time}
                                                        </div>
                                                        {(currentAccount.role === 'admin' || currentAccount.role === 'subadmin') && (
                                                            <button 
                                                                onClick={() => handleDeleteGroup(group.id)} 
                                                                className="text-red-600 hover:text-white hover:bg-red-600 border border-red-300 px-2 rounded text-xs py-1 transition-colors"
                                                                title="刪除隊伍"
                                                            >
                                                                刪除
                                                            </button>
                                                        )}
                                                    </div>
                                                </div>
                                                <div className="p-3">
                                                    <table className="w-full text-sm mb-2">
                                                        <thead>
                                                            <tr className="bg-white">
                                                                <th className="p-2 text-left w-12 border">隊員</th>
                                                                <th className="p-2 text-left border w-1/2">選擇角色 (⚠️顯示衝堂警告)</th>
                                                                <th className="p-2 text-left border">報名備註</th>
                                                            </tr>
                                                        </thead>
                                                        <tbody>
                                                            {group.members.map((memberId, idx) => {
                                                                const char = characters.find(c => c.id === memberId);
                                                                const avail = char ? availability[char.id] : null;
                                                                return (
                                                                    <tr key={idx} className="border-b bg-white">
                                                                        <td className="p-2 border text-center font-bold text-gray-500">{idx + 1}</td>
                                                                        <td className="p-1 border">
                                                                            {(currentAccount.role === 'admin' || currentAccount.role === 'subadmin') ? (
                                                                                <select 
                                                                                    className={`w-full p-2 border rounded font-medium ${memberId ? 'bg-blue-50' : 'bg-white'}`}
                                                                                    value={memberId}
                                                                                    onChange={(e) => handleAssign(group.id, 'members', idx, e.target.value)}
                                                                                >
                                                                                    <option value="">- 選擇隊員 -</option>
                                                                                    {characters.map(c => {
                                                                                        const conflictName = getConflictGroup(c.id, group.id, group.dayIndex);
                                                                                        const warningText = conflictName ? `(⚠️本日已排: ${conflictName})` : '';
                                                                                        return (
                                                                                            <option key={c.id} value={c.id}>
                                                                                                [{c.job}] {c.name} (Lv.{c.level}) {warningText}
                                                                                            </option>
                                                                                        )
                                                                                    })}
                                                                                </select>
                                                                            ) : (
                                                                                <div className="p-1 flex items-center space-x-2">
                                                                                    {char ? (
                                                                                        <>
                                                                                            <span style={getJobStyle(char.jobTypeId)} className="px-2 py-1 rounded text-xs font-bold shadow-sm">{char.job}</span>
                                                                                            <span className="font-bold">{char.name}</span>
                                                                                            <span className="text-xs text-gray-500 font-bold">Lv.{char.level}</span>
                                                                                        </>
                                                                                    ) : '-'}
                                                                                </div>
                                                                            )}
                                                                        </td>
                                                                        <td className="p-2 border text-xs text-gray-500 truncate max-w-[120px]">{avail ? avail.note : ''}</td>
                                                                    </tr>
                                                                )
                                                            })}
                                                        </tbody>
                                                    </table>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                );
            };

             // --- 元件：系統與權限管理 (僅管理員) ---
             const SystemManagement = () => {
                const [newBossName, setNewBossName] = useState('');
                const [newBossIcon, setNewBossIcon] = useState('🔥');
                const [newBossColor, setNewBossColor] = useState('#ef4444');

                const [newJobCatName, setNewJobCatName] = useState('');
                const [newJobCatBg, setNewJobCatBg] = useState('#dbeafe');
                const [newJobCatText, setNewJobCatText] = useState('#1e3a8a');
                
                const [newAccName, setNewAccName] = useState('');

                const handleAddBoss = () => {
                    if(!newBossName || !newBossIcon) return;
                    setBosses([...bosses, { id: 'b_' + Date.now(), name: newBossName, icon: newBossIcon, color: newBossColor }]);
                    setNewBossName('');
                };

                const handleAddJobCat = () => {
                    if(!newJobCatName) return;
                    setJobCategories([...jobCategories, { 
                        id: 'jc_' + Date.now(), 
                        group: '自訂/其他', 
                        name: newJobCatName, 
                        bgColor: newJobCatBg, 
                        textColor: newJobCatText, 
                        borderColor: newJobCatText 
                    }]);
                    setNewJobCatName('');
                };

                const handleAddAccount = () => {
                    if(!newAccName) return;
                    setAccounts([...accounts, { id: 'a_' + Date.now(), playerName: newAccName, role: 'member', passcode: '1234' }]);
                    setNewAccName('');
                };

                return (
                    <div className="space-y-6">
                        {/* 系統設定 (王團管理) */}
                        <div className="bg-white p-6 rounded-lg shadow border-t-4 border-red-500">
                            <h2 className="text-xl font-bold text-gray-800 mb-4">系統設定 - 王團種類管理</h2>
                            <div className="flex flex-wrap gap-4 mb-4 items-end bg-gray-50 p-4 rounded border">
                                <div>
                                    <label className="block text-sm font-bold text-gray-700 mb-1">圖案 (Emoji)</label>
                                    <input type="text" className="border p-2 rounded w-20 text-center text-xl" value={newBossIcon} onChange={(e) => setNewBossIcon(e.target.value)} />
                                </div>
                                <div>
                                    <label className="block text-sm font-bold text-gray-700 mb-1">王團名稱</label>
                                    <input type="text" className="border p-2 rounded w-48" placeholder="例: 混沌黑龍" value={newBossName} onChange={(e) => setNewBossName(e.target.value)} />
                                </div>
                                <div>
                                    <label className="block text-sm font-bold text-gray-700 mb-1">名稱顏色</label>
                                    <input type="color" className="border p-1 rounded w-16 h-[42px] cursor-pointer" value={newBossColor} onChange={(e) => setNewBossColor(e.target.value)} />
                                </div>
                                <button onClick={handleAddBoss} className="bg-red-600 text-white px-5 py-2 rounded font-bold hover:bg-red-700 h-[42px] shadow">新增王團</button>
                            </div>
                            <div className="flex flex-wrap gap-3 mt-6">
                                {bosses.map(boss => (
                                    <div key={boss.id} style={{ borderColor: boss.color, backgroundColor: boss.color + '10' }} className="border-2 px-3 py-2 rounded flex items-center space-x-2 shadow-sm">
                                        <span className="text-xl drop-shadow-sm">{boss.icon}</span>
                                        <span className="font-bold" style={{ color: boss.color }}>{boss.name}</span>
                                        <button 
                                            className="text-red-500 hover:text-red-700 font-black ml-2 opacity-50 hover:opacity-100"
                                            onClick={() => setBosses(bosses.filter(b => b.id !== boss.id))}
                                            title="刪除"
                                        >✕</button>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* 系統設定 (職業分類管理) */}
                        <div className="bg-white p-6 rounded-lg shadow border-t-4 border-green-500">
                            <h2 className="text-xl font-bold text-gray-800 mb-4">系統設定 - 職業分類標籤管理</h2>
                            <div className="flex flex-wrap gap-4 mb-4 items-end bg-gray-50 p-4 rounded border">
                                <div>
                                    <label className="block text-sm font-bold text-gray-700 mb-1">自訂職業名稱</label>
                                    <input type="text" className="border p-2 rounded w-40" placeholder="例: 神之子" value={newJobCatName} onChange={(e) => setNewJobCatName(e.target.value)} />
                                </div>
                                <div>
                                    <label className="block text-sm font-bold text-gray-700 mb-1">背景顏色</label>
                                    <input type="color" className="border p-1 rounded w-16 h-[42px] cursor-pointer" value={newJobCatBg} onChange={(e) => setNewJobCatBg(e.target.value)} />
                                </div>
                                <div>
                                    <label className="block text-sm font-bold text-gray-700 mb-1">文字外框顏色</label>
                                    <input type="color" className="border p-1 rounded w-16 h-[42px] cursor-pointer" value={newJobCatText} onChange={(e) => setNewJobCatText(e.target.value)} />
                                </div>
                                <button onClick={handleAddJobCat} className="bg-green-600 text-white px-5 py-2 rounded font-bold hover:bg-green-700 h-[42px] shadow">新增職業分類</button>
                            </div>
                            
                            {/* 按組別呈現職業標籤 */}
                            <div className="space-y-4 mt-6">
                                {Object.entries(groupedJobs).map(([groupName, jobs]) => (
                                    <div key={groupName} className="border border-gray-200 p-4 rounded bg-white shadow-sm">
                                        <h3 className="text-sm font-bold text-gray-500 mb-3 border-b pb-1">{groupName}</h3>
                                        <div className="flex flex-wrap gap-2">
                                            {jobs.map(jc => (
                                                <div key={jc.id} className="border px-2 py-1 rounded flex items-center space-x-1 shadow-sm text-sm transition-all hover:scale-105" style={{ backgroundColor: jc.bgColor, borderColor: jc.borderColor }}>
                                                    <span className="font-bold" style={{ color: jc.textColor }}>{jc.name}</span>
                                                    <button 
                                                        className="text-gray-500 hover:text-red-600 font-black ml-1 opacity-60 hover:opacity-100"
                                                        onClick={() => setJobCategories(jobCategories.filter(j => j.id !== jc.id))}
                                                        title="刪除"
                                                    >✕</button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* 新增：系統設定 (排班日期與換週設定) */}
                        <div className="bg-white p-6 rounded-lg shadow border-t-4 border-yellow-500">
                            <h2 className="text-xl font-bold text-gray-800 mb-4">系統設定 - 排班日期與換週</h2>
                            <div className="flex flex-wrap gap-4 items-end bg-gray-50 p-4 rounded border">
                                <div>
                                    <label className="block text-sm font-bold text-gray-700 mb-1">本週起始日期 (通常設為週四)</label>
                                    <input type="date" className="border p-2 rounded h-[42px] cursor-pointer" value={weekStartDate} onChange={(e) => setWeekStartDate(e.target.value)} />
                                </div>
                                <div className="ml-auto">
                                    <label className="block text-sm font-bold text-gray-700 mb-1">重置動作</label>
                                    <button onClick={() => setIsConfirmResetOpen(true)} className="bg-yellow-600 text-white px-5 py-2 rounded font-bold hover:bg-yellow-700 shadow h-[42px] flex items-center transition-all">
                                        <span className="mr-2">⚠️</span> 清空報名表單與王團名單
                                    </button>
                                </div>
                            </div>
                            <p className="text-sm text-gray-500 mt-2">💡 提示：更改起始日期後，所有頁面的日期將會自動順延 7 天。準備開新團前，請點擊「清空報名表單」將所有人舊的打勾紀錄歸零。</p>
                        </div>

                        {/* 帳號權限管理 */}
                        <div className="bg-white p-6 rounded-lg shadow border-t-4 border-blue-500">
                            <h2 className="text-xl font-bold text-gray-800 mb-4">公會帳號權限與密碼管理</h2>
                            
                            <div className="flex flex-wrap gap-4 mb-4 items-end bg-gray-50 p-4 rounded border">
                                <div>
                                    <label className="block text-sm font-bold text-gray-700 mb-1">新玩家名稱</label>
                                    <input type="text" className="border p-2 rounded w-48" placeholder="例: 瓜董(玩家)" value={newAccName} onChange={(e) => setNewAccName(e.target.value)} />
                                </div>
                                <button onClick={handleAddAccount} className="bg-blue-600 text-white px-5 py-2 rounded font-bold hover:bg-blue-700 h-[42px] shadow">新增玩家帳號</button>
                            </div>

                            <table className="w-full border-collapse text-sm text-left mt-4">
                                <thead>
                                    <tr className="bg-gray-100 border-b">
                                        <th className="p-3 border">玩家(帳號)名稱</th>
                                        <th className="p-3 border">登入密碼</th>
                                        <th className="p-3 border">系統權限</th>
                                        <th className="p-3 border text-center">操作</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {accounts.map(acc => (
                                        <tr key={acc.id} className="hover:bg-gray-50 border-b">
                                            <td className="p-3 border font-medium">{acc.playerName}</td>
                                            <td className="p-3 border">
                                                <input type="text" className="border p-1 rounded w-32 text-center font-medium text-gray-700 focus:ring-2 focus:ring-blue-500 outline-none" value={acc.passcode || ''} onChange={(e) => {
                                                    const newAccs = accounts.map(a => a.id === acc.id ? {...a, passcode: e.target.value} : a);
                                                    setAccounts(newAccs);
                                                }} />
                                            </td>
                                            <td className="p-3 border">
                                                <select 
                                                    className="border p-1 rounded bg-white"
                                                    value={acc.role}
                                                    onChange={(e) => {
                                                        const newAccs = accounts.map(a => a.id === acc.id ? {...a, role: e.target.value} : a);
                                                        setAccounts(newAccs);
                                                    }}
                                                >
                                                    <option value="member">一般會員</option>
                                                    <option value="subadmin">副管理員</option>
                                                    <option value="admin">管理員</option>
                                                </select>
                                            </td>
                                            <td className="p-3 border text-center">
                                                 <button 
                                                    className="text-red-500 hover:text-red-700 font-bold px-2 py-1 rounded hover:bg-red-50 transition-colors"
                                                    onClick={() => setAccountToDelete(acc.id)}
                                                 >刪除</button>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                );
            };

            // 導覽列
            const navItems = [
                { id: 'my-schedule', label: '我的報名表' } // 讓所有人(包含管理員)都可以報名
            ];
            
            if (currentAccount.role === 'member') {
                navItems.push({ id: 'planner', label: '查看王團名單' });
            } else if (currentAccount.role === 'subadmin') {
                navItems.push({ id: 'matrix', label: '成員報名總表' });
                navItems.push({ id: 'planner', label: '王團編組排班' });
            } else if (currentAccount.role === 'admin') {
                navItems.push({ id: 'matrix', label: '成員報名總表' });
                navItems.push({ id: 'planner', label: '王團編組排班' });
                navItems.push({ id: 'system', label: '系統與權限管理' });
            }

            return (
                <div className="min-h-screen flex flex-col">
                    <header className="bg-white shadow-sm border-b">
                        <div className="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
                            <h1 className="text-xl font-black text-gray-800 flex items-center">
                                <span className="text-2xl mr-2">⚔️</span> 公會綜合王團排班系統
                            </h1>
                            <div className="flex items-center space-x-3">
                                <div className="text-right">
                                    <div className="font-bold text-gray-800">{currentAccount.playerName}</div>
                                    <div className="text-xs text-gray-500">
                                        {currentAccount.role === 'admin' ? '管理員' : currentAccount.role === 'subadmin' ? '副管理員' : '一般會員'}
                                        <button onClick={handleLogout} className="ml-3 text-red-500 hover:text-red-700 underline font-bold cursor-pointer">登出</button>
                                    </div>
                                </div>
                                <div className="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center font-bold text-blue-600 border-2 border-blue-300">
                                    {currentAccount.playerName.charAt(0)}
                                </div>
                            </div>
                        </div>
                    </header>

                    <div className="bg-white shadow-sm mb-6">
                        <div className="max-w-7xl mx-auto px-4 flex space-x-6">
                            {navItems.map(item => (
                                <button
                                    key={item.id}
                                    className={`py-3 px-1 border-b-2 font-medium text-sm transition-colors ${
                                        activeTab === item.id 
                                        ? 'border-blue-500 text-blue-600' 
                                        : 'border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300'
                                    }`}
                                    onClick={() => setActiveTab(item.id)}
                                >
                                    {item.label}
                                </button>
                            ))}
                        </div>
                    </div>

                    <main className="flex-grow max-w-7xl mx-auto px-4 w-full pb-10">
                        {activeTab === 'my-schedule' && <MemberSchedule />}
                        {activeTab === 'matrix' && <AvailabilityMatrix onOpenCreateModal={handleOpenCreateModal} />}
                        {activeTab === 'planner' && <RaidPlanner onOpenCreateModal={handleOpenCreateModal} />}
                        {activeTab === 'system' && <SystemManagement />}
                    </main>

                    {/* 新增/編輯角色 Modal */}
                    {isAddCharModalOpen && (
